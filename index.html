<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老乡鸡 IOI City Mall · 排班系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --font: 'SF Pro Display', system-ui, -apple-system, sans-serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      /* Neutrals */
      --gray-50:  #fafaf9;
      --gray-100: #f5f5f4;
      --gray-200: #e7e5e4;
      --gray-300: #d6d3d1;
      --gray-400: #a8a29e;
      --gray-500: #78716c;
      --gray-600: #57534e;
      --gray-700: #44403c;
      --gray-800: #292524;
      --gray-900: #1c1917;

      /* Accent colours */
      --blue-50:   #eff6ff; --blue-100: #dbeafe;
      --blue-600:  #2563eb; --blue-700: #1d4ed8;
      --green-50:  #f0fdf4; --green-100: #dcfce7;
      --green-600: #16a34a; --green-700: #15803d;
      --red-50:    #fef2f2; --red-100: #fee2e2;
      --red-600:   #dc2626; --red-700: #b91c1c;
      --amber-50:  #fffbeb; --amber-100: #fef3c7;
      --amber-600: #d97706; --amber-700: #b45309;

      /* Semantic */
      --text:        var(--gray-900);
      --text-sub:    var(--gray-500);
      --text-muted:  var(--gray-400);
      --bg:          #f6f5f3;
      --surface:     #ffffff;
      --border:      var(--gray-200);
      --border-mid:  var(--gray-300);
    }

    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.55; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ── LAYOUT ── */
    .container { max-width: 980px; margin: 0 auto; padding: 1.5rem 1.25rem; }

    /* ── HEADER ── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 12px; flex-wrap: wrap;
    }
    .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .app-subtitle { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; line-height: 1; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      border-radius: 0; padding: 8px 12px; font-size: 13px; font-family: var(--font);
      color: var(--text-sub); cursor: pointer; margin-bottom: -1px;
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); background: var(--gray-50); }
    .tab-btn.active { border-bottom-color: var(--gray-900); color: var(--gray-900); font-weight: 600; }

    /* ── BUTTONS ── */
    button {
      font-family: var(--font); font-size: 13px; cursor: pointer;
      border: 1px solid var(--border-mid); background: var(--surface);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 6px 14px; display: inline-flex; align-items: center; gap: 5px;
    }
    button:hover { background: var(--gray-100); }
    .btn-success { background: var(--green-50) !important; color: var(--green-700) !important; border-color: var(--green-100) !important; }
    .btn-danger  { background: var(--red-50)   !important; color: var(--red-700)   !important; border-color: var(--red-100)   !important; }
    .btn-info    { background: var(--blue-50)   !important; color: var(--blue-700)  !important; border-color: var(--blue-100)  !important; }
    .btn-sm { font-size: 11px; padding: 3px 9px; }

    /* ── FORM ELEMENTS ── */
    select, input[type="text"], input[type="date"], input[type="time"] {
      font-family: var(--font); font-size: 13px;
      border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
      padding: 6px 10px; color: var(--text); background: var(--surface); outline: none;
    }
    select:focus, input:focus { border-color: var(--blue-600); }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── BADGES ── */
    .badge { font-size: 11px; font-weight: 600; border-radius: 100px; padding: 2px 9px; display: inline-block; white-space: nowrap; }
    .badge-blue   { background: var(--blue-50);  color: var(--blue-700);  }
    .badge-green  { background: var(--green-50); color: var(--green-700); }
    .badge-red    { background: var(--red-50);   color: var(--red-700);   }
    .badge-amber  { background: var(--amber-50); color: var(--amber-700); }
    .badge-gray   { background: var(--gray-100); color: var(--gray-600);  }

    /* ── CARDS ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 8px; }

    /* ── ALERTS ── */
    .alert { border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
    .alert-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .alert-body  { font-size: 12px; }
    .alert-danger  { background: var(--red-50);   border: 1px solid var(--red-100);   color: var(--red-700);   }
    .alert-success { background: var(--green-50); border: 1px solid var(--green-100); color: var(--green-700); }

    /* ── AREA SECTION ── */
    .area-label { display: inline-flex; align-items: center; border-radius: var(--radius-sm); padding: 3px 12px; font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
    .area-kitchen  { background: var(--blue-50);  color: var(--blue-700);  }
    .area-front    { background: var(--green-50); color: var(--green-700); }
    .area-mgmt     { background: var(--amber-50); color: var(--amber-700); }
    .area-reserve  { background: var(--gray-100); color: var(--gray-600);  }

    /* ── SLOT BOXES ── */
    .slots-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .slot-box { border-radius: var(--radius-md); padding: 8px 12px; min-width: 155px; border: 1px solid var(--red-100); background: var(--red-50); }
    .slot-box.filled { border-color: var(--green-100); background: var(--green-50); }
    .slot-shift { font-size: 11px; margin-bottom: 4px; font-weight: 600; }
    .slot-shift.unfilled { color: var(--red-600); }
    .slot-shift.filled   { color: var(--green-600); }
    .slot-select { border: none; background: transparent; padding: 0; width: 100%; font-size: 13px; font-family: var(--font); cursor: pointer; color: var(--text); }
    .student-box { border: 1px dashed var(--border-mid); border-radius: var(--radius-sm); padding: 5px 8px; margin-top: 4px; background: var(--gray-50); font-size: 12px; }
    .student-box select { border: none; background: transparent; padding: 0; width: 100%; font-size: 12px; font-family: var(--font); cursor: pointer; color: var(--text); }
    .student-label { font-size: 10px; color: var(--text-sub); display: flex; align-items: center; gap: 3px; margin-bottom: 3px; }

    /* ── ADD SHIFT FORM ── */
    .add-shift-form { background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }

    /* ── EMPLOYEE ROWS ── */
    .emp-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; }
    .emp-row.absent { background: var(--red-50); border-color: var(--red-100); }
    .emp-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .emp-name   { font-size: 14px; font-weight: 600; }
    .emp-fname  { font-size: 12px; color: var(--text-sub); }
    .emp-meta   { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
    .emp-pos    { font-size: 12px; color: var(--text-sub); }
    .manager-note { background: var(--red-50); border: 1px solid var(--red-100); border-radius: var(--radius-sm); padding: 5px 9px; margin-top: 5px; font-size: 12px; color: var(--red-700); }
    .emp-actions { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }

    /* ── UNASSIGNED PANEL ── */
    .unassigned-panel { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 10px; background: var(--surface); }
    .unassigned-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; font-weight: 600; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .staff-chip { font-size: 11px; border-radius: 100px; padding: 3px 10px; display: inline-block; font-weight: 500; }

    /* ── LEAVE ── */
    .leave-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 8px; background: var(--surface); }
    .leave-row  { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .upcoming-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 5px; background: var(--surface); flex-wrap: wrap; gap: 6px; }
    .section-title { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }

    /* ── ROSTER ── */
    .roster-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
    .roster-header { background: var(--gray-900); color: white; padding: 16px; }
    .roster-store { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .roster-date  { font-size: 14px; font-weight: 700; background: rgba(255,255,255,0.15); display: inline-block; padding: 4px 12px; border-radius: var(--radius-sm); letter-spacing: 0.3px; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.4px; background: var(--gray-50); border-bottom: 1px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .row-off td { color: var(--text-muted); }

    /* ── GANTT ── */
    .gantt-scroll { overflow-x: auto; }
    .gantt-tl  { display: flex; margin-left: 90px; padding-bottom: 4px; border-bottom: 1px solid var(--border); min-width: 440px; }
    .gantt-hr  { flex: 1; font-size: 10px; color: var(--text-muted); text-align: center; }
    .gantt-row { display: flex; align-items: center; height: 25px; margin-bottom: 3px; min-width: 440px; }
    .gantt-al  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 7px 0 3px; min-width: 440px; }
    .gantt-nm  { width: 90px; font-size: 12px; flex-shrink: 0; padding-right: 6px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .gantt-ba  { flex: 1; position: relative; height: 21px; }
    .gantt-bar { position: absolute; height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 6px; font-size: 10px; overflow: hidden; white-space: nowrap; }
    .gantt-gl  { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); }
    .gantt-stu { font-style: italic; color: var(--text-sub); }
    .view-toggle { display: flex; gap: 4px; margin-bottom: 12px; }
    .view-btn { padding: 5px 12px; font-size: 12px; }
    .view-btn.active { background: var(--blue-50); color: var(--blue-700); border-color: var(--blue-100); }
    .cov-wrap { overflow-x: auto; margin-top: 12px; }
    .cov-row  { display: flex; align-items: flex-end; height: 46px; margin-left: 90px; min-width: 440px; }
    .cov-bar  { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 2px; }
    .cov-fill { width: 60%; border-radius: 3px 3px 0 0; background: var(--green-100); min-height: 2px; }
    .cov-num  { font-size: 9px; color: var(--text-muted); }

    /* ── ATTENDANCE ── */
    .att-wrap { overflow-x: auto; margin-bottom: 10px; }
    input.clock { width: 62px; border: 1px solid var(--border-mid); border-radius: 4px; padding: 3px 5px; }

    /* ── CENTER EMPTY STATE ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-sub); }
    .empty-state i { font-size: 36px; display: block; margin-bottom: 12px; }

    /* ── UTILITIES ── */
    .flex          { display: flex; }
    .flex-wrap     { display: flex; flex-wrap: wrap; gap: 6px; }
    .items-center  { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2         { gap: 8px; }
    .mb-1          { margin-bottom: 4px; }
    .mb-2          { margin-bottom: 8px; }
    .text-sm       { font-size: 12px; }
    .text-xs       { font-size: 11px; }
    .font-bold     { font-weight: 700; }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .tab-btn { padding: 7px 8px; font-size: 12px; }
    }

    #login-screen{position:fixed;inset:0;background:#1c1917;display:flex;align-items:center;justify-content:center;z-index:100;}
    .login-box{background:white;border-radius:20px;padding:2.5rem;width:340px;text-align:center;}
    .login-logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}
    .login-sub{font-size:13px;color:var(--text-sub);margin-bottom:2rem;}
    .role-btns{display:flex;gap:8px;margin-bottom:1.25rem;}
    .role-btn{flex:1;padding:10px;border:2px solid var(--border-mid);border-radius:var(--radius-md);background:white;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);}
    .role-btn.selected{border-color:#1c1917;background:#1c1917;color:white;}
    .login-input{width:100%;padding:10px 14px;border:1.5px solid var(--border-mid);border-radius:var(--radius-md);font-size:14px;font-family:var(--font);margin-bottom:10px;outline:none;}
    .login-input:focus{border-color:#1c1917;}
    .login-btn{width:100%;padding:11px;background:#1c1917;color:white;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:8px;}
    .login-btn:hover{background:#44403c;}
    .login-err{font-size:12px;color:var(--red-600);min-height:18px;}
    .login-hint{font-size:11px;color:var(--text-muted);margin-top:12px;}
    #save-indicator{position:fixed;bottom:20px;right:20px;background:#1c1917;color:white;padding:8px 14px;border-radius:100px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50;}
    #save-indicator.show{opacity:1;}
    .role-badge{font-size:11px;font-weight:700;border-radius:100px;padding:4px 10px;background:#1c1917;color:white;}
    .header-right{display:flex;align-items:center;gap:8px;}

  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">老乡鸡 IOI City Mall</div>
    <div class="login-sub">排班系统 · Scheduling System</div>
    <div class="role-btns">
      <button class="role-btn" id="btn-manager" onclick="selectRole('manager')">Store Manager</button>
      <button class="role-btn" id="btn-pic" onclick="selectRole('pic')">PIC / Duty Mgr</button>
    </div>
    <input class="login-input" type="password" id="pw-input" placeholder="Enter password"
      onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">Login</button>
    <div class="login-err" id="login-err"></div>
    <div class="login-hint">Default: manager2025 / pic2025<br/>Change passwords in Cursor before deploying</div>
  </div>
</div>
<div id="save-indicator">Saving...</div>
<div id="main-app" style="display:none">
<div class="container">
  <div id="app"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════
// ⚙️  CONFIG — Change passwords before deploy
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://uoeyvtcxgifvqmoaqfke.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvZXl2dGN4Z2lmdnFtb2FxZmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzI1ODYsImV4cCI6MjA5NTA0ODU4Nn0.an5YStckcVpvI5Phb_Onp09ldMwPQpFRJ3iDwGIDbaw';
const STORE_ID    = 'ioi';
const PASSWORDS   = { manager: 'manager2025', pic: 'pic2025' }; // ⚠️ Change these!

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession:    false,  // don't store session in localStorage
    autoRefreshToken:  false,  // no background token refresh
    detectSessionInUrl: false, // don't parse URL for auth tokens
    // Disabling these prevents Supabase from calling window.postMessage
    // with a Headers object, which causes DataCloneError in some browsers.
  }
});
let currentRole = null;
let selectedLoginRole = null;

function selectRole(role) {
  selectedLoginRole = role;
  document.getElementById('btn-manager').classList.toggle('selected', role === 'manager');
  document.getElementById('btn-pic').classList.toggle('selected',     role === 'pic');
  document.getElementById('pw-input').focus();
}
function doLogin() {
  if (!selectedLoginRole) { document.getElementById('login-err').textContent = 'Please select a role.'; return; }
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORDS[selectedLoginRole]) {
    currentRole = selectedLoginRole;
    sessionStorage.setItem('lxj-role', currentRole);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('login-err').textContent = 'Wrong password.';
    document.getElementById('pw-input').value = '';
  }
}
function logout() { sessionStorage.removeItem('lxj-role'); location.reload(); }

// ── DB FUNCTIONS ──
function showSaving() {
  const el2 = document.getElementById('save-indicator');
  el2.classList.add('show');
  clearTimeout(el2._t);
  el2._t = setTimeout(() => el2.classList.remove('show'), 1800);
}
let _saveTimer = null;
function scheduleSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(saveSchedule, 700); }

async function loadScheduleForDate(date) {
  try {
    const { data, error } = await db.from('daily_schedule').select('*')
      .eq('store_id', STORE_ID).eq('schedule_date', date).maybeSingle();
    if (error) throw error;
    state.assignments = data?.assignments  || {};
    state.extraSlots  = data?.extra_slots  || [];
  } catch (e) { console.error('loadScheduleForDate', e?.message || e?.code || e); }
}
async function saveSchedule() {
  showSaving();
  try {
    const { error } = await db.from('daily_schedule').upsert({
      store_id: STORE_ID, schedule_date: state.selectedDate,
      assignments: state.assignments, extra_slots: state.extraSlots,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'store_id,schedule_date' });
    if (error) throw error;
  } catch (e) { console.error('saveSchedule', e); }
}
async function loadPlannedLeave() {
  try {
    const { data } = await db.from('planned_leave').select('*').eq('store_id', STORE_ID);
    state.plannedLeave = {};
    for (const row of (data || [])) {
      if (!state.plannedLeave[row.employee_id]) state.plannedLeave[row.employee_id] = [];
      state.plannedLeave[row.employee_id].push({ id: row.id, from: row.from_date, to: row.to_date, type: row.leave_type });
    }
  } catch(e) { console.error(e); }
}
async function loadDailyLeave() {
  try {
    const { data } = await db.from('daily_leave').select('*').eq('store_id', STORE_ID);
    state.dailyLeave = {};
    for (const row of (data || [])) {
      if (!state.dailyLeave[row.leave_date]) state.dailyLeave[row.leave_date] = {};
      state.dailyLeave[row.leave_date][row.employee_id] = row.leave_type;
    }
  } catch(e) { console.error(e); }
}
function subscribeToChanges() {
  db.channel('lxj-sync')
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'daily_schedule',
      filter: `store_id=eq.${STORE_ID}`,
    }, p => {
      const row = p.new || p.old;
      if (row?.schedule_date !== state.selectedDate) return;
      if (p.eventType === 'DELETE') {
        state.assignments = {};
        state.extraSlots  = [];
      } else {
        state.assignments = p.new.assignments || {};
        state.extraSlots  = p.new.extra_slots  || [];
      }
      render();
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'planned_leave',
      filter: `store_id=eq.${STORE_ID}`,

// =============================================================================
// LEAVE SYSTEM
// =============================================================================

// Returns { empId: leaveType } for any given date string
function getAbsencesForDate(dateStr) {
  const result = {};
  for (const [empId, leaves] of Object.entries(state.plannedLeave)) {
    if (!Array.isArray(leaves)) continue;
    for (const leave of leaves) {
      if (dateStr >= leave.from && dateStr <= leave.to) result[empId] = leave.type;
    }
  }
  const dayLeave = state.dailyLeave[dateStr] || {};
  for (const [empId, type] of Object.entries(dayLeave)) {
    if (type === null || type === 'present') delete result[empId];  // 'present' = cancelled for today only
    else result[empId] = type;
  }
  return result;
}

function getTodayAbsences() {
  return getAbsencesForDate(state.selectedDate);
}

// Returns [Mon, Tue, Wed, Thu, Fri, Sat, Sun] ISO strings for the week containing dateStr
function getWeekDates(dateStr) {
  const d   = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun
  const monday = new Date(d);
  monday.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    // Use LOCAL date parts — toISOString() returns UTC and would shift the date
    // by 8 hours for UTC+8 (Malaysia), producing the wrong day label.
    const y  = dd.getFullYear();
    const mo = String(dd.getMonth() + 1).padStart(2, '0');
    const dy = String(dd.getDate()).padStart(2, '0');
    dates.push(`${y}-${mo}-${dy}`);
  }
  return dates;
}

async function markDailyLeave(empId, type) {
  try {
    await db.from('daily_leave').upsert({
      store_id: STORE_ID, leave_date: state.selectedDate, employee_id: empId, leave_type: type,
      updated_at: new Date().toISOString()
    }, { onConflict: 'store_id,leave_date,employee_id' });
    if (!state.dailyLeave[state.selectedDate]) state.dailyLeave[state.selectedDate] = {};
    state.dailyLeave[state.selectedDate][empId] = type;
    clearAssignmentsForEmployee(empId);
    await saveSchedule(); render();
  } catch(e) { console.error(e); }
}

async function cancelLeave(empId) {
  try {
    // Use 'present' sentinel → "this person is in today", overrides planned-leave ranges
    // and any day-specific leave. Never deletes the planned-leave range itself.
    // (We avoid storing null to stay safe with NOT NULL DB constraints.)
    await db.from('daily_leave').upsert({
      store_id: STORE_ID, leave_date: state.selectedDate, employee_id: empId,
      leave_type: 'present', updated_at: new Date().toISOString()
    }, { onConflict: 'store_id,leave_date,employee_id' });
    if (!state.dailyLeave[state.selectedDate]) state.dailyLeave[state.selectedDate] = {};
    state.dailyLeave[state.selectedDate][empId] = 'present';
    render();
  } catch(e) { console.error('cancelLeave', e?.message || e); }
}

async function addPlannedLeave(empId, from, to, type) {
  try {
    await db.from('planned_leave').insert({ store_id: STORE_ID, employee_id: empId, from_date: from, to_date: to, leave_type: type });
    if (state.selectedDate >= from && state.selectedDate <= to) { clearAssignmentsForEmployee(empId); await saveSchedule(); }
    await loadPlannedLeave(); render();
  } catch(e) { console.error(e); }
}

async function removePlannedLeave(leaveId) {
  try { await db.from('planned_leave').delete().eq('id', leaveId); await loadPlannedLeave(); render(); }
  catch(e) { console.error(e); }
}

function clearAssignmentsForEmployee(empId) {
  for (const a of Object.values(state.assignments)) {
    if (a?.empId      === empId) { a.empId = null; a.studentId = null; }
    if (a?.studentId  === empId)   a.studentId = null;
  }
}

// =============================================================================
// DERIVED STATE
// =============================================================================

function computeState() {
  const todayAbsences = getTodayAbsences();
  const absentSet     = new Set(Object.keys(todayAbsences));

  const mainAssigned    = new Set();
  const studentAssigned = new Set();

  for (const a of Object.values(state.assignments)) {
    if (a?.empId)      mainAssigned.add(a.empId);
    if (a?.studentId)  studentAssigned.add(a.studentId);
  }
  const assignedSet = new Set([...mainAssigned, ...studentAssigned]);

  const availableStaff = employees.filter(e => !absentSet.has(e.id));
  const unassignedStaff = availableStaff.filter(e => !assignedSet.has(e.id));
  const filledSlots = Object.values(state.assignments).filter(a => a?.empId).length;

  return {
    todayAbsences,
    absentSet,
    mainAssigned,
    studentAssigned,
    assignedSet,
    availableStaff,
    unassignedStaff,
    filledSlots,
  };
}

function allSlots() {
  return [...BASE_SLOTS, ...state.extraSlots];
}

// Is this employee eligible to be the main person for a slot?
function isEligible(employee, slot, computed) {
  if (computed.absentSet.has(employee.id)) return false;

  const assignment = state.assignments[slot.id];
  const alreadyAssigned = computed.assignedSet.has(employee.id);
  const isMainHere    = assignment?.empId     === employee.id;
  const isStudentHere = assignment?.studentId === employee.id;

  if (alreadyAssigned && !isMainHere && !isStudentHere) return false;
  if (employee.availableFrom && employee.availableFrom > slot.startHour) return false;

  if (slot.pos === '打菜')   return true;  // anyone can do 打菜
  if (slot.pos === 'Reserve') return KITCHEN_POSITIONS.filter(p => employee.positions.includes(p)).length >= 3;

  return employee.positions.includes(slot.pos);
}

// Is this employee eligible to be a student for a slot?
function isStudentEligible(employee, slot, computed) {
  if (computed.absentSet.has(employee.id)) return false;
  const assignment = state.assignments[slot.id];
  if (assignment?.empId === employee.id) return false;  // can't be trainer and student
  const alreadyAssigned = computed.assignedSet.has(employee.id);
  if (alreadyAssigned && assignment?.studentId !== employee.id) return false;
  return true;
}

function isTrainerFor(employee, position) {
  return employee.canTrain.includes(position);
}

// =============================================================================
// ASSIGNMENT MUTATIONS
// =============================================================================

function assignSlot(slotId, empId) {
  if (!state.assignments[slotId]) state.assignments[slotId] = {};

  if (empId) {
    // Remove this employee from any other slot they were assigned to
    for (const [otherId, a] of Object.entries(state.assignments)) {
      if (otherId !== slotId) {
        if (a?.empId      === empId) a.empId = null;
        if (a?.studentId  === empId) a.studentId = null;
      }
    }
    state.assignments[slotId].empId = empId;
  } else {
    // Clearing the main person also clears the student
    state.assignments[slotId].empId      = null;
    state.assignments[slotId].studentId  = null;
  }
  saveToStorage();
  render();
}

function assignStudent(slotId, studentId) {
  if (!state.assignments[slotId]) state.assignments[slotId] = {};

  if (studentId) {
    for (const [otherId, a] of Object.entries(state.assignments)) {
      if (otherId !== slotId) {
        if (a?.empId     === studentId) a.empId = null;
        if (a?.studentId === studentId) a.studentId = null;
      }
    }
    state.assignments[slotId].studentId = studentId;
  } else {
    state.assignments[slotId].studentId = null;
  }
  saveToStorage();
  render();
}

function addExtraSlot(position, area, startTime, endTime, empId) {
  const id = 'extra-' + Date.now();
  const startHour = parseHour(startTime);
  const endHour   = parseHour(endTime);

  state.extraSlots.push({
    id, pos: position, area, isFlex: true, isExtra: true,
    shift: `${startTime}–${endTime}`,
    startHour, endHour,
  });

  if (empId) state.assignments[id] = { empId };
  addShiftForm.openPosition = null;
  saveToStorage();
  render();
}

function removeExtraSlot(id) {
  state.extraSlots = state.extraSlots.filter(s => s.id !== id);
  delete state.assignments[id];
  saveToStorage();
  render();
}

// =============================================================================
// DOM HELPERS
// =============================================================================

function el(tag, attrs, ...children) {
  const element = document.createElement(tag);

  if (attrs) {
    for (const [key, value] of Object.entries(attrs)) {
      if (key === 'class') {
        element.className = value;
      } else if (key.startsWith('on') && key.length > 2) {
        element.addEventListener(key.slice(2).toLowerCase(), value);
      } else if (key === 'style' && typeof value === 'object') {
        Object.assign(element.style, value);
      } else {
        element.setAttribute(key, value);
      }
    }
  }

  for (const child of children.flat()) {
    if (child == null) continue;
    element.appendChild(child instanceof Node ? child : document.createTextNode(String(child)));
  }

  return element;
}

function icon(name) {
  const i = document.createElement('i');
  i.className = `ti ti-${name}`;
  return i;
}

function badge(text, cssClass) {
  return el('span', { class: `badge ${cssClass}` }, text);
}

function getRoleStyle(role) {
  return ROLE_STYLE[role] || { bg: '#f5f5f4', color: '#57534e' };
}

function formatDate(dateStr) {
  const d    = new Date(dateStr + 'T00:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function parseHour(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h + (m || 0) / 60;
}

function cleanShift(shift) {
  return shift.replace(/[①②]/g, '').split('·')[0].trim();
}

function createSelect(options, currentValue, onChange, extraStyle) {
  const sel = document.createElement('select');
  if (extraStyle) sel.style.cssText = extraStyle;
  for (const [value, label] of options) {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = label;
    if (value === currentValue) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', e => onChange(e.target.value));
  return sel;
}

// =============================================================================
// STATUS PANEL
// =============================================================================

function renderStatusPanel(computed) {
  const frag = document.createDocumentFragment();

  // Core slots check
  const coreUnfilled = CORE_SLOT_IDS.filter(id => !state.assignments[id]?.empId);

  if (coreUnfilled.length > 0) {
    const alertEl = el('div', { class: 'alert alert-danger' });
    const titleEl = el('div', { class: 'alert-title' }, icon('alert-triangle'), ` Core positions unfilled (${coreUnfilled.length})`);
    const bodyText = coreUnfilled
      .map(id => { const s = allSlots().find(x => x.id === id); return s ? `${s.pos} ${s.shift}` : id; })
      .join(' · ');
    alertEl.appendChild(titleEl);
    alertEl.appendChild(el('div', { class: 'alert-body' }, bodyText));
    frag.appendChild(alertEl);
  } else {
    const alertEl = el('div', { class: 'alert alert-success' });
    alertEl.appendChild(el('div', { class: 'alert-title' }, icon('check'), ' All core positions filled'));
    frag.appendChild(alertEl);
  }

  // Unassigned staff
  if (computed.unassignedStaff.length > 0) {
    const panel = el('div', { class: 'unassigned-panel' });
    const header = el('div', { class: 'unassigned-header', onClick: () => { state.showUnassigned = !state.showUnassigned; render(); } });
    const leftPart = el('div', { style: { display:'flex', alignItems:'center', gap:'6px' } }, icon('user-question'), ` Unassigned staff: ${computed.unassignedStaff.length}`);
    header.appendChild(leftPart);
    header.appendChild(icon(state.showUnassigned ? 'chevron-up' : 'chevron-down'));
    panel.appendChild(header);

    if (state.showUnassigned) {
      const chipRow = el('div', { class: 'chip-row' });
      for (const emp of computed.unassignedStaff) {
        const style = getRoleStyle(emp.role);
        chipRow.appendChild(el('span', { class: 'staff-chip', style: { background: style.bg, color: style.color } }, emp.shortName));
      }
      panel.appendChild(chipRow);
    }

    frag.appendChild(panel);
  }

  return frag;
}

// =============================================================================
// SCHEDULE TAB
// =============================================================================

function renderScheduleTab(computed) {
  const frag = document.createDocumentFragment();
  frag.appendChild(renderStatusPanel(computed));

  // Group slots by area → position
  const grouped = AREAS.map(area => {
    const slots     = allSlots().filter(s => s.area === area);
    const positions = [...new Set(slots.map(s => s.pos))];
    return { area, positions: positions.map(pos => ({ pos, slots: slots.filter(s => s.pos === pos) })) };
  });

  for (const { area, positions } of grouped) {
    const areaWrap = el('div', { style: { marginBottom: '1.5rem' } });
    areaWrap.appendChild(el('div', { class: `area-label ${AREA_LABEL_CLASS[area] || 'area-reserve'}` }, area));

    for (const { pos, slots } of positions) {
      const isKitchenFixed = KITCHEN_POSITIONS.includes(pos);
      const hasFlex        = slots.some(s => s.isFlex);
      const card           = el('div', { class: 'card' });

      // Position header
      const posHeader = el('div', { class: 'flex items-center justify-between', style: { marginBottom: '10px' } });
      const posTitle  = el('p', { style: { fontSize:'13px', fontWeight:'700', margin:'0' } }, pos);

      if (pos === 'Reserve') posTitle.appendChild(el('span', { style: { fontSize:'11px', color:'var(--text-sub)', marginLeft:'6px' } }, '(3+ kitchen positions)'));
      if (pos === '打菜')    posTitle.appendChild(el('span', { style: { fontSize:'11px', color:'var(--text-sub)', marginLeft:'6px' } }, '(all staff eligible)'));

      posHeader.appendChild(posTitle);

      if (hasFlex) {
        const addBtn = el('button', { class: 'btn-sm', onClick: () => { addShiftForm.openPosition = addShiftForm.openPosition === pos ? null : pos; render(); } });
        addBtn.appendChild(icon(addShiftForm.openPosition === pos ? 'x' : 'plus'));
        addBtn.appendChild(document.createTextNode(addShiftForm.openPosition === pos ? ' Cancel' : ' Add Shift'));
        posHeader.appendChild(addBtn);
      }
      card.appendChild(posHeader);

      // Add shift form (if open for this position)
      if (addShiftForm.openPosition === pos) {
        const form = el('div', { class: 'add-shift-form' });

        const eligibleForPos = computed.availableStaff.filter(e => {
          if (pos === '打菜')    return true;
          if (pos === 'Reserve') return KITCHEN_POSITIONS.filter(p => e.positions.includes(p)).length >= 3;
          return e.positions.includes(pos);
        });

        const startOpts = [['', '-- Start --'], ...FH_START_TIMES.map(t => [t, t])];
        const endOpts   = [['', '-- End --'],   ...FH_END_TIMES.map(t => [t, t])];
        const empOpts   = [['', 'Assign (optional)'], ...eligibleForPos.map(e => [e.id, e.shortName])];

        const startSel = createSelect(startOpts, addShiftForm.startTime, v => { addShiftForm.startTime = v; render(); });
        const endSel   = createSelect(endOpts,   addShiftForm.endTime,   v => { addShiftForm.endTime   = v; render(); });
        const empSel   = createSelect(empOpts,   addShiftForm.employeeId, v => { addShiftForm.employeeId = v; });

        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Start'), startSel));
        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'End'),   endSel));
        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Assign'), empSel));

        const confirmBtn = el('button', { style: { alignSelf:'flex-end' }, onClick: () => {
          if (!addShiftForm.startTime || !addShiftForm.endTime) return;
          addExtraSlot(pos, area, addShiftForm.startTime, addShiftForm.endTime, addShiftForm.employeeId || undefined);
        }});
        confirmBtn.appendChild(icon('check'));
        confirmBtn.appendChild(document.createTextNode(' Add'));
        form.appendChild(confirmBtn);
        card.appendChild(form);
      }

      // Slot boxes
      const slotsWrap = el('div', { class: 'slots-wrap' });

      for (const slot of slots) {
        const assignment  = state.assignments[slot.id] || {};
        const currentEmpId = assignment.empId;
        const currentStuId = assignment.studentId;
        const isFilled     = !!currentEmpId;

        const mainEmployee   = employees.find(e => e.id === currentEmpId);
        const canAddStudent  = isFilled && isKitchenFixed && mainEmployee && isTrainerFor(mainEmployee, slot.pos);

        const eligibleStaff  = computed.availableStaff.filter(e => isEligible(e, slot, computed));
        const eligibleStudents = computed.availableStaff.filter(e => isStudentEligible(e, slot, computed));

        const slotWrap = el('div', {});
        const slotBox  = el('div', { class: `slot-box${isFilled ? ' filled' : ''}` });

        // Shift label
        slotBox.appendChild(el('div', { class: `slot-shift${isFilled ? ' filled' : ' unfilled'}` },
          slot.shift + (slot.note ? ` · ${slot.note}` : '')));

        // Main assignment select
        const mainSel = document.createElement('select');
        mainSel.className = 'slot-select';

        const blankOpt = document.createElement('option');
        blankOpt.value = ''; blankOpt.textContent = '— Unassigned —';
        mainSel.appendChild(blankOpt);

        for (const emp of eligibleStaff) {
          const opt = document.createElement('option');
          opt.value = emp.id;
          let label = emp.shortName;
          if (isKitchenFixed && isTrainerFor(emp, slot.pos)) label += ' (T)';
          if (emp.tags.length) label += ` [${emp.tags.join('/')}]`;
          opt.textContent = label;
          if (emp.id === currentEmpId) opt.selected = true;
          mainSel.appendChild(opt);
        }
        if (!currentEmpId) mainSel.value = '';
        mainSel.addEventListener('change', e => assignSlot(slot.id, e.target.value || undefined));
        slotBox.appendChild(mainSel);

        // Remove button for extra slots
        if (slot.isExtra) {
          const removeBtn = el('button', { class: 'btn-sm btn-danger', style: { marginTop: '4px', fontSize:'10px' }, onClick: () => removeExtraSlot(slot.id) });
          removeBtn.appendChild(icon('trash'));
          slotBox.appendChild(removeBtn);
        }

        slotWrap.appendChild(slotBox);

        // Student slot (only for kitchen fixed positions)
        if (isKitchenFixed) {
          const studentBox = el('div', { class: 'student-box', style: { opacity: canAddStudent ? '1' : '0.4' } });
          const studentLabel = el('div', { class: 'student-label' });
          studentLabel.appendChild(icon('school'));
          studentLabel.appendChild(document.createTextNode(canAddStudent ? ' Student' : ' Need Trainer to add student'));
          studentBox.appendChild(studentLabel);

          if (canAddStudent) {
            const studentSel = document.createElement('select');
            studentSel.style.cssText = 'border:none;background:transparent;padding:0;width:100%;font-size:12px;cursor:pointer;font-family:inherit;';

            const blankStudentOpt = document.createElement('option');
            blankStudentOpt.value = ''; blankStudentOpt.textContent = '— No student —';
            studentSel.appendChild(blankStudentOpt);

            for (const emp of eligibleStudents) {
              const opt = document.createElement('option');
              opt.value = emp.id; opt.textContent = emp.shortName;
              if (emp.id === currentStuId) opt.selected = true;
              studentSel.appendChild(opt);
            }
            if (!currentStuId) studentSel.value = '';
            studentSel.addEventListener('change', e => assignStudent(slot.id, e.target.value || undefined));
            studentBox.appendChild(studentSel);
          }

          slotWrap.appendChild(studentBox);
        }

        slotsWrap.appendChild(slotWrap);
      }

      card.appendChild(slotsWrap);
      areaWrap.appendChild(card);
    }

    frag.appendChild(areaWrap);
  }

  return frag;
}

function renderEmployeesTab() {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();

  // Search input
  const searchInput = el('input', {
    type: 'text', placeholder: 'Search staff name...',
    value: state.searchQuery,
    style: { width: '100%', marginBottom: '10px' },
  });
  searchInput.addEventListener('input', e => { state.searchQuery = e.target.value; render(); });
  frag.appendChild(searchInput);

  const query    = state.searchQuery.toLowerCase();
  const filtered = employees.filter(e => !query || e.shortName.toLowerCase().includes(query) || e.fullName.toLowerCase().includes(query));

  frag.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'10px' } }, `${filtered.length} / ${employees.length} staff`));

  for (const emp of filtered) {
    const leaveType = absences[emp.id];
    const isAbsent  = !!leaveType;

    const row = el('div', { class: `emp-row${isAbsent ? ' absent' : ''}` });

    // Avatar
    const roleStyle = getRoleStyle(emp.role);
    const avatar = el('div', { class: 'emp-avatar', style: { background: roleStyle.bg, color: roleStyle.color } }, emp.shortName[0]);
    row.appendChild(avatar);

    // Info
    const info = el('div', { style: { flex: '1', minWidth: '0' } });

    // Name row
    const nameRow = el('div', { class: 'flex items-center gap-2 mb-1', style: { flexWrap: 'wrap' } });
    nameRow.appendChild(el('span', { class: 'emp-name' }, emp.shortName));
    nameRow.appendChild(el('span', { class: 'emp-fname' }, emp.fullName));
    if (leaveType) {
      const lt = LEAVE_TYPES[leaveType];
      if (lt) nameRow.appendChild(badge(lt.label, lt.badgeClass));
    }
    info.appendChild(nameRow);

    // Meta badges
    const metaRow = el('div', { class: 'emp-meta' });
    metaRow.appendChild(el('span', { class: 'badge badge-gray', style: { background: roleStyle.bg, color: roleStyle.color } }, emp.role));
    if (emp.availableFrom > 0)  metaRow.appendChild(badge(`From ${emp.availableFrom}:00`, 'badge-amber'));
    for (const tag of emp.tags) metaRow.appendChild(badge(tag, 'badge-blue'));
    info.appendChild(metaRow);

    // Positions
    const kitchenCount = emp.positions.filter(p => KITCHEN_POSITIONS.includes(p)).length;
    const posText = emp.positions.join(' · ') + (kitchenCount >= 3 ? ' · 🔄 Reserve' : '');
    info.appendChild(el('p', { class: 'emp-pos mb-1' }, posText));

    // Trainer badges
    if (emp.canTrain.length > 0) {
      const trainerRow = el('div', { class: 'flex-wrap', style: { marginBottom: '4px' } });
      trainerRow.appendChild(icon('award'));
      for (const pos of emp.canTrain) trainerRow.appendChild(badge('T: ' + pos, 'badge-blue'));
      info.appendChild(trainerRow);
    }

    // Off day
    if (emp.offDay) {
      const offRow = el('div', { class: 'flex items-center gap-1 text-xs', style: { color: 'var(--text-sub)', marginBottom: emp.managerNote ? '4px' : '0' } });
      offRow.appendChild(icon('calendar-off'));
      offRow.appendChild(document.createTextNode(' ' + emp.offDay));
      info.appendChild(offRow);
    }

    // Manager note — only shown to manager role
    if (emp.managerNote && currentRole === 'manager') {
      const noteBox = el('div', { class: 'manager-note' });
      const noteTitle = el('div', { class: 'flex items-center gap-1', style: { fontWeight: '600', marginBottom: '2px', fontSize: '11px' } });
      noteTitle.appendChild(icon('lock'));
      noteTitle.appendChild(document.createTextNode(' Manager note'));
      noteBox.appendChild(noteTitle);
      noteBox.appendChild(document.createTextNode(emp.managerNote));
      info.appendChild(noteBox);
    }

    row.appendChild(info);

    // Action buttons
    const actions = el('div', { class: 'emp-actions' });
    if (isAbsent) {
      const cancelBtn = el('button', { class: 'btn-sm btn-success', onClick: () => cancelLeave(emp.id) }, 'Cancel Leave');
      actions.appendChild(cancelBtn);
    } else {
      for (const [type, info2] of Object.entries(LEAVE_TYPES)) {
        const btn = el('button', { class: `btn-sm ${info2.badgeClass.replace('badge-', 'btn-')}`, onClick: () => markDailyLeave(emp.id, type) });
        btn.textContent = info2.label;
        actions.appendChild(btn);
      }
    }

    row.appendChild(actions);
    frag.appendChild(row);
  }

  return frag;
}

function renderWeekPreview() {
  const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const weekDates  = getWeekDates(state.selectedDate);
  const weekAbs    = weekDates.map(d => getAbsencesForDate(d));

  // Split employees: has any absence this week vs. none
  const withLeave    = employees.filter(emp => weekAbs.some(dayAbs => emp.id in dayAbs));
  const withoutLeave = employees.filter(emp => !weekAbs.some(dayAbs => emp.id in dayAbs));

  const frag = document.createDocumentFragment();
  frag.appendChild(el('p', { class: 'section-title', style: { marginTop: '0' } }, 'This Week'));

  // ── Shared table header builder ──
  const thBase = 'padding:6px 8px; font-weight:600; font-size:11px; color:var(--text-sub); border-bottom:1px solid var(--border); text-align:center;';
  const tdBase = 'padding:5px 8px; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle;';

  function buildHeader() {
    return el('thead', {}, el('tr', {}, ...[
      el('th', { style: thBase + 'text-align:left; min-width:80px;' }, 'Employee'),
      ...weekDates.map((d, i) => {
        const isSel    = d === state.selectedDate;
        const datePart = d.slice(5).replace('-', '/');
        const th = el('th', { style: thBase + `min-width:56px;${isSel ? 'background:var(--blue-50);color:var(--blue-700);border-radius:4px 4px 0 0;' : ''}` });
        th.appendChild(document.createTextNode(DAY_LABELS[i]));
        th.appendChild(el('br', {}));
        th.appendChild(el('span', { style: 'font-weight:400;' }, datePart));
        return th;
      })
    ]));
  }

  // ── Section 1: employees WITH leave ──
  if (withLeave.length === 0) {
    frag.appendChild(el('p', { style: { fontSize:'13px', color:'var(--text-sub)', marginBottom:'8px' } }, '✅ No absences scheduled this week.'));
  } else {
    const wrap  = el('div', { style: { overflowX:'auto', marginBottom:'12px' } });
    const table = el('table', { style: { width:'100%', borderCollapse:'collapse', fontSize:'12px' } });
    table.appendChild(buildHeader());
    const tbody = el('tbody', {});

    for (const emp of withLeave) {
      const tr = el('tr', {});
      tr.appendChild(el('td', { style: tdBase + 'text-align:left; font-weight:600;' }, emp.shortName));

      for (let i = 0; i < 7; i++) {
        const leaveType = weekAbs[i][emp.id];
        const isSel     = weekDates[i] === state.selectedDate;
        const td = el('td', { style: tdBase + (isSel ? 'background:var(--blue-50);' : '') });

        if (leaveType) {
          const lt = LEAVE_TYPES[leaveType] || { label: leaveType, badgeClass: 'badge-gray' };
          const planRecord = (state.plannedLeave[emp.id] || []).find(
            lv => weekDates[i] >= lv.from && weekDates[i] <= lv.to
          );
          const b = el('span', {
            class: `badge ${lt.badgeClass}`,
            style: `font-size:10px;${planRecord ? 'cursor:pointer;' : ''}`,
            title: planRecord ? 'Click to jump to record' : lt.label
          }, lt.label);
          if (planRecord) {
            b.addEventListener('click', () => {
              const target = document.getElementById('upcoming-item-' + planRecord.id);
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.style.transition = 'background 0.3s';
                target.style.background = 'var(--blue-50)';
                setTimeout(() => { target.style.background = ''; }, 1600);
              }
            });
          }
          td.appendChild(b);
        } else {
          td.appendChild(el('span', { style: 'color:var(--text-muted);' }, '—'));
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    frag.appendChild(wrap);
  }

  // ── Section 2: employees WITHOUT leave (collapsible) ──
  const colHeader = el('div', {
    style: `display:flex; align-items:center; gap:6px; cursor:pointer; padding:6px 10px;
            background:var(--gray-50); border:1px solid var(--border);
            border-radius:var(--radius-sm); margin-bottom:${weekPreviewExpanded ? '0' : '20px'};
            user-select:none;`,
    onClick: () => { weekPreviewExpanded = !weekPreviewExpanded; render(); }
  });
  colHeader.appendChild(icon(weekPreviewExpanded ? 'chevron-down' : 'chevron-right'));
  colHeader.appendChild(el('span', { style: 'font-size:12px; font-weight:600; color:var(--text-sub);' },
    `No Leave This Week (${withoutLeave.length} staff)`));
  frag.appendChild(colHeader);

  if (weekPreviewExpanded && withoutLeave.length > 0) {
    const wrap2  = el('div', { style: 'overflow-x:auto; margin-bottom:20px; border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);' });
    const table2 = el('table', { style: 'width:100%; border-collapse:collapse; font-size:12px;' });
    table2.appendChild(buildHeader());
    const tbody2 = el('tbody', {});

    for (const emp of withoutLeave) {
      const tr = el('tr', {});
      tr.appendChild(el('td', { style: tdBase + 'text-align:left; font-weight:600;' }, emp.shortName));
      for (let i = 0; i < 7; i++) {
        const isSel = weekDates[i] === state.selectedDate;
        const td = el('td', { style: tdBase + (isSel ? 'background:var(--blue-50);' : '') });
        td.appendChild(el('span', { style: 'color:var(--text-muted);' }, '—'));
        tr.appendChild(td);
      }
      tbody2.appendChild(tr);
    }
    table2.appendChild(tbody2);
    wrap2.appendChild(table2);
    frag.appendChild(wrap2);
  }

  return frag;
}



function renderLeaveTab(computed) {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();
  const absList  = Object.entries(absences);

  // ── This Week Preview ──
  frag.appendChild(renderWeekPreview());

  // ── Today's absences ──
  frag.appendChild(el('p', { class: 'section-title' }, "Today's Absences"));

  if (absList.length === 0) {
    frag.appendChild(el('p', { style: { fontSize:'13px', color:'var(--text-sub)', marginBottom:'12px' } }, 'No absences today.'));
  } else {
    for (const [empId, leaveType] of absList) {
      const emp = employees.find(e => e.id === empId);
      if (!emp) continue;
      const lt = LEAVE_TYPES[leaveType] || { label: leaveType, badgeClass: 'badge-gray' };

      const card = el('div', { class: 'leave-card' });
      const topRow = el('div', { class: 'leave-row' });
      const leftPart = el('div', { class: 'flex items-center gap-2' });
      leftPart.appendChild(el('span', { style: { fontWeight: '700' } }, emp.shortName));
      leftPart.appendChild(el('span', { class: 'text-sm', style: { color: 'var(--text-sub)' } }, emp.fullName));
      leftPart.appendChild(badge(lt.label, lt.badgeClass));
      topRow.appendChild(leftPart);
      topRow.appendChild(el('button', { class: 'btn-sm', onClick: () => cancelLeave(empId) }, 'Cancel'));
      card.appendChild(topRow);

      // Cover needed?
      const needsCover = allSlots().filter(s => state.assignments[s.id]?.empId === empId);
      if (needsCover.length > 0) {
        const coverNote = el('div', { style: { display:'flex', alignItems:'center', gap:'5px', fontSize:'12px', color:'var(--red-600)', marginTop:'6px' } });
        coverNote.appendChild(icon('alert-triangle'));
        coverNote.appendChild(document.createTextNode(' Cover needed: ' + needsCover.map(s => `${s.pos} ${s.shift}`).join(', ')));
        card.appendChild(coverNote);

        // Suggest candidates for first slot needing cover
        const firstSlot  = needsCover[0];
        const fakeComputed = { ...computed, assignedSet: new Set([...computed.assignedSet].filter(id => id !== empId)) };
        const candidates  = computed.availableStaff.filter(e => isEligible(e, firstSlot, fakeComputed));

        if (candidates.length > 0) {
          const candRow = el('div', { class: 'flex-wrap', style: { marginTop: '6px' } });
          for (const cand of candidates.slice(0, 5)) {
            const btn = el('button', { class: 'btn-sm btn-success', onClick: () => assignSlot(firstSlot.id, cand.id) }, cand.shortName);
            candRow.appendChild(btn);
          }
          card.appendChild(candRow);
        }
      }

      frag.appendChild(card);
    }
  }

  // ── Schedule leave ahead ──
  frag.appendChild(el('p', { class: 'section-title' }, 'Schedule Leave Ahead'));

  const formCard = el('div', { class: 'card' });

  const empOpts  = [['', '-- Select employee --'], ...employees.map(e => [e.id, `${e.shortName} (${e.fullName})`])];
  const typeOpts = Object.entries(LEAVE_TYPES).map(([k, v]) => [k, v.label]);

  const empSel   = createSelect(empOpts,  leaveForm.employeeId, v => { leaveForm.employeeId = v; });
  const typeSel  = createSelect(typeOpts, leaveForm.type,       v => { leaveForm.type = v; });

  const fromInput = el('input', { type: 'date', value: leaveForm.fromDate || state.selectedDate });
  fromInput.addEventListener('change', e => { leaveForm.fromDate = e.target.value; });

  const toInput = el('input', { type: 'date', value: leaveForm.toDate || state.selectedDate });
  toInput.addEventListener('change', e => { leaveForm.toDate = e.target.value; });

  const row1 = el('div', { class: 'flex gap-2', style: { flexWrap: 'wrap', marginBottom: '8px' } });
  row1.appendChild(el('div', { class: 'form-group', style: { flex: '2', minWidth: '160px' } }, el('label', { class: 'form-label' }, 'Employee'), empSel));
  row1.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Leave Type'), typeSel));

  const row2 = el('div', { class: 'flex gap-2', style: { flexWrap: 'wrap', alignItems: 'flex-end' } });
  row2.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'From'), fromInput));
  row2.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'To'), toInput));

  const scheduleBtn = el('button', { style: { alignSelf: 'flex-end' }, onClick: () => {
    if (!leaveForm.employeeId || !leaveForm.fromDate || !leaveForm.toDate) return;
    const toastEmp = employees.find(e => e.id === leaveForm.employeeId);
    const { employeeId, fromDate, toDate, type } = leaveForm;
    leaveFormToast = { empName: toastEmp?.shortName || '', from: fromDate, to: toDate };
    leaveForm.employeeId = ''; // keep dates + type for quick next entry
    addPlannedLeave(employeeId, fromDate, toDate, type); // async, re-renders when done
    setTimeout(() => { leaveFormToast = null; render(); }, 2500);
  }});
  scheduleBtn.appendChild(icon('calendar-plus'));
  scheduleBtn.appendChild(document.createTextNode(' Schedule'));
  row2.appendChild(scheduleBtn);

  formCard.appendChild(row1);
  formCard.appendChild(row2);

  // ── Toast confirmation ──
  if (leaveFormToast) {
    const toast = el('div', { style: { display:'flex', alignItems:'center', gap:'6px', marginTop:'10px', padding:'8px 12px', background:'var(--green-50)', border:'1px solid var(--green-100)', borderRadius:'var(--radius-sm)', fontSize:'13px', color:'var(--green-700)' } });
    toast.appendChild(icon('check'));
    toast.appendChild(document.createTextNode(` ${leaveFormToast.empName} — ${leaveFormToast.from} → ${leaveFormToast.to} added`));
    formCard.appendChild(toast);
  }

  frag.appendChild(formCard);

  // ── Upcoming leave list ──
  const upcoming = [];
  for (const [empId, leaves] of Object.entries(state.plannedLeave)) {
    if (!Array.isArray(leaves)) continue;
    for (const [index, lv] of leaves.entries()) {
      if (lv.to >= state.selectedDate) {
        const emp = employees.find(e => e.id === empId);
        if (emp) upcoming.push({ emp, lv, empId, index });
      }
    }
  }
  upcoming.sort((a, b) => a.lv.from.localeCompare(b.lv.from));

  if (upcoming.length > 0) {
    frag.appendChild(el('p', { class: 'section-title' }, 'Upcoming Scheduled Leave'));

    for (const { emp, lv, empId, index } of upcoming) {
      const lt = LEAVE_TYPES[lv.type] || { label: lv.type, badgeClass: 'badge-gray' };
      const item = el('div', { class: 'upcoming-item', id: `upcoming-item-${lv.id}`, style: { transition: 'background 0.4s' } });
      const left = el('div', { class: 'flex items-center gap-2' });
      left.appendChild(el('span', { style: { fontWeight: '700', fontSize: '13px' } }, emp.shortName));
      left.appendChild(badge(lt.label, lt.badgeClass));
      left.appendChild(el('span', { class: 'text-xs', style: { color: 'var(--text-sub)' } }, `${lv.from} → ${lv.to}`));
      item.appendChild(left);
      const delBtn = el('button', { class: 'btn-sm btn-danger', onClick: () => removePlannedLeave(lv.id) });
      delBtn.appendChild(icon('trash'));
      delBtn.appendChild(document.createTextNode(' Delete range'));
      item.appendChild(delBtn);
      frag.appendChild(item);
    }
  }

  return frag;
}

function renderRosterTab() {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();

  // Build quick lookup: empId → their slot
  const mainMap   = {};  // empId → slot (main assignment)
  const studentMap = {}; // empId → { slot, trainerId }
  for (const slot of allSlots()) {
    const a = state.assignments[slot.id];
    if (a?.empId)      mainMap[a.empId]    = slot;
    if (a?.studentId)  studentMap[a.studentId] = { slot, trainerId: a.empId };
  }

  frag.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'12px' } }, 'Staff in Excel order · Off Day shown for absent staff'));

  const wrap = el('div', { class: 'roster-wrap' });

  // Header with prominent date
  const headerEl = el('div', { class: 'roster-header' });
  headerEl.appendChild(el('div', { class: 'roster-store' }, 'Lao Xiang Ji IOI City Mall'));
  headerEl.appendChild(el('div', { class: 'roster-date' }, formatDate(state.selectedDate)));
  wrap.appendChild(headerEl);

  const table = el('table', {});
  table.appendChild(el('thead', {}, el('tr', {}, ...['Staff', 'Position', 'Shift', 'Role'].map(t => el('th', {}, t)))));

  const tbody = el('tbody', {});

  for (const emp of employees) {
    const leaveType = absences[emp.id];
    const isAbsent  = !!leaveType;
    const tr = el('tr', { class: isAbsent ? 'row-off' : '' });

    if (isAbsent) {
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, emp.shortName)));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, 'Off Day'));
      tr.appendChild(el('td', {}));
    } else if (mainMap[emp.id]) {
      const slot   = mainMap[emp.id];
      const isTrainer = KITCHEN_POSITIONS.includes(slot.pos) && isTrainerFor(emp, slot.pos);
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, emp.shortName)));
      tr.appendChild(el('td', {}, slot.pos));
      tr.appendChild(el('td', {}, cleanShift(slot.shift)));
      tr.appendChild(el('td', {}, isTrainer ? badge('T', 'badge-blue') : ''));
    } else if (studentMap[emp.id]) {
      const { slot, trainerId } = studentMap[emp.id];
      const trainer = employees.find(e => e.id === trainerId);
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, emp.shortName)));
      tr.appendChild(el('td', {}, slot.pos));
      tr.appendChild(el('td', {}, cleanShift(slot.shift)));
      tr.appendChild(el('td', {}, el('span', { class: 'text-xs', style: { color: 'var(--text-sub)' } }, 'Student w/ ' + (trainer?.shortName || '?'))));
    } else {
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600', color: 'var(--text-muted)' } }, emp.shortName)));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}));
    }

    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  wrap.appendChild(table);
  frag.appendChild(wrap);

  // Copy button
  const copyBtn = el('button', { onClick: async () => {
    const absences2 = getTodayAbsences();
    const mm = {}; const sm = {};
    for (const s of allSlots()) {
      const a = state.assignments[s.id];
      if (a?.empId)      mm[a.empId]    = s;
      if (a?.studentId)  sm[a.studentId] = { s, tid: a.empId };
    }
    const lines = ['Lao Xiang Ji IOI City Mall', formatDate(state.selectedDate), ''];
    for (const emp of employees) {
      if (absences2[emp.id]) {
        lines.push(`${emp.shortName}\tOff Day`);
      } else if (mm[emp.id]) {
        const s = mm[emp.id];
        const isT = KITCHEN_POSITIONS.includes(s.pos) && isTrainerFor(emp, s.pos);
        lines.push(`${emp.shortName}\t${s.pos}\t${cleanShift(s.shift)}${isT ? ' (T)' : ''}`);
      } else if (sm[emp.id]) {
        const { s, tid } = sm[emp.id];
        const t = employees.find(e => e.id === tid);
        lines.push(`${emp.shortName}\t${s.pos}\t${cleanShift(s.shift)} (Student w/ ${t?.shortName || '?'})`);
      } else {
        lines.push(`${emp.shortName}\t—`);
      }
    }
    try {
      await navigator.clipboard.writeText(lines.join('\n'));
      copyBtn.textContent = '✓ Copied!';
      setTimeout(() => { copyBtn.innerHTML = ''; copyBtn.appendChild(icon('copy')); copyBtn.appendChild(document.createTextNode(' Copy Roster')); }, 2000);
    } catch (e) {}
  }});
  copyBtn.appendChild(icon('copy'));
  copyBtn.appendChild(document.createTextNode(' Copy Roster'));
  frag.appendChild(copyBtn);

  return frag;
}

function renderGanttTab() {
  const frag = document.createDocumentFragment();
  const view = GANTT_VIEWS[state.ganttView];
  const span = view.endHour - view.startHour;

  // View toggle
  const toggleRow = el('div', { class: 'view-toggle' });
  for (const [key, v] of Object.entries(GANTT_VIEWS)) {
    const btn = el('button', { class: `view-btn${state.ganttView === key ? ' active' : ''}`, onClick: () => { state.ganttView = key; render(); } }, v.label);
    toggleRow.appendChild(btn);
  }
  frag.appendChild(toggleRow);

  // Filter slots for this view
  const visibleSlots = allSlots().filter(slot => {
    if (!state.assignments[slot.id]?.empId) return false;
    if (state.ganttView === 'early') return slot.startHour < 16;
    if (state.ganttView === 'late')  return slot.endHour   > 14;
    return true;
  });

  if (visibleSlots.length === 0) {
    const empty = el('div', { class: 'empty-state' });
    empty.appendChild(icon('chart-gantt'));
    empty.appendChild(el('p', {}, 'No shifts assigned for this view'));
    frag.appendChild(empty);
    return frag;
  }

  frag.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-sub)', marginBottom:'8px' } }, 'T = Trainer  ·  S = Student  ·  Grey bar = student  ·  (1h break) shown for front-of-house'));

  const wrapper = el('div', { class: 'gantt-scroll' });

  // Timeline header
  const timeline = el('div', { class: 'gantt-tl' });
  for (let h = view.startHour; h <= view.endHour; h++) {
    timeline.appendChild(el('div', { class: 'gantt-hr' }, h + ':00'));
  }
  wrapper.appendChild(timeline);

  const absences = getTodayAbsences();

  for (const area of AREAS) {
    const areaSlots = visibleSlots.filter(s => s.area === area);
    if (areaSlots.length === 0) continue;

    const areaStyle = AREA_LABEL_CLASS[area] || 'area-reserve';
    wrapper.appendChild(el('div', { class: `gantt-al ${areaStyle}` }, area));

    for (const slot of areaSlots) {
      const assignment  = state.assignments[slot.id];
      const mainEmp     = employees.find(e => e.id === assignment.empId);
      const studentEmp  = assignment.studentId ? employees.find(e => e.id === assignment.studentId) : null;
      const isTrainer   = KITCHEN_POSITIONS.includes(slot.pos) && mainEmp && isTrainerFor(mainEmp, slot.pos);

      // Clamp bar to view window
      const barStart  = Math.max(slot.startHour, view.startHour);
      const barEnd    = Math.min(slot.endHour,   view.endHour);
      const leftPct   = ((barStart - view.startHour) / span) * 100;
      const widthPct  = ((barEnd - barStart)          / span) * 100;

      const barLabel  = `${slot.pos} ${cleanShift(slot.shift)}`;
      const isFront   = FRONT_POSITIONS.includes(slot.pos);

      // Main row
      const mainRow = el('div', { class: 'gantt-row' });
      mainRow.appendChild(el('div', { class: 'gantt-nm' }, `${mainEmp?.shortName || '?'}${isTrainer ? ' T' : ''}`));

      const barArea = el('div', { class: 'gantt-ba' });
      for (let h = view.startHour; h <= view.endHour; h++) {
        barArea.appendChild(el('div', { class: 'gantt-gl', style: { left: `${((h - view.startHour) / span) * 100}%` } }));
      }

      // Colour based on area
      const barColors = {
        '后厨': { bg: '#dbeafe', color: '#1e40af' },
        '前厅': { bg: '#dcfce7', color: '#065f46' },
        '管理': { bg: '#fef3c7', color: '#92400e' },
        '后备': { bg: '#f5f5f4', color: '#57534e' },
      };
      const bc = barColors[area] || barColors['后备'];
      barArea.appendChild(el('div', { class: 'gantt-bar', style: { left: `${leftPct}%`, width: `${widthPct}%`, background: bc.bg, color: bc.color } }, barLabel + (isFront ? ' (1h break)' : '')));
      mainRow.appendChild(barArea);
      wrapper.appendChild(mainRow);

      // Student row (if any)
      if (studentEmp) {
        const stuRow = el('div', { class: 'gantt-row' });
        stuRow.appendChild(el('div', { class: 'gantt-nm gantt-stu' }, `${studentEmp.shortName} S`));

        const stuBarArea = el('div', { class: 'gantt-ba' });
        for (let h = view.startHour; h <= view.endHour; h++) {
          stuBarArea.appendChild(el('div', { class: 'gantt-gl', style: { left: `${((h - view.startHour) / span) * 100}%` } }));
        }
        stuBarArea.appendChild(el('div', { class: 'gantt-bar', style: { left: `${leftPct}%`, width: `${widthPct}%`, background: '#f5f5f4', color: '#57534e', borderLeft: `3px solid ${bc.bg}` } }, `Student · ${slot.pos}`));
        stuRow.appendChild(stuBarArea);
        wrapper.appendChild(stuRow);
      }
    }
  }

  // ── Coverage curve ──
  const coverage = {};
  for (let h = view.startHour; h < view.endHour; h++) coverage[h] = 0;

  for (const slot of allSlots()) {
    if (!FRONT_POSITIONS.includes(slot.pos)) continue;
    const a = state.assignments[slot.id];
    if (!a?.empId || absences[a.empId]) continue;
    for (let h = view.startHour; h < view.endHour; h++) {
      if (h >= slot.startHour && h < slot.endHour) coverage[h]++;
    }
  }

  const maxCoverage = Math.max(1, ...Object.values(coverage));
  const covWrap = el('div', { class: 'cov-wrap' });
  covWrap.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-sub)', marginBottom:'4px', marginLeft:'90px' } }, 'Front-of-house coverage per hour'));

  const covRow = el('div', { class: 'cov-row' });
  for (let h = view.startHour; h < view.endHour; h++) {
    const count   = coverage[h] || 0;
    const heightPct = Math.max(4, (count / maxCoverage) * 100);
    const bar     = el('div', { class: 'cov-bar' });
    bar.appendChild(el('div', { class: 'cov-fill', style: { height: `${heightPct}%`, opacity: count ? '1' : '0.2' } }));
    bar.appendChild(el('div', { class: 'cov-num' }, count || ''));
    covRow.appendChild(bar);
  }
  covWrap.appendChild(covRow);
  wrapper.appendChild(covWrap);

  frag.appendChild(wrapper);
  return frag;
}

function renderAttendanceTab() {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();
  const rows    = [];

  for (const slot of allSlots()) {
    const assignment = state.assignments[slot.id];
    if (!assignment?.empId) continue;

    const mainEmp    = employees.find(e => e.id === assignment.empId);
    const studentEmp = assignment.studentId ? employees.find(e => e.id === assignment.studentId) : null;

    const hours          = slot.endHour - slot.startHour;
    const isFrontOfHouse = FRONT_POSITIONS.includes(slot.pos);
    const isShortShift   = slot.startHour >= 18;   // part-time evening shifts — no deduction
    const paidHours      = (isFrontOfHouse && !isShortShift && hours >= 8.5) ? hours - 1 : hours;

    const shiftLabel  = cleanShift(slot.shift);
    const schedIn     = shiftLabel.split('-')[0]?.trim() || '';
    const schedOut    = shiftLabel.split('-')[1]?.trim().split(' ')[0] || '';

    rows.push({ name: mainEmp?.shortName || '?', fullName: mainEmp?.fullName || '', position: slot.pos, schedIn, schedOut, paidHours: paidHours.toFixed(1).replace('.0', '') });
    if (studentEmp) {
      rows.push({ name: studentEmp.shortName, fullName: studentEmp.fullName, position: slot.pos + ' (Student)', schedIn, schedOut, paidHours: paidHours.toFixed(1).replace('.0', '') });
    }
  }

  if (rows.length === 0) {
    const empty = el('div', { class: 'empty-state' });
    empty.appendChild(icon('clock'));
    empty.appendChild(el('p', {}, 'No assignments yet'));
    frag.appendChild(empty);
    return frag;
  }

  frag.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'10px' } },
    `Attendance · ${formatDate(state.selectedDate)} · Front-of-house & Dacai 9h+ shifts auto-deduct 1h break`));

  const wrap = el('div', { class: 'att-wrap' });
  const table = el('table', {});

  const headers = ['Name', 'Full Name', 'Position', 'Sched. In', 'Sched. Out', 'Actual In', 'Actual Out', 'Paid Hours'];
  table.appendChild(el('thead', {}, el('tr', {}, ...headers.map(h => el('th', {}, h)))));

  const tbody = el('tbody', {});

  for (const row of rows) {
    const tr = el('tr', {});
    const actualInInput  = el('input', { class: 'clock', placeholder: '--:--' });
    const actualOutInput = el('input', { class: 'clock', placeholder: '--:--' });
    tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, row.name)));
    tr.appendChild(el('td', {}, row.fullName));
    tr.appendChild(el('td', {}, row.position));
    tr.appendChild(el('td', {}, row.schedIn));
    tr.appendChild(el('td', {}, row.schedOut));
    tr.appendChild(el('td', {}, actualInInput));
    tr.appendChild(el('td', {}, actualOutInput));
    tr.appendChild(el('td', {}, row.paidHours + 'h'));
    tbody.appendChild(tr);
  }

  // Leave records section
  const absList = Object.entries(absences);
  if (absList.length > 0) {
    tbody.appendChild(el('tr', {}, el('td', { colspan: '8', style: { padding:'8px 12px', fontWeight:'700', fontSize:'11px', color:'var(--text-sub)', background:'var(--gray-50)', textTransform:'uppercase', letterSpacing:'0.4px' } }, 'Leave Record')));
    for (const [empId, leaveType] of absList) {
      const emp = employees.find(e => e.id === empId);
      if (!emp) continue;
      const lt  = LEAVE_TYPES[leaveType];
      const tr  = el('tr', {});
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, emp.shortName)));
      tr.appendChild(el('td', {}, emp.fullName));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, lt ? badge(lt.label, lt.badgeClass) : leaveType));
      tbody.appendChild(tr);
    }
  }

  table.appendChild(tbody);
  wrap.appendChild(table);
  frag.appendChild(wrap);

  // Export button
  const exportBtn = el('button', { onClick: async () => {
    const header = ['Name','Full Name','Position','Sched In','Sched Out','Actual In','Actual Out','Paid Hours'].join('\t');
    const body   = rows.map(r => [r.name, r.fullName, r.position, r.schedIn, r.schedOut, '', '', r.paidHours+'h'].join('\t')).join('\n');
    const lvRecs = Object.entries(absences).map(([id, t]) => {
      const e = employees.find(x => x.id === id);
      return e ? [e.shortName, e.fullName, '—','—','—','—','—', LEAVE_TYPES[t]?.label || t].join('\t') : '';
    }).filter(Boolean).join('\n');

    const text = `Attendance - ${formatDate(state.selectedDate)}\n${header}\n${body}${lvRecs ? '\nLeave Record\n' + lvRecs : ''}`;

    try {
      await navigator.clipboard.writeText(text);
      exportBtn.textContent = '✓ Copied for Excel!';
      setTimeout(() => { exportBtn.innerHTML = ''; exportBtn.appendChild(icon('table-export')); exportBtn.appendChild(document.createTextNode(' Export for Excel')); }, 2500);
    } catch (e) {}
  }});
  exportBtn.appendChild(icon('table-export'));
  exportBtn.appendChild(document.createTextNode(' Export for Excel'));
  frag.appendChild(exportBtn);

  return frag;
}

// =============================================================================
// MAIN RENDER
// =============================================================================

function render() {
  const computed = computeState();
  const appEl    = document.getElementById('app');
  const absences  = getTodayAbsences();
  const leaveCount = Object.keys(absences).length;
  appEl.innerHTML = '';

  // ── Header ──
  const header = el('div', { class: 'app-header' });
  const titleGroup = el('div', {});
  titleGroup.appendChild(el('p', { class: 'app-title' }, '老乡鸡 IOI City Mall'));
  titleGroup.appendChild(el('p', { class: 'app-subtitle' }, `Scheduling System · ${employees.length} staff · Auto-saved`));
  header.appendChild(titleGroup);

  const headerRight = el('div', { class: 'header-right' });
  const dateInput = el('input', { type: 'date', value: state.selectedDate });
  dateInput.addEventListener('change', async e => { state.selectedDate = e.target.value; await loadScheduleForDate(state.selectedDate); render(); });
  headerRight.appendChild(dateInput);
  headerRight.appendChild(el('span', { class: 'role-badge' }, currentRole === 'manager' ? 'Manager' : 'PIC'));
  headerRight.appendChild(el('button', { class: 'btn-sm', onClick: logout }, icon('logout'), ' Logout'));
  header.appendChild(headerRight);
  appEl.appendChild(header);

  // ── Stats ──
  const statsGrid = el('div', { class: 'stats-grid' });
  const statItems = [
    { label: 'Total Staff', value: employees.length,                      icon: 'users',         color: null                                         },
    { label: 'On Leave',    value: leaveCount,                             icon: 'calendar-off',  color: leaveCount > 0 ? 'var(--red-600)' : null     },
    { label: 'Filled / Total', value: `${computed.filledSlots}/${allSlots().length}`, icon: 'layout-grid', color: computed.filledSlots < allSlots().length ? 'var(--amber-600)' : 'var(--green-600)' },
    { label: 'Unassigned',  value: computed.unassignedStaff.length,        icon: 'user-question', color: computed.unassignedStaff.length > 5 ? 'var(--amber-600)' : null },
  ];
  for (const stat of statItems) {
    const card = el('div', { class: 'stat-card' });
    const labelEl = el('div', { class: 'stat-label' });
    labelEl.appendChild(icon(stat.icon));
    labelEl.appendChild(document.createTextNode(stat.label));
    card.appendChild(labelEl);
    card.appendChild(el('div', { class: 'stat-value', style: { color: stat.color || 'var(--text)' } }, String(stat.value)));
    statsGrid.appendChild(card);
  }
  appEl.appendChild(statsGrid);

  // ── Tabs ──
  const tabsEl = el('div', { class: 'tabs' });
  const tabDefs = [
    { id: 'schedule',   label: '排班',        iconName: 'calendar'    },
    { id: 'employees',  label: '员工',        iconName: 'users'       },
    { id: 'leave',      label: `Leave${leaveCount > 0 ? ` (${leaveCount})` : ''}`, iconName: 'calendar-off' },
    { id: 'roster',     label: 'Roster',      iconName: 'table'       },
    { id: 'gantt',      label: 'Gantt',       iconName: 'chart-gantt' },
    { id: 'attendance', label: 'Attendance',  iconName: 'clock'       },
  ];
  for (const tab of tabDefs) {
    const btn = el('button', { class: `tab-btn${state.currentTab === tab.id ? ' active' : ''}`, onClick: () => { state.currentTab = tab.id; render(); } });
    btn.appendChild(icon(tab.iconName));
    btn.appendChild(document.createTextNode(' ' + tab.label));
    tabsEl.appendChild(btn);
  }
  appEl.appendChild(tabsEl);

  // ── Tab content ──
  switch (state.currentTab) {
    case 'schedule':   appEl.appendChild(renderScheduleTab(computed));  break;
    case 'employees':  appEl.appendChild(renderEmployeesTab());          break;
    case 'leave':      appEl.appendChild(renderLeaveTab(computed));      break;
    case 'roster':     appEl.appendChild(renderRosterTab());             break;
    case 'gantt':      appEl.appendChild(renderGanttTab());              break;
    case 'attendance': appEl.appendChild(renderAttendanceTab());         break;
  }
}

// =============================================================================
// INIT
// =============================================================================

async function initApp() {
  await Promise.all([loadScheduleForDate(state.selectedDate), loadPlannedLeave(), loadDailyLeave()]);
  subscribeToChanges();
  render();
}

// Check for saved session
(function() {
  const saved = sessionStorage.getItem('lxj-role');
  if (saved && PASSWORDS[saved]) {
    currentRole = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  }
})();
</script>
</body>
</html>
