// Mirrors the Attendance tab's paid-hours logic, applied to an arbitrary stored row.
function computeRowLabor(row) {
  const baseSlots = BASE_SLOTS.map(s => {
    const ov = state.slotOverrides[s.id];
    return ov ? { ...s, startHour: ov.startHour, endHour: ov.endHour } : s;
  });
  const slots   = [...baseSlots, ...(row.extra_slots || [])];
  const assigns = row.assignments || {};
  let hours = 0; const people = new Set();
  for (const slot of slots) {
    const a = assigns[slot.id];
    if (!a?.empId) continue;
    const sh = a.timeOverride?.startHour ?? slot.startHour;
    const eh = a.timeOverride?.endHour   ?? slot.endHour;
    const h  = eh - sh;
    const foh   = FRONT_POSITIONS.includes(slot.pos);
    const short = sh >= 18;
    const paid  = (foh && !short && h >= 8.5) ? h - 1 : h;
    hours += paid; people.add(a.empId);
    if (a.studentId) { hours += paid; people.add(a.studentId); }
  }
  return { staff: people.size, hours: Math.round(hours * 10) / 10 };
}

function csvEscape(v) {
  const s = (v == null ? '' : String(v));
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function downloadCSV(filename, csv) {
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });  // BOM → Excel reads 中文 correctly
  const url  = URL.createObjectURL(blob);
  const a    = el('a', { href: url, download: filename });
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const WD_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// 性能/扩展性优化：历史排班会随时间无限增长，全量拉回浏览器是「数据涨10倍」时
// 最先变慢的地方。这里加上可选的日期范围参数：
//   - 不传参数 → 行为与原来完全一致（拉取全部，保证现有导出不受影响）；
//   - 传入 fromDate / toDate → 只拉该区间，导出量受用户控制，不再随年份累积变慢。
async function fetchAllScheduleRows(fromDate, toDate) {
  let q = db.from('daily_schedule').select('*').eq('store_id', STORE_ID);
  if (fromDate) q = q.gte('schedule_date', fromDate);
  if (toDate)   q = q.lte('schedule_date', toDate);
  const { data, error } = await q.order('schedule_date');
  if (error) throw error;
  return data || [];
}

// Returns the effective slot list + per-slot effective times for a stored row
function rowSlots(row) {
  const base = BASE_SLOTS.map(s => {
    const ov = state.slotOverrides[s.id];
    return ov ? { ...s, startHour: ov.startHour, endHour: ov.endHour } : s;
  });
  return [...base, ...(row.extra_slots || [])];
}

// One row per day: manual fields + auto-derived features
async function exportSummaryCSV() {
  let rows = [];
  try { rows = await fetchAllScheduleRows(); }
  catch (e) { alert('导出失败：' + (e?.message || e)); return; }
  if (rows.length === 0) { alert('还没有可导出的排班数据'); return; }

  const headers = ['date','weekday','day_tags','est_revenue','actual_revenue','revenue_gap_pct',
    'planned_available','no_show_count','actual_attendance','no_show_names','on_leave_names',
    'scheduled_staff','scheduled_hours','payday_window',
    'wl_lunch_front','wl_lunch_back','wl_dinner_front','wl_dinner_back','note'];
  const lines = [headers.join(',')];

  for (const row of rows) {
    const date = row.schedule_date;
    const d    = new Date(date + 'T00:00:00');
    const wd   = WD_SHORT[d.getDay()];
    const onLeaveIds   = Object.keys(getAbsencesForDate(date));
    const planned      = employees.length - onLeaveIds.length;
    const onLeaveNames = onLeaveIds.map(id => (getEmp(id) || {}).shortName || id);
    const noShow       = (row.unplanned_absent || []);
    const noShowNames  = noShow.map(id => (getEmp(id) || {}).shortName || id);
    const actualAtt    = planned - noShow.length;
    const labor = computeRowLabor(row);
    const est = row.est_revenue, act = row.actual_revenue;
    const gap = (est != null && act != null && est > 0) ? Math.round((act - est) / est * 100) : '';
    const dim    = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    const payday = (d.getDate() <= 3 || d.getDate() >= dim - 2) ? 1 : 0;
    const wl     = row.workload || {};
    const rec = [date, wd, (row.day_tags || []).join('|'), est ?? '', act ?? '', gap,
      planned, noShow.length, actualAtt, noShowNames.join('|'), onLeaveNames.join('|'),
      labor.staff, labor.hours, payday,
      wl.lunchFront ?? '', wl.lunchBack ?? '', wl.dinnerFront ?? '', wl.dinnerBack ?? '', row.day_note || ''];
    lines.push(rec.map(csvEscape).join(','));
  }
  downloadCSV(`roster_summary_${todayLocalStr()}.csv`, lines.join('\n'));
}

// One row per assigned shift per day — the actual scheduling decisions (training labels)
async function exportDetailCSV() {
  let rows = [];
  try { rows = await fetchAllScheduleRows(); }
  catch (e) { alert('导出失败：' + (e?.message || e)); return; }
  if (rows.length === 0) { alert('还没有可导出的排班数据'); return; }

  const headers = ['date','weekday','area','position','slot_id','start','end','paid_hours','seat','staff_short','staff_full'];
  const lines = [headers.join(',')];

  for (const row of rows) {
    const date = row.schedule_date;
    const wd   = WD_SHORT[new Date(date + 'T00:00:00').getDay()];
    const assigns = row.assignments || {};
    for (const slot of rowSlots(row)) {
      const a = assigns[slot.id];
      if (!a?.empId) continue;
      const sh = a.timeOverride?.startHour ?? slot.startHour;
      const eh = a.timeOverride?.endHour   ?? slot.endHour;
      const h  = eh - sh;
      const foh   = FRONT_POSITIONS.includes(slot.pos);
      const paid  = (foh && !(sh >= 18) && h >= 8.5) ? h - 1 : h;
      const paidStr = (Math.round(paid * 10) / 10);
      const emit = (seat, empId) => {
        const emp = getEmp(empId);
        lines.push([date, wd, slot.area, slot.pos, slot.id,
          formatHourNum(sh), formatHourNum(eh), paidStr, seat,
          emp?.shortName || empId, emp?.fullName || ''].map(csvEscape).join(','));
      };
      emit('main', a.empId);
      if (a.studentId) emit('student', a.studentId);
    }
  }
  downloadCSV(`roster_detail_${todayLocalStr()}.csv`, lines.join('\n'));
}

// =============================================================================
// COPY SCHEDULE FEATURE
// =============================================================================

function getCopySourceDates() {
  const WD_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmtLocal = dd => {
    const y = dd.getFullYear(), mo = String(dd.getMonth()+1).padStart(2,'0'), dy = String(dd.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  };
  const base = new Date(state.selectedDate + 'T00:00:00');
  const yesterday = new Date(base); yesterday.setDate(base.getDate() - 1);
  const lastWeek  = new Date(base); lastWeek.setDate(base.getDate() - 7);
  return [
    { dateStr: fmtLocal(yesterday), label: '复制昨天',       sub: `${WD_LABELS[yesterday.getDay()]} · ${fmtLocal(yesterday)}`, icon: 'calendar-minus' },
    { dateStr: fmtLocal(lastWeek),  label: '复制上周同一天', sub: `${WD_LABELS[lastWeek.getDay()]} · ${fmtLocal(lastWeek)}`,  icon: 'calendar-week'  },
  ];
}

function openCopyDropdown(e) {
  e.stopPropagation();
  if (copyScheduleState.dropdownOpen) { copyScheduleState.dropdownOpen = false; render(); return; }
  copyScheduleState.dropdownOpen = true;
  render();
  if (_copyDropdownCloseHandler) document.removeEventListener('click', _copyDropdownCloseHandler);
  _copyDropdownCloseHandler = () => {
    copyScheduleState.dropdownOpen = false;
    _copyDropdownCloseHandler = null;
    render();
  };
  setTimeout(() => document.addEventListener('click', _copyDropdownCloseHandler, { once: true }), 0);
}

async function initiateCopySchedule(sourceDate) {
  // Remove outside-click listener and close dropdown
  if (_copyDropdownCloseHandler) { document.removeEventListener('click', _copyDropdownCloseHandler); _copyDropdownCloseHandler = null; }
  copyScheduleState.dropdownOpen = false;
  render();

  const { data, error } = await db.from('daily_schedule').select('*')
    .eq('store_id', STORE_ID).eq('schedule_date', sourceDate).maybeSingle();

  if (error) { alert('加载失败：' + (error.message || error)); return; }

  const sourceAssignments = data?.assignments || {};
  const filledCount = Object.values(sourceAssignments).filter(a => a?.empId).length;
  if (filledCount === 0) { alert(`${sourceDate} 暂无排班数据，无法复制`); return; }

  // Which employees from the source are on leave TODAY
  const todayAbsences = getTodayAbsences();
  const absentIds = new Set(Object.keys(todayAbsences));
  const absentNamesSet = new Set();
  for (const a of Object.values(sourceAssignments)) {
    if (a?.empId && absentIds.has(a.empId)) {
      const emp = getEmp(a.empId);
      if (emp) absentNamesSet.add(emp.shortName);
    }
  }
  const absentNames = [...absentNamesSet];
  const hasExisting = Object.values(state.assignments).some(a => a?.empId);

  // Show confirmation modal when there's existing data or absent collisions
  if (hasExisting || absentNames.length > 0) {
    copyScheduleState.modal = { sourceDate, absentNames, assignments: sourceAssignments, hasExisting };
    render();
  } else {
    await executeCopySchedule(sourceAssignments, sourceDate);
  }
}

async function executeCopySchedule(sourceAssignments, sourceDate) {
  const todayAbsences = getTodayAbsences();
  const absentIds = new Set(Object.keys(todayAbsences));
  let blankedCount = 0;

  const newAssignments = {};
  for (const [slotId, a] of Object.entries(sourceAssignments)) {
    if (!a) continue;
    const entry = { ...a };
    if (entry.empId && absentIds.has(entry.empId))     { entry.empId = null; entry.studentId = null; blankedCount++; }
    if (entry.studentId && absentIds.has(entry.studentId)) { entry.studentId = null; }
    // 若主岗已不是该岗位的合格 trainer（失去资格 / 换人 / 主岗空缺），
    // 不要把学员一起搬过来，否则会在新一天制造一个看不见的"孤儿学员"。
    if (entry.studentId) {
      const slot = allSlots().find(s => s.id === slotId);
      if (slot) {
        const main = entry.empId ? getEmp(entry.empId) : null;
        const trainerOk = !!main && (slot.pos === 'PIC' || isTrainerFor(main, slot.pos));
        if (!trainerOk) entry.studentId = null;
      }
    }
    newAssignments[slotId] = entry;
  }

  state.assignments = newAssignments;
  // extraSlots intentionally NOT copied (per design decision)
  copyScheduleState.modal = null;

  await saveSchedule();

  const srcLabel = formatDate(sourceDate);
  copyScheduleState.toast = { msg: `已从「${srcLabel}」复制班表${blankedCount > 0 ? `，${blankedCount} 个班次因请假已留空` : ''}` };
  render();
  setTimeout(() => { copyScheduleState.toast = null; render(); }, 4500);
}

// ── 清空今日班表：覆盖式，只清人员分配，不动 dayMeta / extraSlots ──
function openClearModal() {
  copyScheduleState.dropdownOpen = false;
  const hasAny = Object.values(state.assignments || {}).some(a => a && (a.empId || a.studentId));
  copyScheduleState.clearModal = { hasAny };
  render();
}

async function executeClearSchedule() {
  const clearedDate = state.selectedDate;
  state.assignments = {};                    // 乐观更新内存态（dayMeta/extraSlots 不动）
  copyScheduleState.clearModal = null;
  await saveSchedule();                       // 持久化（会原样写回 dayMeta）
  copyScheduleState.toast = { msg: `已清空 ${formatDate(clearedDate)} 的排班` };
  render();
  setTimeout(() => { copyScheduleState.toast = null; render(); }, 4500);
}

function renderCopyDropdown() {
  if (!copyScheduleState.dropdownOpen) return null;
  const wrap = el('div', { class: 'copy-dropdown', onClick: e => e.stopPropagation() });
  wrap.appendChild(el('div', { class: 'copy-dropdown-title' }, '选择复制来源'));
  for (const src of getCopySourceDates()) {
    const opt = el('div', { class: 'copy-opt', onClick: () => initiateCopySchedule(src.dateStr) });
    const iconBox = el('div', { class: 'copy-opt-icon' }); iconBox.appendChild(icon(src.icon));
    opt.appendChild(iconBox);
    const textWrap = el('div', {});
    textWrap.appendChild(el('div', { class: 'copy-opt-label' }, src.label));
    textWrap.appendChild(el('div', { class: 'copy-opt-sub'   }, src.sub));
    opt.appendChild(textWrap);
    wrap.appendChild(opt);
  }
  const note = el('div', { class: 'copy-dropdown-note' });
  note.appendChild(icon('info-circle')); note.appendChild(document.createTextNode(' 仅复制人员分配，不含临时班次'));
  wrap.appendChild(note);
  return wrap;
}

function renderCopyModal() {
  if (!copyScheduleState.modal) return null;
  const { sourceDate, absentNames, assignments, hasExisting } = copyScheduleState.modal;

  const overlay = el('div', { class: 'copy-modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) { copyScheduleState.modal = null; render(); } });

  const modal = el('div', { class: 'copy-modal' });

  const head = el('div', { class: 'copy-modal-head' });
  head.appendChild(icon('copy'));
  head.appendChild(document.createTextNode(hasExisting ? '确认覆盖班表' : '确认复制班表'));
  modal.appendChild(head);

  if (hasExisting) {
    modal.appendChild(el('div', { class: 'copy-modal-body' },
      `当前日期（${formatDate(state.selectedDate)}）已有排班记录，复制将覆盖当前内容。`));
  }

  if (absentNames.length > 0) {
    const warn = el('div', { class: 'copy-modal-warn' });
    warn.appendChild(icon('user-off'));
    const warnBody = el('div', {});
    warnBody.appendChild(document.createTextNode(`以下 ${absentNames.length} 位员工今天请假，对应班次将留空：`));
    const chips = el('div', { class: 'copy-absent-chips' });
    for (const name of absentNames) chips.appendChild(el('span', { class: 'copy-absent-chip' }, name));
    warnBody.appendChild(chips);
    warn.appendChild(warnBody);
    modal.appendChild(warn);
  }

  if (!hasExisting && absentNames.length > 0) {
    modal.appendChild(el('div', { class: 'copy-modal-body' }, '其余班次将正常复制，是否继续？'));
  }

  const actions = el('div', { class: 'copy-modal-actions' });
  actions.appendChild(el('button', { onClick: () => { copyScheduleState.modal = null; render(); } }, '取消'));
  const confirmBtn = el('button', { class: 'btn-info', onClick: () => executeCopySchedule(assignments, sourceDate) });
  confirmBtn.appendChild(icon('copy')); confirmBtn.appendChild(document.createTextNode(' 确认复制'));
  actions.appendChild(confirmBtn);
  modal.appendChild(actions);

  overlay.appendChild(modal);
  return overlay;
}

function renderClearModal() {
  if (!copyScheduleState.clearModal) return null;
  const { hasAny } = copyScheduleState.clearModal;

  const overlay = el('div', { class: 'copy-modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) { copyScheduleState.clearModal = null; render(); } });

  const modal = el('div', { class: 'copy-modal' });

  const head = el('div', { class: 'copy-modal-head' });
  head.appendChild(icon('trash'));
  head.appendChild(document.createTextNode('确认清空班表'));
  modal.appendChild(head);

  if (hasAny) {
    modal.appendChild(el('div', { class: 'copy-modal-body' },
      `确认清空 ${formatDate(state.selectedDate)} 的全部排班？此操作不可撤销（仅清除人员分配，营业额 / 标签等不受影响）。`));
  } else {
    modal.appendChild(el('div', { class: 'copy-modal-body' },
      `${formatDate(state.selectedDate)} 今日暂无任何排班，无需清空。`));
  }

  const actions = el('div', { class: 'copy-modal-actions' });
  actions.appendChild(el('button', { onClick: () => { copyScheduleState.clearModal = null; render(); } }, '取消'));
  if (hasAny) {
    const confirmBtn = el('button', { class: 'btn-danger', onClick: () => executeClearSchedule() });
    confirmBtn.appendChild(icon('trash')); confirmBtn.appendChild(document.createTextNode(' 确认清空'));
    actions.appendChild(confirmBtn);
  }
  modal.appendChild(actions);

  overlay.appendChild(modal);
  return overlay;
}

function renderCopyToast() {
  if (!copyScheduleState.toast) return null;
  const toast = el('div', { class: 'copy-toast' });
  toast.appendChild(icon('check')); toast.appendChild(document.createTextNode(copyScheduleState.toast.msg));
  return toast;
}

function render() {
  const computed = computeState();
  const appEl    = document.getElementById('app');
  const absences  = getTodayAbsences();
  const leaveCount = Object.keys(absences).length;
  appEl.innerHTML = '';

  // ── Header ──
  const header = el('div', { class: 'app-header' });
  const titleGroup = el('div', {});
  titleGroup.appendChild(el('p', { class: 'app-title' }, '老乡鸡 IOI City Mall'));
  titleGroup.appendChild(el('p', { class: 'app-subtitle' }, `Scheduling System · ${employees.length} staff · Auto-saved`));
  header.appendChild(titleGroup);

  const headerRight = el('div', { class: 'header-right' });
  const dateInput = el('input', { type: 'date', value: state.selectedDate });
  dateInput.addEventListener('change', async e => { state.selectedDate = e.target.value; await loadScheduleForDate(state.selectedDate); render(); });
  headerRight.appendChild(dateInput);
  headerRight.appendChild(el('span', { class: 'role-badge' }, currentRole === 'manager' ? 'Manager' : 'PIC'));

  // ── Copy Schedule button (manager only) ──
  const copyBtnWrap = el('div', { class: 'copy-btn-wrap' });
  const copyBtn = el('button', { class: 'btn-sm btn-info', onClick: openCopyDropdown });
  copyBtn.appendChild(icon('copy')); copyBtn.appendChild(document.createTextNode(' 复制班表'));
  copyBtnWrap.appendChild(copyBtn);
  const dropdown = renderCopyDropdown();
  if (dropdown) copyBtnWrap.appendChild(dropdown);
  headerRight.appendChild(copyBtnWrap);

  // ── Clear Schedule button (manager only) ──
  const clearBtn = el('button', { class: 'btn-sm btn-danger', onClick: openClearModal });
  clearBtn.appendChild(icon('trash')); clearBtn.appendChild(document.createTextNode(' 清空班表'));
  headerRight.appendChild(clearBtn);

  headerRight.appendChild(el('button', { class: 'btn-sm', onClick: exportSummaryCSV }, icon('download'), ' 导出汇总'));
  headerRight.appendChild(el('button', { class: 'btn-sm', onClick: exportDetailCSV }, icon('list-details'), ' 导出明细'));
  headerRight.appendChild(el('button', { class: 'btn-sm', onClick: logout }, icon('logout'), ' Logout'));
  header.appendChild(headerRight);
  appEl.appendChild(header);

  // ── Stats ──
  const statsGrid = el('div', { class: 'stats-grid' });
  const statItems = [
    { label: 'Total Staff', value: employees.length,                      icon: 'users',         color: null                                         },
    { label: 'On Leave',    value: leaveCount,                             icon: 'calendar-off',  color: leaveCount > 0 ? 'var(--red-600)' : null     },
    { label: 'Filled / Total', value: `${computed.filledSlots}/${allSlots().length}`, icon: 'layout-grid', color: computed.filledSlots < allSlots().length ? 'var(--amber-600)' : 'var(--green-600)' },
    { label: 'Unassigned',  value: computed.unassignedStaff.length,        icon: 'user-question', color: computed.unassignedStaff.length > 5 ? 'var(--amber-600)' : null },
  ];
  for (const stat of statItems) {
    const card = el('div', { class: 'stat-card' });
    const labelEl = el('div', { class: 'stat-label' });
    labelEl.appendChild(icon(stat.icon));
    labelEl.appendChild(document.createTextNode(stat.label));
    card.appendChild(labelEl);
    card.appendChild(el('div', { class: 'stat-value', style: { color: stat.color || 'var(--text)' } }, String(stat.value)));
    statsGrid.appendChild(card);
  }
  appEl.appendChild(statsGrid);

  // ── Tabs ──
  const tabsEl = el('div', { class: 'tabs' });
  const tabDefs = [
    { id: 'schedule',   label: '排班',        iconName: 'calendar'    },
    { id: 'employees',  label: '员工',        iconName: 'users'       },
    { id: 'talent',     label: '人才看板',    iconName: 'chart-dots-3'},
    { id: 'shifts',     label: '班次',        iconName: 'clock-edit'  },
    { id: 'leave',      label: `Leave${leaveCount > 0 ? ` (${leaveCount})` : ''}`, iconName: 'calendar-off' },
    { id: 'roster',     label: 'Roster',      iconName: 'table'       },
    { id: 'gantt',      label: 'Gantt',       iconName: 'chart-gantt' },
    { id: 'attendance', label: 'Attendance',  iconName: 'clock'       },
  ];
  for (const tab of tabDefs) {
    const btn = el('button', { class: `tab-btn${state.currentTab === tab.id ? ' active' : ''}`, onClick: () => { state.currentTab = tab.id; render(); } });
    btn.appendChild(icon(tab.iconName));
    btn.appendChild(document.createTextNode(' ' + tab.label));
    tabsEl.appendChild(btn);
  }
  appEl.appendChild(tabsEl);

  // ── Tab content ──
  switch (state.currentTab) {
    case 'schedule':   appEl.appendChild(renderScheduleTab(computed));  break;
    case 'employees':  appEl.appendChild(renderEmployeesTab());          break;
    case 'talent':     appEl.appendChild(renderTalentTab());             break;
    case 'shifts':     appEl.appendChild(renderShiftsTab());             break;
    case 'leave':      appEl.appendChild(renderLeaveTab(computed));      break;
    case 'roster':     appEl.appendChild(renderRosterTab());             break;
    case 'gantt':      appEl.appendChild(renderGanttTab());              break;
    case 'attendance': appEl.appendChild(renderAttendanceTab());         break;
  }

  // ── Copy-schedule overlays (modal + toast) ──
  const copyModal = renderCopyModal();
  if (copyModal) appEl.appendChild(copyModal);
  const clearModal = renderClearModal();
  if (clearModal) appEl.appendChild(clearModal);
  const copyToast = renderCopyToast();
  if (copyToast) appEl.appendChild(copyToast);

  // ── Dev card modal (talent board) ──
  const devCardEl = renderDevCard();
  if (devCardEl) appEl.appendChild(devCardEl);

  // ── Data normalization modal (talent board) ──
  const normEl = renderNormalizeModal();
  if (normEl) appEl.appendChild(normEl);
}

// =============================================================================
// INIT
// =============================================================================

async function initApp() {
  await Promise.all([
    loadScheduleForDate(state.selectedDate),
    loadPlannedLeave(),
    loadDailyLeave(),
    loadEmployees(),
    loadPositions(),
    loadSlotOverrides(),
    loadCoverageSettings(),
  ]);
  subscribeToChanges();
  render();
}

// Check for saved session
(function() {
  const saved = sessionStorage.getItem('lxj-role');
  if (saved && PASSWORDS[saved]) {
    currentRole = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  }
})();
</script>
