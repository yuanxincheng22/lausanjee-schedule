<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老乡鸡 IOI City Mall · 排班系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --font: 'SF Pro Display', system-ui, -apple-system, sans-serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      /* Neutrals */
      --gray-50:  #fafaf9;
      --gray-100: #f5f5f4;
      --gray-200: #e7e5e4;
      --gray-300: #d6d3d1;
      --gray-400: #a8a29e;
      --gray-500: #78716c;
      --gray-600: #57534e;
      --gray-700: #44403c;
      --gray-800: #292524;
      --gray-900: #1c1917;

      /* Accent colours */
      --blue-50:   #eff6ff; --blue-100: #dbeafe;
      --blue-600:  #2563eb; --blue-700: #1d4ed8;
      --green-50:  #f0fdf4; --green-100: #dcfce7;
      --green-600: #16a34a; --green-700: #15803d;
      --red-50:    #fef2f2; --red-100: #fee2e2;
      --red-600:   #dc2626; --red-700: #b91c1c;
      --amber-50:  #fffbeb; --amber-100: #fef3c7;
      --amber-600: #d97706; --amber-700: #b45309;

      /* Semantic */
      --text:        var(--gray-900);
      --text-sub:    var(--gray-500);
      --text-muted:  var(--gray-400);
      --bg:          #f6f5f3;
      --surface:     #ffffff;
      --border:      var(--gray-200);
      --border-mid:  var(--gray-300);
    }

    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.55; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    /* ── LAYOUT ── */
    .container { max-width: 980px; margin: 0 auto; padding: 1.5rem 1.25rem; }

    /* ── HEADER ── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 12px; flex-wrap: wrap;
    }
    .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .app-subtitle { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; line-height: 1; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; flex-wrap: wrap; }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      border-radius: 0; padding: 8px 12px; font-size: 13px; font-family: var(--font);
      color: var(--text-sub); cursor: pointer; margin-bottom: -1px;
      display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); background: var(--gray-50); }
    .tab-btn.active { border-bottom-color: var(--gray-900); color: var(--gray-900); font-weight: 600; }

    /* ── BUTTONS ── */
    button {
      font-family: var(--font); font-size: 13px; cursor: pointer;
      border: 1px solid var(--border-mid); background: var(--surface);
      color: var(--text); border-radius: var(--radius-sm);
      padding: 6px 14px; display: inline-flex; align-items: center; gap: 5px;
    }
    button:hover { background: var(--gray-100); }
    .btn-success { background: var(--green-50) !important; color: var(--green-700) !important; border-color: var(--green-100) !important; }
    .btn-danger  { background: var(--red-50)   !important; color: var(--red-700)   !important; border-color: var(--red-100)   !important; }
    .btn-info    { background: var(--blue-50)   !important; color: var(--blue-700)  !important; border-color: var(--blue-100)  !important; }
    .btn-sm { font-size: 11px; padding: 3px 9px; }

    /* ── FORM ELEMENTS ── */
    select, input[type="text"], input[type="date"], input[type="time"], input[type="number"] {
      font-family: var(--font); font-size: 13px;
      border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
      padding: 6px 10px; color: var(--text); background: var(--surface); outline: none;
    }
    select:focus, input:focus { border-color: var(--blue-600); }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── DAY-INFO PANEL (营业额 / 当天标记 / 备注) ── */
    .daymeta-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 10px; }
    .daymeta-head { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
    .daymeta-head .ti { color: var(--blue-600); }
    .daymeta-grid { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .daymeta-grid .form-group { flex: 0 0 auto; }
    .daymeta-rev { width: 130px; }
    .daymeta-note input { width: 100%; }
    .daymeta-note { flex: 1 1 200px; min-width: 160px; }
    .daymeta-rev-wrap { position: relative; display: inline-flex; align-items: center; }
    .daymeta-rev-wrap .cur { position: absolute; left: 10px; font-size: 12px; color: var(--text-muted); pointer-events: none; }
    .daymeta-rev-wrap input { padding-left: 30px; }
    .daymeta-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .daymeta-tag { font-size: 12px; font-weight: 600; border-radius: 100px; padding: 3px 11px; cursor: pointer; border: 1px solid var(--border-mid); background: var(--surface); color: var(--text-sub); user-select: none; }
    .daymeta-tag.on { background: var(--amber-50); border-color: var(--amber-100); color: var(--amber-700); }
    .daymeta-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
    .daymeta-gap { font-size: 11px; font-weight: 600; margin-left: 6px; }
    .daymeta-grouplbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 9px; display: flex; align-items: center; gap: 6px; }
    .daymeta-grouplbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .daymeta-hc { font-size: 12px; color: var(--text-sub); margin-top: 5px; }
    .daymeta-hc b { color: var(--text); font-weight: 700; }
    .daymeta-hc .short { color: var(--red-600); font-weight: 700; }
    .daymeta-hc .absent { color: var(--text-muted); }
    .wl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .wl-tag { font-size: 12px; font-weight: 700; color: var(--text-sub); width: 78px; flex-shrink: 0; }
    .wl-seg { display: inline-flex; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); overflow: hidden; }
    .wl-btn { font-size: 12px; padding: 5px 11px; cursor: pointer; background: var(--surface); color: var(--text-sub); border-right: 1px solid var(--border); user-select: none; white-space: nowrap; }
    .wl-btn:last-child { border-right: none; }
    .wl-btn:hover { background: var(--gray-50); }
    .wl-btn.on { font-weight: 700; }
    .absent-chip { font-size: 12px; font-weight: 600; border-radius: 100px; padding: 3px 6px 3px 11px; display: inline-flex; align-items: center; background: var(--red-50); color: var(--red-700); border: 1px solid var(--red-100); }
    .absent-chip .ti { font-size: 14px; }

    /* ── BADGES ── */
    .badge { font-size: 11px; font-weight: 600; border-radius: 100px; padding: 2px 9px; display: inline-block; white-space: nowrap; }
    .badge-blue   { background: var(--blue-50);  color: var(--blue-700);  }
    .badge-green  { background: var(--green-50); color: var(--green-700); }
    .badge-red    { background: var(--red-50);   color: var(--red-700);   }
    .badge-amber  { background: var(--amber-50); color: var(--amber-700); }
    .badge-gray   { background: var(--gray-100); color: var(--gray-600);  }

    /* ── CARDS ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 8px; }

    /* ── ALERTS ── */
    .alert { border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
    .alert-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .alert-body  { font-size: 12px; }
    .alert-danger  { background: var(--red-50);   border: 1px solid var(--red-100);   color: var(--red-700);   }
    .alert-success { background: var(--green-50); border: 1px solid var(--green-100); color: var(--green-700); }

    /* ── AREA SECTION ── */
    .area-label { display: inline-flex; align-items: center; border-radius: var(--radius-sm); padding: 3px 12px; font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
    .area-kitchen  { background: var(--blue-50);  color: var(--blue-700);  }
    .area-front    { background: var(--green-50); color: var(--green-700); }
    .area-mgmt     { background: var(--amber-50); color: var(--amber-700); }
    .area-reserve  { background: var(--gray-100); color: var(--gray-600);  }

    /* ── SLOT BOXES ── */
    .slots-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .slot-box { border-radius: var(--radius-md); padding: 8px 12px; min-width: 155px; border: 1px solid var(--red-100); background: var(--red-50); }
    .slot-box.filled { border-color: var(--green-100); background: var(--green-50); }
    .slot-shift { font-size: 11px; margin-bottom: 4px; font-weight: 600; }
    .slot-shift.unfilled { color: var(--red-600); }
    .slot-shift.filled   { color: var(--green-600); }
    .slot-select { border: none; background: transparent; padding: 0; width: 100%; font-size: 13px; font-family: var(--font); cursor: pointer; color: var(--text); }
    .student-box { border: 1px dashed var(--border-mid); border-radius: var(--radius-sm); padding: 5px 8px; margin-top: 4px; background: var(--gray-50); font-size: 12px; }
    .student-box select { border: none; background: transparent; padding: 0; width: 100%; font-size: 12px; font-family: var(--font); cursor: pointer; color: var(--text); }
    .student-label { font-size: 10px; color: var(--text-sub); display: flex; align-items: center; gap: 3px; margin-bottom: 3px; }

    /* ── ADD SHIFT FORM ── */
    .add-shift-form { background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }

    /* ── EMPLOYEE ROWS ── */
    .emp-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 8px; }
    .emp-row.absent { background: var(--red-50); border-color: var(--red-100); }
    .emp-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .emp-name   { font-size: 14px; font-weight: 600; }
    .emp-fname  { font-size: 12px; color: var(--text-sub); }
    .emp-meta   { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
    .emp-pos    { font-size: 12px; color: var(--text-sub); }
    .manager-note { background: var(--red-50); border: 1px solid var(--red-100); border-radius: var(--radius-sm); padding: 5px 9px; margin-top: 5px; font-size: 12px; color: var(--red-700); }
    .emp-actions { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }

    /* ── TALENT BOARD ── */
    .tb-banner { background: var(--amber-50); border: 1px solid var(--amber-100); color: var(--amber-700); border-radius: var(--radius-md); padding: 9px 12px; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .tb-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .tb-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 9px 11px; }
    .tb-stat-label { font-size: 11px; color: var(--text-sub); }
    .tb-stat-val { font-size: 20px; font-weight: 700; line-height: 1.2; margin-top: 2px; }
    .tb-section-title { font-size: 13px; font-weight: 700; margin: 16px 0 8px; display: flex; align-items: center; gap: 6px; }
    .tb-viewtoggle { display: flex; gap: 4px; margin-bottom: 10px; }
    .tb-viewbtn { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border-mid); background: var(--surface); border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font); color: var(--text-sub); }
    .tb-viewbtn.active { background: var(--blue-50); color: var(--blue-700); border-color: var(--blue-100); font-weight: 600; }

    /* Matrix */
    .tb-matrix-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); }
    .tb-matrix { border-collapse: collapse; font-size: 12px; min-width: 100%; }
    .tb-matrix th, .tb-matrix td { padding: 5px 4px; text-align: center; white-space: nowrap; }
    .tb-matrix thead th { position: sticky; top: 0; background: var(--gray-50); font-weight: 600; color: var(--text-sub); border-bottom: 1px solid var(--border); font-size: 11px; }
    .tb-matrix thead .tb-cover-row th { top: 27px; border-bottom: 2px solid var(--border-mid); font-weight: 700; font-size: 12px; }
    .tb-matrix thead .tb-cover-row .tb-name { background: var(--gray-50); }
    .tb-matrix .tb-name { position: sticky; left: 0; background: var(--surface); text-align: left; font-weight: 600; padding-left: 10px; z-index: 1; min-width: 84px; }
    .tb-matrix thead .tb-name { z-index: 2; }
    .tb-matrix tbody tr { border-top: 1px solid var(--gray-100); }
    .tb-matrix tbody tr:hover .tb-name { background: var(--gray-50); }
    .tb-cell { width: 26px; height: 26px; line-height: 26px; border-radius: 6px; display: inline-block; font-size: 11px; cursor: pointer; user-select: none; transition: transform .08s; }
    .tb-cell:hover { transform: scale(1.12); }
    .tb-cell.lv0 { color: var(--text-muted); cursor: pointer; }
    .tb-cell.lv1 { background: var(--blue-50);  color: var(--blue-700);  }
    .tb-cell.lv2 { background: var(--green-100); color: var(--green-700); }
    .tb-cell.lv3 { background: var(--amber-100); color: var(--amber-700); font-weight: 700; }
    .tb-cover-row td { font-weight: 700; border-top: 2px solid var(--border-mid); background: var(--gray-50); }
    .tb-cover-ok   { color: var(--green-600); }
    .tb-cover-warn { color: var(--amber-600); }
    .tb-cover-risk { color: var(--red-600); }
    .tb-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 9px; font-size: 11px; color: var(--text-sub); }
    .tb-legend i { display: inline-block; width: 13px; height: 13px; border-radius: 3px; vertical-align: -2px; margin-right: 3px; }

    /* Employee-card list (mobile-friendly view) */
    .tb-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .tb-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 11px 13px; cursor: pointer; }
    .tb-card:hover { border-color: var(--border-mid); }
    .tb-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .tb-card-name { font-weight: 600; font-size: 14px; }
    .tb-skillrow { display: flex; flex-wrap: wrap; gap: 4px; }
    .tb-skill { font-size: 11px; padding: 2px 8px; border-radius: 100px; }

    /* Risk cards */
    .tb-risk-card { background: var(--surface); border: 1px solid var(--border); border-left-width: 3px; border-radius: 0 var(--radius-md) var(--radius-md) 0; padding: 11px 13px; margin-bottom: 8px; }
    .tb-risk-card.risk { border-left-color: var(--red-600); }
    .tb-risk-card.warn { border-left-color: var(--amber-600); }
    .tb-risk-card.ok   { border-left-color: var(--green-600); }
    .tb-risk-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .tb-risk-name { font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .tb-risk-meta { font-size: 12px; color: var(--text-sub); }
    .tb-risk-advice { font-size: 12px; margin-top: 4px; }

    /* Dev card (modal) */
    .tb-dev-section { margin-bottom: 14px; }
    .tb-dev-label { font-size: 12px; color: var(--text-sub); margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
    .tb-goal { background: var(--gray-50); border-radius: var(--radius-md); padding: 9px 11px; margin-bottom: 6px; }
    .tb-goal-prog { height: 5px; background: var(--gray-200); border-radius: 3px; margin-top: 6px; overflow: hidden; }
    .tb-goal-prog-bar { height: 100%; background: var(--blue-600); }
    .tb-log-entry { border-left: 2px solid var(--border-mid); padding-left: 10px; margin-bottom: 8px; }
    .tb-log-date { font-size: 11px; color: var(--text-muted); }
    .tb-log-note { font-size: 13px; }
    .tb-suggest { background: var(--blue-50); border: 1px solid var(--blue-100); border-radius: var(--radius-md); padding: 9px 11px; font-size: 13px; color: var(--blue-700); }
    .tb-ex-toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-main); cursor: pointer; user-select: none; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); }
    .tb-ex-toggle input { width: 15px; height: 15px; cursor: pointer; accent-color: var(--blue-600); margin: 0; }

    /* Skill editor (dev card) */
    .tb-skedit-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid var(--gray-100); }
    .tb-skedit-row:first-child { border-top: none; }
    .tb-skedit-name { flex: 1; font-size: 13px; min-width: 56px; }
    .tb-seg { display: inline-flex; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); overflow: hidden; }
    .tb-seg button { border: none; background: var(--surface); padding: 4px 9px; font-size: 11px; cursor: pointer; font-family: var(--font); color: var(--text-sub); border-left: 1px solid var(--border); }
    .tb-seg button:first-child { border-left: none; }
    .tb-seg button.on0 { background: var(--gray-200); color: var(--gray-700); font-weight: 600; }
    .tb-seg button.on1 { background: var(--blue-100);  color: var(--blue-700);  font-weight: 600; }
    .tb-seg button.on2 { background: var(--green-100); color: var(--green-700); font-weight: 600; }
    .tb-seg button.on3 { background: var(--amber-100); color: var(--amber-700); font-weight: 600; }

    @media (max-width: 640px) {
      .tb-stats { grid-template-columns: repeat(2, 1fr); }
      .tb-cards { grid-template-columns: 1fr; }
    }

    /* ── UNASSIGNED PANEL ── */
    .unassigned-panel { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 10px; background: var(--surface); }
    .unassigned-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 13px; font-weight: 600; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .staff-chip { font-size: 11px; border-radius: 100px; padding: 3px 10px; display: inline-block; font-weight: 500; }

    /* ── LEAVE ── */
    .leave-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; margin-bottom: 8px; background: var(--surface); }
    .leave-row  { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .upcoming-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 5px; background: var(--surface); flex-wrap: wrap; gap: 6px; }
    .section-title { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin: 14px 0 8px; }

    /* ── REST TRACKER ── */
    .rt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px 16px; margin-bottom: 10px; }
    .rt-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .rt-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
    .rt-title .ti { color: var(--blue-600); }
    .rt-progress { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .rt-progress-fill { height: 100%; background: var(--green-600); border-radius: 3px; transition: width 0.3s; }
    .rt-stats { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .rt-stat { flex: 1; min-width: 70px; background: var(--gray-50); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; text-align: center; }

// ── EMPLOYEE DB FUNCTIONS ──
function rowToEmp(row) {
  // ── Talent board fields (graceful degrade if columns don't exist yet) ──
  let training    = Array.isArray(row.training)    ? row.training    : [];
  let devGoals    = Array.isArray(row.dev_goals)   ? row.dev_goals   : [];
  let coachingLog = Array.isArray(row.coaching_log)? row.coaching_log: [];

  // ── One-time migration: fold legacy manager_note + available_from into
  //    coaching_log as a single undated "initial profile" entry. Only runs
  //    when coaching_log is still empty, so it never duplicates. ──
  if (coachingLog.length === 0) {
    const bits = [];
    if (row.manager_note && row.manager_note.trim()) bits.push(row.manager_note.trim());
    if (row.available_from && row.available_from > 0) bits.push(`${row.available_from}:00后到岗`);
    if (bits.length) {
      coachingLog = [{ date: '', note: bits.join('（') + (row.available_from > 0 ? '）' : ''), seed: true }];
    }
  }

  return {
    id: row.id, fullName: row.full_name, shortName: row.short_name,
    role: row.role, positions: row.positions || [], canTrain: row.can_train || [],
    training, tags: row.tags || [], offDay: row.off_day || '',
    devGoals, coachingLog,
  };
}
function empToRow(emp) {
  const row = {
    id: emp.id, store_id: STORE_ID,
    full_name: emp.fullName, short_name: emp.shortName, role: emp.role,
    positions: emp.positions, can_train: emp.canTrain, tags: emp.tags,
    off_day: emp.offDay,
    training: emp.training || [], dev_goals: emp.devGoals || [],
    coaching_log: emp.coachingLog || [],
    updated_at: new Date().toISOString(),
  };
  return row;
}
async function loadEmployees() {
  try {
    const { data, error } = await db.from('employees').select('*').eq('store_id', STORE_ID).order('id');
    if (error) throw error;
    if (data && data.length > 0) {
      employees         = data.filter(e =>  e.is_active).map(rowToEmp);
      inactiveEmployees = data.filter(e => !e.is_active).map(rowToEmp);
    } else {
      // Supabase employees table is empty — use hardcoded defaults
      employees         = DEFAULT_EMPLOYEES;
      inactiveEmployees = [];
    }
  } catch(e) {
    console.error('loadEmployees', e?.message || e);
    employees         = DEFAULT_EMPLOYEES;
    inactiveEmployees = [];
  } finally {
    rebuildEmpIndex();   // employees 已更新，重建查找索引（覆盖所有分支）
  }
}
async function loadPositions() {
  try {
    const { data, error } = await db.from('positions_master').select('*').eq('store_id', STORE_ID).order('sort_order');
    if (error) throw error;

  } catch(e) { console.error('loadPositions', e?.message || e); }
}

// ── COVERAGE THRESHOLD SETTINGS (store-level, one row per store) ──
async function loadCoverageSettings() {
  try {
    const { data, error } = await db.from('coverage_settings')
      .select('*').eq('store_id', STORE_ID).maybeSingle();
    if (error) throw error;
    if (data) {
      state.coverageThresholds = {
        onDuty: Number(data.on_duty_min),
        front:  Number(data.front_min),
      };
      // Per-position risk thresholds (talent board). Graceful if column absent.
      if (data.pos_thresholds && typeof data.pos_thresholds === 'object') {
        const raw = { ...data.pos_thresholds };
        // The exclude-management preference is stored under a reserved key
        // inside the same JSONB blob, so no extra column/SQL is needed.
        if (Object.prototype.hasOwnProperty.call(raw, '__excludeMgmt')) {
          state.tbExcludeMgmt = !!raw.__excludeMgmt;
          delete raw.__excludeMgmt;
        }
        state.posThresholds = raw;
      }
    }
  } catch(e) { console.warn('loadCoverageSettings (table may not exist yet):', e?.message || e); }
}
async function saveCoverageSettings(onDutyMin, frontMin) {
  state.coverageThresholds = { onDuty: onDutyMin, front: frontMin };  // optimistic local update
  try {
    const { error } = await db.from('coverage_settings').upsert({
      store_id: STORE_ID,
      on_duty_min: onDutyMin,
      front_min:   frontMin,
      updated_at:  new Date().toISOString(),
    }, { onConflict: 'store_id' });
    if (error) throw error;
  } catch(e) { console.warn('saveCoverageSettings failed:', e?.message || e); }
}
// Save per-position risk thresholds. { posName: { red, yellow } }
async function savePosThresholds(map) {
  state.posThresholds = map;  // optimistic
  render();
  try {
    // Persist the reserved exclude-mgmt flag alongside the thresholds.
    const blob = { ...map, __excludeMgmt: state.tbExcludeMgmt };
    let { error } = await db.from('coverage_settings').upsert({
      store_id: STORE_ID,
      pos_thresholds: blob,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'store_id' });
    if (error && /pos_thresholds|column/i.test(error.message || '')) {
      posThresholdColMissing = true;  // column not added yet — local-only
    } else if (error) {
      throw error;
    }
  } catch(e) { console.warn('savePosThresholds failed:', e?.message || e); }
}
// Persist the talent-board "exclude management" view preference.
async function saveTbExcludeMgmt(val) {
  state.tbExcludeMgmt = val;  // optimistic
  render();
  try {
    const blob = { ...(state.posThresholds || {}), __excludeMgmt: val };
    let { error } = await db.from('coverage_settings').upsert({
      store_id: STORE_ID,
      pos_thresholds: blob,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'store_id' });
    if (error && /pos_thresholds|column/i.test(error.message || '')) {
      posThresholdColMissing = true;
    } else if (error) {
      throw error;
    }
  } catch(e) { console.warn('saveTbExcludeMgmt failed:', e?.message || e); }
}

// Generate half-hour time options from 06:00 to 23:30
function generateTimeOptions() {
  const opts = [];
  for (let h = 6; h <= 23; h++) {
    opts.push([`${h}:00`, `${String(h).padStart(2,'0')}:00`]);
    if (h < 23) opts.push([`${h}:30`, `${String(h).padStart(2,'0')}:30`]);
  }
  return opts;
}
function getNextEmpId() {
  const all = [...employees, ...inactiveEmployees];
  const max = all.reduce((m, e) => { const n = parseInt(e.id.replace('e','')); return isNaN(n)?m:Math.max(m,n); }, 0);
  return 'e' + (max + 1);
}
async function saveEmployee(emp) {
  let { error } = await db.from('employees').upsert(empToRow(emp), { onConflict: 'id' });

  // ── Graceful degrade: if the talent-board columns don't exist in Supabase
  //    yet, the upsert fails with a "column not found" (PostgREST PGRST204).
  //    Strip the new columns and retry so the app keeps working until the
  //    user runs the ALTER TABLE migration. ──
  if (error && /training|dev_goals|coaching_log|column/i.test(error.message || '')) {
    const row = empToRow(emp);
    delete row.training; delete row.dev_goals; delete row.coaching_log;
    talentColumnsMissing = true;
    ({ error } = await db.from('employees').upsert(row, { onConflict: 'id' }));
  }
  if (error) throw error;

  // Optimistic update: reflect the change in memory immediately,
  // without waiting for the DB read-after-write round-trip.
  // This eliminates the "skill added but not visible" race condition.
  const idx = employees.findIndex(e => e.id === emp.id);
  if (idx >= 0) employees[idx] = { ...emp };
  else           employees.push({ ...emp });
  render();

  // Background sync: confirm the DB write came back correctly.
  // The Supabase realtime subscription will also trigger loadEmployees,
  // so this is just a belt-and-suspenders safety net.
  await loadEmployees();
  render();
}

  await loadEmployees(); render();

async function restoreEmployee(empId) {

  if (error) throw error;

function subscribeToChanges() {
  db.channel('lxj-sync')
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'daily_schedule',
      filter: `store_id=eq.${STORE_ID}`,
    }, p => {
      const row = p.new || p.old;
      if (row?.schedule_date !== state.selectedDate) return;
      if (p.eventType === 'DELETE') {
        state.assignments = {};
        state.extraSlots  = [];
        state.dayMeta = { estRevenue: '', actualRevenue: '', dayTags: [], dayNote: '', workload: {}, unplannedAbsent: [] };
      } else {
        state.assignments = p.new.assignments || {};
        state.extraSlots  = p.new.extra_slots  || [];
        state.dayMeta = {
          estRevenue:      p.new.est_revenue     ?? '',
          actualRevenue:   p.new.actual_revenue  ?? '',
          dayTags:         p.new.day_tags        || [],
          dayNote:         p.new.day_note        || '',
          workload:        p.new.workload        || {},
          unplannedAbsent: p.new.unplanned_absent || [],
        };
      }
      render();
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'planned_leave',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => { await loadPlannedLeave(); render(); })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'daily_leave',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => { await loadDailyLeave(); render(); })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'employees',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => {
      // Small delay to let Supabase finish replicating the write before we read
      // This prevents reading stale data when the write and read happen in rapid succession
      await new Promise(r => setTimeout(r, 400));
      await loadEmployees();
      render();
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'positions_master',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => {
      await new Promise(r => setTimeout(r, 400));
      await loadPositions();
      render();
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'slot_overrides',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => { await loadSlotOverrides(); render(); })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'coverage_settings',
      filter: `store_id=eq.${STORE_ID}`,
    }, async () => { await loadCoverageSettings(); render(); })
    .subscribe();
}

// positions_master stores Chinese display names; BASE_SLOTS uses English pos keys.
// Any entry here maps a Chinese (or legacy) name → the canonical BASE_SLOTS pos value.
// Add a new line here whenever a positions_master name doesn't match a BASE_SLOTS pos.
const POSITION_SLOT_MAP = {

  '前厅':    'Service',

  'D 饮':    'D Drink',

  // Cutting / Dishwash / Reserve / PIC 本身已是英文，无需映射
};

// Returns the canonical BASE_SLOTS pos name for any position name variant.
// Falls back to the original name so English names (legacy records) still work.
// 性能优化：结果只依赖固定的 POSITION_SLOT_MAP（程序运行期间不变），
// 所以可以安全地把每个名称的翻译结果缓存下来，避免在大循环里被反复查表。
const _canonCache = new Map();
function toCanonicalPos(name) {
  if (_canonCache.has(name)) return _canonCache.get(name);
  const result = POSITION_SLOT_MAP[name] ?? name;
  _canonCache.set(name, result);
  return result;
}

// =============================================================================
// POSITION → AREA RESOLVER (shared)
// =============================================================================
// 为什么需要它：原先 empHomeArea / getEmpArea 用 `allPositions.find(p => p.name
// === posName)` 直接字符串比较来定位岗位所在区域。但 positions_master 存的是
// 中文名（如 "前厅"），而员工 positions 多为英文（如 "Service"），`===` 永远
// 匹配不上 → 静默返回兜底值 "后备"，导致「前厅 FOH」覆盖行长期读成 ~0、Roster
// 大量员工被错分到「后备」。
// 修复：① 按 canonical（归一化）名匹配 positions_master；② 匹配不到时回退到
// 始终存在的 BASE_SLOTS 的 pos→area 映射；③ 都没有才返回 "后备"。
const BASE_POS_AREA = (() => {
  const m = {};
  for (const s of BASE_SLOTS) m[s.pos] = s.area;   // canonical pos → area
  return m;
})();

// 解析任意岗位名（英文 / 中文 / 旧写法）对应的区域。
// 优先级：positions_master(canonical 匹配) → BASE_SLOTS → '后备'。
function getPositionArea(posName) {
  const canon  = toCanonicalPos(posName);
  const master = (allPositions || []).find(p => toCanonicalPos(p.name) === canon);
  if (master && master.area) return master.area;
  return BASE_POS_AREA[canon] || '后备';
}

// Returns { empId: leaveType } for any given date string
function getAbsencesForDate(dateStr) {
  const result = {};
  for (const [empId, leaves] of Object.entries(state.plannedLeave)) {
    if (!Array.isArray(leaves)) continue;
    for (const leave of leaves) {
      if (dateStr >= leave.from && dateStr <= leave.to) result[empId] = leave.type;
    }
  }
  const dayLeave = state.dailyLeave[dateStr] || {};
  for (const [empId, type] of Object.entries(dayLeave)) {
    if (type === null || type === 'present') delete result[empId];  // 'present' = cancelled for today only
    else result[empId] = type;
  }
  return result;
}

function getTodayAbsences() {
  return getAbsencesForDate(state.selectedDate);
}

// ⚠️ Roster 变更高亮辅助：与昨天对比。改动前先确认 allSlots/getEffectiveSlot 签名一致。
// 前一天日期字符串 —— 用本地日期部件，避免 toISOString 在 UTC+8 下 off-by-one（跨月/跨年安全）。
function prevDateStr(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${mo}-${dy}`;
}

// 拉取昨天的 assignments，转成 empId → {startHour,endHour,pos} 映射。
// 用昨天的请假状态（getAbsencesForDate）排除昨天请假者。返回 {} 表示昨天无数据。
async function fetchYesterdayShiftMap(todayDateStr) {
  const yDate = prevDateStr(todayDateStr);
  let yAssignments = {};
  try {
    const { data, error } = await db.from('daily_schedule').select('assignments')
      .eq('store_id', STORE_ID).eq('schedule_date', yDate).maybeSingle();
    if (error) throw error;
    yAssignments = data?.assignments || {};
  } catch (e) {
    console.error('fetchYesterdayShiftMap', e?.message || e?.code || e);
    return {};
  }

  const yAbsent = getAbsencesForDate(yDate);   // 昨天请假者按昨天日期算
  const slots   = allSlots();                  // slot 定义（含 overrides）今昨共用
  const map     = {};
  for (const slot of slots) {
    const a = yAssignments[slot.id];
    if (!a) continue;
    // 还原昨天该 slot 的实际时间（带昨天 assignment 里的 timeOverride）
    const ov = a.timeOverride;
    const sh = ov?.startHour ?? slot.startHour;
    const eh = ov?.endHour   ?? slot.endHour;
    if (a.empId && !yAbsent[a.empId]) {
      map[a.empId] = { startHour: sh, endHour: eh, pos: slot.pos };
    }
    if (a.studentId && !yAbsent[a.studentId]) {
      map[a.studentId] = { startHour: sh, endHour: eh, pos: slot.pos };
    }
  }
  return map;
}

// 对比今昨，返回变更标记或 null。优先级 new > pos > time。
//   new  → 昨天没上班（不在 yMap），今天上班       label 'NEW'
//   pos  → 岗位变了                                  label 'CP' (Change Position)
//   time → 岗位同、起止时间任一变了                  label 'CT' (Change Time)
function computeShiftChange(empId, todaySlot, yMap) {
  if (!todaySlot) return null;
  const y = yMap[empId];
  if (!y) return { kind: 'new', label: 'NEW' };
  if (toCanonicalPos(y.pos) !== toCanonicalPos(todaySlot.pos)) return { kind: 'pos', label: 'CP' };
  if (y.startHour !== todaySlot.startHour || y.endHour !== todaySlot.endHour) return { kind: 'time', label: 'CT' };
  return null;
}

// Returns [Mon, Tue, Wed, Thu, Fri, Sat, Sun] ISO strings for the week containing dateStr
function getWeekDates(dateStr) {
  const d   = new Date(dateStr + 'T00:00:00');
  const dow = d.getDay(); // 0=Sun
  const monday = new Date(d);
  monday.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    // Use LOCAL date parts — toISOString() returns UTC and would shift the date
    // by 8 hours for UTC+8 (Malaysia), producing the wrong day label.
    const y  = dd.getFullYear();
    const mo = String(dd.getMonth() + 1).padStart(2, '0');
    const dy = String(dd.getDate()).padStart(2, '0');
    dates.push(`${y}-${mo}-${dy}`);
  }
  return dates;
}

// =============================================================================
// DERIVED STATE
// =============================================================================

function computeState() {
  const todayAbsences = getTodayAbsences();
  const absentSet     = new Set(Object.keys(todayAbsences));

  // Only count employees as "assigned" if their slot still exists in the current layout.
  // Orphaned entries in state.assignments (from deleted extra slots or old slot IDs)
  // would otherwise silently block employees from appearing in dropdowns.
  const validSlotIds    = new Set(allSlots().map(s => s.id));
  const mainAssigned    = new Set();
  const studentAssigned = new Set();

  for (const [slotId, a] of Object.entries(state.assignments)) {
    if (!validSlotIds.has(slotId)) continue;   // skip ghost assignments
    if (a?.empId)      mainAssigned.add(a.empId);
    if (a?.studentId)  studentAssigned.add(a.studentId);
  }
  const assignedSet = new Set([...mainAssigned, ...studentAssigned]);

  const availableStaff = employees.filter(e => !absentSet.has(e.id));
  const unassignedStaff = availableStaff.filter(e => !assignedSet.has(e.id));
  const filledSlots = Object.values(state.assignments).filter(a => a?.empId).length;

  return {
    todayAbsences,
    absentSet,
    mainAssigned,
    studentAssigned,
    assignedSet,
    availableStaff,
    unassignedStaff,
    filledSlots,
  };
}

// ── allSlots() 缓存 ──────────────────────────────────────────────────────────
// 性能优化：原先每次调用都从头重算 30+ 个班次，而一次刷新会调用十几次。
// 这里用一个「指纹」(slotOverrides + extraSlots 的 JSON) 判断数据有没有变：
//   - 没变 → 直接返回上次的结果（秒回）；
//   - 变了 → 重算并记下新指纹。
// 因为指纹覆盖了唯一两个会影响结果的来源，所以无需手动清缓存，永远不会读到过期数据。
let _slotsCache    = null;
let _slotsCacheKey = null;
function allSlots() {
  const key = JSON.stringify(state.slotOverrides) + '|' + JSON.stringify(state.extraSlots);
  if (_slotsCache !== null && key === _slotsCacheKey) return _slotsCache;

  // Apply permanent slot_overrides on top of BASE_SLOTS
  const base = BASE_SLOTS.map(s => {
    const ov = state.slotOverrides[s.id];
    if (!ov) return s;
    return { ...s, startHour: ov.startHour, endHour: ov.endHour,
             shift: formatHourNum(ov.startHour) + '–' + formatHourNum(ov.endHour) };
  });
  _slotsCache    = [...base, ...state.extraSlots];
  _slotsCacheKey = key;
  return _slotsCache;
}

// Returns a slot with any per-day time override applied (from assignments.timeOverride)
function getEffectiveSlot(slot) {
  const daily = state.assignments[slot.id]?.timeOverride;
  if (!daily) return slot;
  const sh = daily.startHour ?? slot.startHour;
  const eh = daily.endHour   ?? slot.endHour;
  return { ...slot, startHour: sh, endHour: eh,
           shift: formatHourNum(sh) + '–' + formatHourNum(eh) };
}

// Is this employee eligible to be the main person for a slot?
function isEligible(employee, slot, computed) {
  if (computed.absentSet.has(employee.id)) return false;

  const assignment = state.assignments[slot.id];
  const alreadyAssigned = computed.assignedSet.has(employee.id);
  const isMainHere    = assignment?.empId     === employee.id;
  const isStudentHere = assignment?.studentId === employee.id;

  if (alreadyAssigned && !isMainHere && !isStudentHere) return false;

  if (slot.pos === 'Dacai')    return true;  // anyone can do 打菜
  if (slot.pos === 'Dishwash') return true;  // anyone can wash dishes
  if (slot.pos === 'Reserve')  return true;  // anyone can be reserve

  // Use toCanonicalPos so Chinese names from positions_master match English BASE_SLOTS keys
  return employee.positions.some(p => toCanonicalPos(p) === slot.pos);
}

// Is this employee eligible to be a student for a slot?
function isStudentEligible(employee, slot, computed) {
  if (computed.absentSet.has(employee.id)) return false;
  const assignment = state.assignments[slot.id];
  if (assignment?.empId === employee.id) return false;  // can't be trainer and student
  const alreadyAssigned = computed.assignedSet.has(employee.id);
  if (alreadyAssigned && assignment?.studentId !== employee.id) return false;
  return true;
}

function isTrainerFor(employee, position) {
  return employee.canTrain.some(p => toCanonicalPos(p) === position);
}

// =============================================================================
// ASSIGNMENT MUTATIONS
// =============================================================================

function assignSlot(slotId, empId) {
  if (!state.assignments[slotId]) state.assignments[slotId] = {};

  if (empId) {
    // Remove this employee from any other slot they were assigned to
    for (const [otherId, a] of Object.entries(state.assignments)) {
      if (otherId !== slotId) {
        if (a?.empId      === empId) a.empId = null;
        if (a?.studentId  === empId) a.studentId = null;
      }
    }
    state.assignments[slotId].empId = empId;
  } else {
    // Clearing the main person also clears the student
    state.assignments[slotId].empId      = null;
    state.assignments[slotId].studentId  = null;
  }
  saveToStorage();
  render();
}

function assignStudent(slotId, studentId) {
  if (!state.assignments[slotId]) state.assignments[slotId] = {};

  if (studentId) {
    for (const [otherId, a] of Object.entries(state.assignments)) {
      if (otherId !== slotId) {
        if (a?.empId     === studentId) a.empId = null;
        if (a?.studentId === studentId) a.studentId = null;
      }
    }
    state.assignments[slotId].studentId = studentId;
  } else {
    state.assignments[slotId].studentId = null;
  }
  saveToStorage();
  render();
}

function addExtraSlot(position, area, startTime, endTime, empId) {
  const id = 'extra-' + Date.now();
  const startHour = parseHour(startTime);
  const endHour   = parseHour(endTime);

  state.extraSlots.push({
    id, pos: position, area, isFlex: true, isExtra: true,
    shift: `${startTime}–${endTime}`,
    startHour, endHour,
  });

  if (empId) state.assignments[id] = { empId };
  addShiftForm.openPosition = null;
  saveToStorage();
  render();
}

function removeExtraSlot(id) {
  state.extraSlots = state.extraSlots.filter(s => s.id !== id);
  delete state.assignments[id];
  saveToStorage();
  render();
}

function el(tag, attrs, ...children) {
  const element = document.createElement(tag);

  if (attrs) {
    for (const [key, value] of Object.entries(attrs)) {
      if (key === 'class') {
        element.className = value;
      } else if (key.startsWith('on') && key.length > 2) {
        element.addEventListener(key.slice(2).toLowerCase(), value);
      } else if (key === 'style' && typeof value === 'object') {
        Object.assign(element.style, value);
      } else if (typeof value === 'boolean') {
        // Boolean attributes (disabled, checked, readonly, …) work by presence:
        // setAttribute('disabled', false) would STILL disable the element (the
        // attribute exists). So set the property directly and only add the
        // attribute when true.
        element[key] = value;
        if (value) element.setAttribute(key, ''); else element.removeAttribute(key);
      } else {
        element.setAttribute(key, value);
      }
    }
  }

  for (const child of children.flat()) {
    if (child == null) continue;
    element.appendChild(child instanceof Node ? child : document.createTextNode(String(child)));
  }

  return element;
}

function icon(name) {
  const i = document.createElement('i');
  i.className = `ti ti-${name}`;
  return i;
}

function badge(text, cssClass) {
  return el('span', { class: `badge ${cssClass}` }, text);
}

function getRoleStyle(role) {
  return ROLE_STYLE[role] || { bg: '#f5f5f4', color: '#57534e' };
}

function formatDate(dateStr) {
  const d    = new Date(dateStr + 'T00:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function getChinaDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][d.getDay()];
}

// Format a fractional hour number → "HH:MM"  e.g. 8.5 → "08:30"
function formatHourNum(h) {
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return String(hh).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
}

function parseHour(timeStr) {
  const [h, m] = timeStr.split(':').map(Number);
  return h + (m || 0) / 60;
}

function cleanShift(shift) {
  return shift.replace(/[①②]/g, '').split('·')[0].trim();
}

function createSelect(options, currentValue, onChange, extraStyle) {
  const sel = document.createElement('select');
  if (extraStyle) sel.style.cssText = extraStyle;
  for (const [value, label] of options) {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = label;
    if (value === currentValue) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', e => onChange(e.target.value));
  return sel;
}

    const leftPart = el('div', { style: { display:'flex', alignItems:'center', gap:'6px' } }, icon('user-question'), ` Unassigned staff: ${computed.unassignedStaff.length}`);
    header.appendChild(leftPart);
    header.appendChild(icon(state.showUnassigned ? 'chevron-up' : 'chevron-down'));
    panel.appendChild(header);

    if (state.showUnassigned) {
      const chipRow = el('div', { class: 'chip-row' });
      for (const emp of computed.unassignedStaff) {
        const style = getRoleStyle(emp.role);
        chipRow.appendChild(el('span', { class: 'staff-chip', style: { background: style.bg, color: style.color } }, emp.shortName));
      }
      panel.appendChild(chipRow);
    }

    frag.appendChild(panel);
  }

  return frag;
}

// =============================================================================
// SCHEDULE TAB
// =============================================================================

function renderScheduleTab(computed) {
  const frag = document.createDocumentFragment();
  frag.appendChild(renderDayMetaPanel());
  frag.appendChild(renderStatusPanel(computed));

  // Group slots by area → position
  const grouped = AREAS.map(area => {
    const slots     = allSlots().filter(s => s.area === area);
    const positions = [...new Set(slots.map(s => s.pos))];
    return { area, positions: positions.map(pos => ({ pos, slots: slots.filter(s => s.pos === pos) })) };
  });

  for (const { area, positions } of grouped) {
    const areaWrap = el('div', { style: { marginBottom: '1.5rem' } });
    areaWrap.appendChild(el('div', { class: `area-label ${AREA_LABEL_CLASS[area] || 'area-reserve'}` }, area));

    for (const { pos, slots } of positions) {
      const isKitchenFixed  = KITCHEN_POSITIONS.includes(pos);
      const isTrainablePos  = isKitchenFixed
        || pos === 'PIC'
        || (allPositions.find(p => toCanonicalPos(p.name) === pos)?.trainable === true)
        || employees.some(e => e.canTrain.some(ct => toCanonicalPos(ct) === pos));
      // C Chop固定班不带isFlex，但业务上需要能临时加班——单独开放Add Shift
      const hasFlex        = slots.some(s => s.isFlex) || pos === 'C Chop';
      const card           = el('div', { class: 'card' });

      // Position header
      const posHeader = el('div', { class: 'flex items-center justify-between', style: { marginBottom: '10px' } });
      const posTitle  = el('p', { style: { fontSize:'13px', fontWeight:'700', margin:'0' } }, pos);

      if (pos === 'Reserve')  posTitle.appendChild(el('span', { style: { fontSize:'11px', color:'var(--text-sub)', marginLeft:'6px' } }, '(all staff eligible)'));
      if (pos === 'Dacai')    posTitle.appendChild(el('span', { style: { fontSize:'11px', color:'var(--text-sub)', marginLeft:'6px' } }, '(all staff eligible)'));
      if (pos === 'Dishwash') posTitle.appendChild(el('span', { style: { fontSize:'11px', color:'var(--text-sub)', marginLeft:'6px' } }, '(all staff eligible)'));

      posHeader.appendChild(posTitle);

      if (hasFlex) {
        const addBtn = el('button', { class: 'btn-sm', onClick: () => { addShiftForm.openPosition = addShiftForm.openPosition === pos ? null : pos; render(); } });
        addBtn.appendChild(icon(addShiftForm.openPosition === pos ? 'x' : 'plus'));
        addBtn.appendChild(document.createTextNode(addShiftForm.openPosition === pos ? ' Cancel' : ' Add Shift'));
        posHeader.appendChild(addBtn);
      }
      card.appendChild(posHeader);

      // Add shift form (if open for this position)
      if (addShiftForm.openPosition === pos) {
        const form = el('div', { class: 'add-shift-form' });

        const eligibleForPos = computed.availableStaff.filter(e => {
          if (pos === 'Dacai')    return true;
          if (pos === 'Reserve')  return true;
          if (pos === 'Dishwash') return true;
          return e.positions.some(p => toCanonicalPos(p) === pos);
        });

        const startOpts = [['', '-- Start --'], ...FH_START_TIMES.map(t => [t, t])];
        const endOpts   = [['', '-- End --'],   ...FH_END_TIMES.map(t => [t, t])];
        const empOpts   = [['', 'Assign (optional)'], ...eligibleForPos.map(e => [e.id, e.shortName])];

        const startSel = createSelect(startOpts, addShiftForm.startTime, v => { addShiftForm.startTime = v; render(); });
        const endSel   = createSelect(endOpts,   addShiftForm.endTime,   v => { addShiftForm.endTime   = v; render(); });
        const empSel   = createSelect(empOpts,   addShiftForm.employeeId, v => { addShiftForm.employeeId = v; });

        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Start'), startSel));
        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'End'),   endSel));
        form.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Assign'), empSel));

        const confirmBtn = el('button', { style: { alignSelf:'flex-end' }, onClick: () => {
          if (!addShiftForm.startTime || !addShiftForm.endTime) return;
          addExtraSlot(pos, area, addShiftForm.startTime, addShiftForm.endTime, addShiftForm.employeeId || undefined);
        }});
        confirmBtn.appendChild(icon('check'));
        confirmBtn.appendChild(document.createTextNode(' Add'));
        form.appendChild(confirmBtn);
        card.appendChild(form);
      }

      // Slot boxes
      const slotsWrap = el('div', { class: 'slots-wrap' });

      for (const slot of slots) {
        const assignment  = state.assignments[slot.id] || {};
        const currentEmpId = assignment.empId;
        const currentStuId = assignment.studentId;
        const isFilled     = !!currentEmpId;

        const mainEmployee   = getEmp(currentEmpId);
        const canAddStudent  = isFilled && isTrainablePos && mainEmployee
          && (slot.pos === 'PIC' || isTrainerFor(mainEmployee, slot.pos));

        const eligibleStaff  = computed.availableStaff.filter(e => isEligible(e, slot, computed));
        const eligibleStudents = computed.availableStaff.filter(e => isStudentEligible(e, slot, computed));

        const slotWrap = el('div', {});
        const ovr = state.assignments[slot.id]?.timeOverride;
        const effSlot = getEffectiveSlot(slot);
        // Only flag as overridden if times actually differ from the (permanent-overridden) base
        const hasDayOverride = !!(ovr &&
          (ovr.startHour !== undefined || ovr.endHour !== undefined) &&
          (ovr.startHour !== effSlot.startHour || ovr.endHour !== effSlot.endHour));
        const slotBox  = el('div', { class: `slot-box${isFilled ? ' filled' : ''}${hasDayOverride ? ' day-override' : ''}` });

        // Shift label row — time text + small clock icon button inline
        const shiftRow = el('div', { class: `slot-shift${isFilled ? ' filled' : ' unfilled'}`,
          style: { display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'4px' } });
        shiftRow.appendChild(el('span', {}, (hasDayOverride ? '⏰ ' : '') + effSlot.shift + (slot.note ? ` · ${slot.note}` : '')));

        // Clock icon button (manager only) — small, inline, does NOT take up full row
        if (currentRole === 'manager') {
          const clockIcon = el('button', {
            title: hasDayOverride ? '今日已调整 — 点击修改' : '今日调整班次时间',
            style: {
              background: 'none', border: 'none', cursor: 'pointer', padding: '0 0 0 4px',
              color: hasDayOverride ? 'var(--amber-600)' : 'var(--text-muted)',
              fontSize: '13px', lineHeight: '1', flexShrink: '0',
            },
            onClick: () => {
              if (slotTimeEditId === slot.id) {
                slotTimeEditId = null;
              } else {
                slotTimeEditId = slot.id;
                slotTimeEdit = {
                  startHour: ovr?.startHour ?? effSlot.startHour,
                  endHour:   ovr?.endHour   ?? effSlot.endHour,
                };
              }
              render();
            }
          });
          clockIcon.appendChild(icon(slotTimeEditId === slot.id ? 'x' : 'clock-edit'));
          shiftRow.appendChild(clockIcon);
        }
        slotBox.appendChild(shiftRow);

        // Main assignment select
        const mainSel = document.createElement('select');
        mainSel.className = 'slot-select';

        const blankOpt = document.createElement('option');
        blankOpt.value = ''; blankOpt.textContent = '— Unassigned —';
        mainSel.appendChild(blankOpt);

        for (const emp of eligibleStaff) {
          const opt = document.createElement('option');
          opt.value = emp.id;
          let label = emp.shortName;
          if (isTrainablePos && isTrainerFor(emp, slot.pos)) label += ' (T)';
          if (emp.tags.length) label += ` [${emp.tags.join('/')}]`;
          opt.textContent = label;
          if (emp.id === currentEmpId) opt.selected = true;
          mainSel.appendChild(opt);
        }
        if (!currentEmpId) mainSel.value = '';
        mainSel.addEventListener('change', e => assignSlot(slot.id, e.target.value || undefined));
        slotBox.appendChild(mainSel);

        // Remove button for extra slots
        if (slot.isExtra) {
          const removeBtn = el('button', { class: 'btn-sm btn-danger', style: { marginTop: '4px', fontSize:'10px' }, onClick: () => removeExtraSlot(slot.id) });
          removeBtn.appendChild(icon('trash'));
          slotBox.appendChild(removeBtn);
        }

        slotWrap.appendChild(slotBox);

        // Per-day time popover
        if (currentRole === 'manager' && slotTimeEditId === slot.id) {
          const timeOpts = generateTimeOptions();
          const popover  = el('div', { class: 'time-edit-popover' });
          popover.appendChild(el('div', { class: 'pop-title' }, '今日调整班次时间'));
          popover.appendChild(el('div', { class: 'pop-orig' }, `模板时间：${formatHourNum(slot.startHour)} – ${formatHourNum(slot.endHour)}`));

          const startSel = createSelect(timeOpts, formatHourNum(slotTimeEdit.startHour), v => { slotTimeEdit.startHour = parseHour(v); });
          const endSel   = createSelect(timeOpts, formatHourNum(slotTimeEdit.endHour),   v => { slotTimeEdit.endHour   = parseHour(v); });
          const startRow = el('div', { class: 'pop-row' });
          startRow.appendChild(el('span', { style: { minWidth: '30px' } }, '开始'));
          startRow.appendChild(startSel);
          popover.appendChild(startRow);

          const endRow = el('div', { class: 'pop-row' });
          endRow.appendChild(el('span', { style: { minWidth: '30px' } }, '结束'));
          endRow.appendChild(endSel);
          popover.appendChild(endRow);

          const btnRow = el('div', { style: { display:'flex', gap:'4px', marginTop:'2px' } });

          const confirmBtn = el('button', { class: 'btn-sm btn-success', onClick: () => {
            const sh = slotTimeEdit.startHour;
            const eh = slotTimeEdit.endHour;
            if (eh <= sh) return;  // invalid range
            // If times match the base slot exactly, treat as "clear override"
            if (sh === effSlot.startHour && eh === effSlot.endHour) {
              if (state.assignments[slot.id]) delete state.assignments[slot.id].timeOverride;
            } else {
              if (!state.assignments[slot.id]) state.assignments[slot.id] = {};
              state.assignments[slot.id].timeOverride = { startHour: sh, endHour: eh };
            }
            slotTimeEditId = null;
            saveToStorage(); render();
          }});
          confirmBtn.appendChild(icon('check'));
          confirmBtn.appendChild(document.createTextNode(' 确认'));
          btnRow.appendChild(confirmBtn);

          if (hasDayOverride) {
            const clearBtn = el('button', { class: 'btn-sm btn-danger', onClick: () => {
              if (state.assignments[slot.id]) delete state.assignments[slot.id].timeOverride;
              slotTimeEditId = null;
              saveToStorage(); render();
            }});
            clearBtn.appendChild(icon('rotate-ccw'));
            clearBtn.appendChild(document.createTextNode(' 还原'));
            btnRow.appendChild(clearBtn);
          }

          const cancelBtn = el('button', { class: 'btn-sm', onClick: () => { slotTimeEditId = null; render(); } });
          cancelBtn.appendChild(icon('x'));
          btnRow.appendChild(cancelBtn);

          popover.appendChild(btnRow);
          slotWrap.appendChild(popover);
        }

        // Student slot (for kitchen positions and any trainable front positions like D Drink)
        if (isTrainablePos) {
          // 已存在的学员可能变成"孤儿"：当主岗不再是合格 trainer 时（trainer 失去
          // canTrain、主岗被换成非 trainer、或复制班表把学员连带搬了过来），
          // canAddStudent 会变 false。若不显示出来，这个学员会被静默困住——仍占着
          // 这个人，使其从其他下拉和"未排班"里消失，且无法清除。
          const hasOrphanStudent = !canAddStudent && !!currentStuId;
          const studentBox = el('div', { class: 'student-box', style: { opacity: (canAddStudent || hasOrphanStudent) ? '1' : '0.4' } });
          const studentLabel = el('div', { class: 'student-label' });
          studentLabel.appendChild(icon('school'));
          studentLabel.appendChild(document.createTextNode(
            canAddStudent
              ? (slot.pos === 'PIC' ? ' Student PIC' : ' Student')
              : hasOrphanStudent
                ? ' Student · trainer 已无资格'
                : ' Need Trainer to add student'
          ));
          studentBox.appendChild(studentLabel);

          if (canAddStudent) {
            const studentSel = document.createElement('select');
            studentSel.style.cssText = 'border:none;background:transparent;padding:0;width:100%;font-size:12px;cursor:pointer;font-family:inherit;';

            const blankStudentOpt = document.createElement('option');
            blankStudentOpt.value = ''; blankStudentOpt.textContent = '— No student —';
            studentSel.appendChild(blankStudentOpt);

            for (const emp of eligibleStudents) {
              const opt = document.createElement('option');
              opt.value = emp.id; opt.textContent = emp.shortName;
              if (emp.id === currentStuId) opt.selected = true;
              studentSel.appendChild(opt);
            }
            if (!currentStuId) studentSel.value = '';
            studentSel.addEventListener('change', e => assignStudent(slot.id, e.target.value || undefined));
            studentBox.appendChild(studentSel);
          } else if (hasOrphanStudent) {
            // 把被困学员显示出来，并提供一键清除，使其重新可被排班。
            const stuEmp = getEmp(currentStuId);
            const row = el('div', { style: { display:'flex', alignItems:'center', justifyContent:'space-between', gap:'6px', marginTop:'2px' } });
            row.appendChild(el('span', { style: { fontSize:'12px', fontWeight:'600' } }, stuEmp ? stuEmp.shortName : currentStuId));
            const clearBtn = el('button', { class: 'btn-sm btn-danger', style: { fontSize:'10px' }, onClick: () => assignStudent(slot.id, undefined) });
            clearBtn.appendChild(icon('x'));
            clearBtn.appendChild(document.createTextNode(' 清除'));
            row.appendChild(clearBtn);
            studentBox.appendChild(row);
          }

          slotWrap.appendChild(studentBox);
        }

        slotsWrap.appendChild(slotWrap);
      }

      card.appendChild(slotsWrap);
      areaWrap.appendChild(card);
    }

    frag.appendChild(areaWrap);
  }

  return frag;
}

// =============================================================================
// TALENT BOARD (人才看板)
// =============================================================================
// Skill levels per position:
//   L1 在训 (training[]) → L2 独立 (positions[]) → L3 师傅 (canTrain[])
// positions/canTrain are reused from the existing schema. A position shows at
// the HIGHEST level the employee holds it (师傅 implies 独立).

const TB_LEVELS = {
  0: { key: 'lv0', short: '·',  label: '未涉及' },
  1: { key: 'lv1', short: '训', label: '在训 (L1)' },
  2: { key: 'lv2', short: '●',  label: '独立 (L2)' },
  3: { key: 'lv3', short: '师', label: '师傅 (L3)' },
};

// Talent board view state
let talentState = { view: 'matrix', editThresholds: false };  // 'matrix' | 'cards'

// Returns the skill level (0-3) of an employee for a given position name.
function tbLevel(emp, posName) {
  // Compare by canonical name so a station stored under any writing
  // (e.g. 'A1 炒菜' vs 'A1 Wok') is matched consistently.
  const target = toCanonicalPos(posName);
  const has = (arr) => (arr || []).some(p => toCanonicalPos(p) === target);
  if (has(emp.canTrain))  return 3;
  if (has(emp.positions)) return 2;
  if (has(emp.training))  return 1;
  return 0;
}

// Build the ordered list of positions to show as matrix columns.
// Source: positions_master if available, else collected from employee data.
// Excludes "anyone can do" utility slots (Dacai/Dishwash/Reserve).
const TB_EXCLUDE = ['Dacai', 'Dishwash', 'Reserve'];
function tbPositions() {
  // Collect every position string that appears, but DEDUPE BY CANONICAL NAME.
  // The data may mix writings of the same station (e.g. 'A1 Wok' vs 'A1 炒菜'),
  // which all map to one canonical id via toCanonicalPos(). Without canonical
  // dedupe, the same station would appear as multiple identical-looking rows.
  const byCanon = new Map();  // canonical → representative raw name
  const consider = (raw) => {
    const canon = toCanonicalPos(raw);
    if (TB_EXCLUDE.includes(canon)) return;
    // Prefer the canonical form itself as the representative when present,
    // so editing/saving always writes the canonical name going forward.
    if (!byCanon.has(canon) || raw === canon) byCanon.set(canon, raw === canon ? raw : byCanon.get(canon) ?? raw);
  };
  for (const p of (allPositions || []).map(p => p.name)) consider(p);
  for (const e of employees) {
    for (const p of [...(e.positions||[]), ...(e.canTrain||[]), ...(e.training||[])]) consider(p);
  }
  // Use canonical names as the working list — one entry per station.
  let list = [...byCanon.keys()];

  // Stable ordering: by area (后厨 first), then by master sort_order if known
  const order = {}; (allPositions||[]).forEach(p => order[toCanonicalPos(p.name)] = p.sort_order ?? 999);
  const KITCHEN = new Set(KITCHEN_POSITIONS);
  list.sort((a, b) => {
    const ka = KITCHEN.has(a) ? 0 : 1;
    const kb = KITCHEN.has(b) ? 0 : 1;
    if (ka !== kb) return ka - kb;
    return (order[a] ?? 999) - (order[b] ?? 999) || a.localeCompare(b);
  });
  return list;
}

// Short column header for a position (strips the English suffix for compactness).
function tbPosShort(posName) {
  const canon = toCanonicalPos(posName);
  const map = {
    'A1 Wok':'A1 炒','A2 Steam':'A2 蒸','B Chicken':'B 鸡','C Chop':'C 剁鸡',
    'Cutting':'切配','D Drink':'D 饮','Service':'前厅','PIC':'PIC',
  };
  return map[canon] || posName;
}

// Coverage stats for a position across all (active) employees.
// Roles considered management / trainer track — may be reassigned off-floor,
// so the manager can exclude them to see true front-line bench strength.
const TB_MGMT_ROLES = ['店长', '培训主管', '培训员'];
function tbIsFrontline(emp) { return !TB_MGMT_ROLES.includes(emp.role); }

// Coverage for a position. When excludeMgmt is true, management/trainer-track
// staff are dropped from the counts. Always also returns the full (unfiltered)
// independent count so the UI can show "10 → 6" style deltas.
function tbCoverage(posName, excludeMgmt) {
  let independent = 0, trainers = 0, learning = 0, independentAll = 0;
  for (const e of employees) {
    const lv = tbLevel(e, posName);
    if (lv >= 2) independentAll++;
    if (excludeMgmt && !tbIsFrontline(e)) continue;  // skip mgmt when filtering
    if (lv === 3) { trainers++; independent++; }
    else if (lv === 2) independent++;
    else if (lv === 1) learning++;
  }
  return { independent, trainers, learning, independentAll };
}

// Risk tier from independent count: ≤1 risk, =2 warn, ≥3 ok.
// Default thresholds: red line = 2 (below = risk), yellow line = 3 (at/above = ok).
// i.e. independent < red → risk; red ≤ independent < yellow → warn; ≥ yellow → ok.
// This matches the original ≤1 risk / =2 warn / ≥3 ok behaviour.
const TB_DEFAULT_RED = 2, TB_DEFAULT_YELLOW = 3;

function tbThreshold(posName) {
  const t = (state.posThresholds || {})[posName];
  let red    = (t && Number.isFinite(t.red))    ? t.red    : TB_DEFAULT_RED;
  let yellow = (t && Number.isFinite(t.yellow)) ? t.yellow : TB_DEFAULT_YELLOW;
  if (yellow <= red) yellow = red + 1;  // guard against inverted/equal lines
  return { red, yellow };
}

function tbRiskTier(posName, independent) {
  const { red, yellow } = tbThreshold(posName);
  if (independent < red)    return 'risk';
  if (independent < yellow) return 'warn';
  return 'ok';
}

function tbIsMultiSkilled(emp) {
  const skills = new Set([...(emp.positions||[]), ...(emp.canTrain||[])].map(toCanonicalPos));
  return skills.size >= 4;
}

// ── Main tab renderer ──
function renderTalentTab() {
  const frag = document.createDocumentFragment();
  const positions = tbPositions();
  const isManager = currentRole === 'manager';

  // Migration banner (only if Supabase columns are missing)
  if (talentColumnsMissing) {
    frag.appendChild(el('div', { class: 'tb-banner' },
      '提示：Supabase 尚未添加人才看板字段，当前修改仅在本次会话可见。请在 SQL Editor 运行加列脚本以启用云端同步。'));
  }

  // ── Summary stats ──
  const onDuty = employees.length;
  const learningCount = employees.filter(e => (e.training||[]).length > 0).length;
  const multiCount = employees.filter(tbIsMultiSkilled).length;
  const riskCount = positions.filter(p => tbRiskTier(p, tbCoverage(p, state.tbExcludeMgmt).independent) === 'risk').length;

  const stats = el('div', { class: 'tb-stats' });
  const mkStat = (label, val, danger) => {
    const s = el('div', { class: 'tb-stat' });
    s.appendChild(el('div', { class: 'tb-stat-label' }, label));
    s.appendChild(el('div', { class: 'tb-stat-val', style: danger && val > 0 ? { color:'var(--red-600)' } : {} }, String(val)));
    return s;
  };
  stats.appendChild(mkStat('在岗员工', onDuty));
  stats.appendChild(mkStat('正在带训', learningCount));
  stats.appendChild(mkStat('多面手 (≥4岗)', multiCount));
  stats.appendChild(mkStat('风险岗位', riskCount, true));
  frag.appendChild(stats);

  // ── Skill matrix section ──
  const matrixTitle = el('div', { class: 'tb-section-title', style: { justifyContent:'space-between' } });
  matrixTitle.appendChild(el('span', { style: { display:'flex', alignItems:'center', gap:'6px' } }, icon('table'), '技能矩阵'));
  if (isManager) {
    const normBtn = el('button', { class: 'btn-sm', style: { padding:'2px 8px' }, onClick: openNormalizeModal });
    normBtn.appendChild(icon('wand'));
    normBtn.appendChild(document.createTextNode(' 规范化数据'));
    matrixTitle.appendChild(normBtn);
  }
  frag.appendChild(matrixTitle);

  const toggle = el('div', { class: 'tb-viewtoggle' });
  const mkToggle = (key, label) => el('button', {
    class: `tb-viewbtn${talentState.view === key ? ' active' : ''}`,
    onClick: () => { talentState.view = key; render(); },
  }, label);
  toggle.appendChild(mkToggle('matrix', '表格视图'));
  toggle.appendChild(mkToggle('cards', '卡片视图'));
  frag.appendChild(toggle);

  if (talentState.view === 'matrix') {
    frag.appendChild(tbRenderMatrix(positions, isManager));
  } else {
    frag.appendChild(tbRenderCards(positions));
  }

  // Legend
  const legend = el('div', { class: 'tb-legend' });
  const mkLeg = (cls, text) => { const s = el('span'); const i = el('i', { class: cls }); s.appendChild(i); s.appendChild(document.createTextNode(text)); return s; };
  legend.appendChild(mkLeg('lv1', '训 = 在训 L1'));
  legend.appendChild(mkLeg('lv2', '● = 独立 L2'));
  legend.appendChild(mkLeg('lv3', '师 = 师傅 L3'));
  if (isManager && talentState.view === 'matrix') {
    legend.appendChild(el('span', { style: { color:'var(--text-muted)' } }, '点击格子可切换：空→训→独立→师傅'));
  }
  frag.appendChild(legend);

  // ── Risk section ──
  const riskTitle = el('div', { class: 'tb-section-title', style: { justifyContent:'space-between' } });
  riskTitle.appendChild(el('span', { style: { display:'flex', alignItems:'center', gap:'6px' } }, icon('alert-triangle'), '岗位风险预警'));
  if (isManager) {
    const thBtn = el('button', { class: 'btn-sm', style: { padding:'2px 8px' },
      onClick: () => { talentState.editThresholds = !talentState.editThresholds; render(); } });

// ── Per-position threshold editor ──

  wrap.appendChild(el('div', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'8px', lineHeight:'1.5' } },
    '为每个岗位设置：独立顶岗人数低于「红线」标红（单点风险），低于「黄线」标黄（脆弱），达到黄线及以上标绿（健康）。留空用默认（红线 2、黄线 3）。'));

  if (posThresholdColMissing) {
    wrap.appendChild(el('div', { class: 'tb-banner', style: { marginBottom:'8px' } },
      '提示：Supabase 的 coverage_settings 尚未添加 pos_thresholds 列，阈值修改当前仅本会话可见。'));
  }

  // header row
  const head = el('div', { style: { display:'flex', alignItems:'center', gap:'8px', fontSize:'11px', color:'var(--text-muted)', paddingBottom:'4px', borderBottom:'1px solid var(--border)' } });
  head.appendChild(el('div', { style: { flex:'1' } }, '岗位'));
  head.appendChild(el('div', { style: { width:'68px', textAlign:'center' } }, '红线 <'));
  head.appendChild(el('div', { style: { width:'68px', textAlign:'center' } }, '黄线 <'));
  head.appendChild(el('div', { style: { width:'46px', textAlign:'center' } }, '当前'));
  wrap.appendChild(head);

  const draft = { ...(state.posThresholds || {}) };
  for (const p of positions) {
    const cur = tbThreshold(p);
    const set = (state.posThresholds || {})[p] || {};
    const c = tbCoverage(p, state.tbExcludeMgmt);
    const row = el('div', { style: { display:'flex', alignItems:'center', gap:'8px', padding:'5px 0', borderTop:'1px solid var(--gray-100)' } });
    row.appendChild(el('div', { class: 'tb-skedit-name', style: { flex:'1' } }, tbPosShort(p)));

    const redIn = el('input', { type:'number', min:'0', placeholder:String(TB_DEFAULT_RED),
      value: Number.isFinite(set.red) ? String(set.red) : '', style:{ width:'68px', textAlign:'center' } });
    const yelIn = el('input', { type:'number', min:'1', placeholder:String(TB_DEFAULT_YELLOW),
      value: Number.isFinite(set.yellow) ? String(set.yellow) : '', style:{ width:'68px', textAlign:'center' } });

    const commit = () => {
      const map = { ...(state.posThresholds || {}) };
      const r = parseInt(redIn.value); const y = parseInt(yelIn.value);
      const entry = {};
      if (Number.isFinite(r)) entry.red = r;
      if (Number.isFinite(y)) entry.yellow = y;
      if (Object.keys(entry).length) map[p] = entry; else delete map[p];
      savePosThresholds(map);
    };
    redIn.addEventListener('change', commit);
    yelIn.addEventListener('change', commit);
    row.appendChild(redIn);
    row.appendChild(yelIn);

    const tier = tbRiskTier(p, c.independent);
    const tierCol = tier === 'risk' ? 'var(--red-600)' : tier === 'warn' ? 'var(--amber-600)' : 'var(--green-600)';
    row.appendChild(el('div', { style: { width:'46px', textAlign:'center', fontWeight:'700', color: tierCol } }, String(c.independent)));
    wrap.appendChild(row);
  }
  return wrap;
}

    const c = tbCoverage(p, state.tbExcludeMgmt);

    const th = tbThreshold(p);

    cov.appendChild(el('th', { class: cls, title: `一线独立 ${c.independent}${delta} · 师傅 ${c.trainers} · 在训 ${c.learning}（红线<${th.red}，黄线<${th.yellow}）` },

    const nameTd = el('td', { class: 'tb-name', style: { cursor:'pointer' }, onClick: () => openDevCard(emp.id) }, emp.shortName);
    tr.appendChild(nameTd);
