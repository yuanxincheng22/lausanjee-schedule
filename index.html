function renderWeekPreview() {
  const DAY_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const weekDates  = getWeekDates(state.selectedDate);
  const weekAbs    = weekDates.map(d => getAbsencesForDate(d));

  // ── Coverage thresholds (manager-set, from DB) ──
  const TH_ONDUTY = state.coverageThresholds?.onDuty ?? 30;
  const TH_FRONT  = state.coverageThresholds?.front  ?? 7;

  // Determine each employee's "home" area from their own position list (independent
  // of any given day's roster) so per-day counting stays stable across the week.
  function empHomeArea(emp) {
    const counts = {};
    for (const posName of (emp.positions || [])) {
      const posObj = allPositions.find(p => p.name === posName);
      if (posObj) counts[posObj.area] = (counts[posObj.area] || 0) + 1;
    }
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    return sorted[0]?.[0] || '后备';
  }
  const totalStaff = employees.length;
  const frontStaff = employees.filter(e => empHomeArea(e) === '前厅');
  const frontTotal = frontStaff.length;

  // Per-day on-duty counts = total staff minus those absent that day
  const onDutyByDay = weekDates.map((d, i) => totalStaff - Object.keys(weekAbs[i]).length);
  const frontOnDutyByDay = weekDates.map((d, i) =>
    frontStaff.filter(e => !(e.id in weekAbs[i])).length
  );

  // Split employees: has any absence this week vs. none
  const withLeave    = employees.filter(emp => weekAbs.some(dayAbs => emp.id in dayAbs));
  const withoutLeave = employees.filter(emp => !weekAbs.some(dayAbs => emp.id in dayAbs));

  const frag = document.createDocumentFragment();
  frag.appendChild(el('p', { class: 'section-title', style: { marginTop: '0' } }, 'This Week'));

  // ── Shared table header builder ──
  const thBase = 'padding:6px 8px; font-weight:600; font-size:11px; color:var(--text-sub); border-bottom:1px solid var(--border); text-align:center;';
  const tdBase = 'padding:5px 8px; text-align:center; border-bottom:1px solid var(--border); vertical-align:middle;';

  function buildHeader() {
    return el('thead', {}, el('tr', {}, ...[
      el('th', { style: thBase + 'text-align:left; min-width:80px;' }, 'Employee'),
      ...weekDates.map((d, i) => {
        const isSel    = d === state.selectedDate;
        const datePart = d.slice(5).replace('-', '/');
        const th = el('th', { style: thBase + `min-width:56px;${isSel ? 'background:var(--blue-50);color:var(--blue-700);border-radius:4px 4px 0 0;' : ''}` });
        th.appendChild(document.createTextNode(DAY_LABELS[i]));
        th.appendChild(el('br', {}));
        th.appendChild(el('span', { style: 'font-weight:400;' }, datePart));
        return th;
      })
    ]));
  }

  // ── Coverage summary: per-day "on duty" counts + manager-set warning thresholds ──
  {
    const covWrap = el('div', { style: 'overflow-x:auto; margin-bottom:14px; border:1px solid var(--border); border-radius:var(--radius-md);' });
    const covTable = el('table', { style: 'width:100%; border-collapse:collapse; font-size:12px;' });
    covTable.appendChild(buildHeader());
    const covBody = el('tbody', {});

    // Row builder: label + 7 day counts, red when below threshold
    function coverageRow(label, counts, threshold, totalLabel) {
      const tr = el('tr', {});
      const labelCell = el('td', { style: tdBase + 'text-align:left; font-weight:700;' });
      labelCell.appendChild(document.createTextNode(label));
      if (totalLabel != null) {
        labelCell.appendChild(el('span', { style: 'font-weight:400; color:var(--text-muted); font-size:11px; margin-left:4px;' }, `(${totalLabel} total)`));
      }
      tr.appendChild(labelCell);
      for (let i = 0; i < 7; i++) {
        const isSel = weekDates[i] === state.selectedDate;
        const low   = counts[i] < threshold;
        let cell = tdBase + 'font-weight:700;';
        if (low)        cell += 'background:var(--red-50); color:var(--red-700);';
        else if (isSel) cell += 'background:var(--blue-50);';
        const td = el('td', { style: cell });
        td.appendChild(document.createTextNode(String(counts[i])));
        if (low) {
          const w = icon('alert-triangle');
          w.style.fontSize = '12px'; w.style.marginLeft = '3px'; w.style.verticalAlign = '-1px';
          td.appendChild(w);
        }
        tr.appendChild(td);
      }
      return tr;
    }

    covBody.appendChild(coverageRow('On Duty', onDutyByDay, TH_ONDUTY, totalStaff));
    covBody.appendChild(coverageRow('前厅 FOH', frontOnDutyByDay, TH_FRONT, frontTotal));
    covTable.appendChild(covBody);
    covWrap.appendChild(covTable);
    frag.appendChild(covWrap);

    // ── Threshold settings (manager-editable, persisted to DB) ──
    const setRow = el('div', { style: 'display:flex; flex-wrap:wrap; align-items:flex-end; gap:14px; margin-bottom:18px; padding:10px 12px; background:var(--gray-50); border:1px solid var(--border); border-radius:var(--radius-sm);' });
    const warnIcon = icon('alert-triangle'); warnIcon.style.color = 'var(--red-600)';
    setRow.appendChild(el('div', { style: 'display:flex; align-items:center; gap:5px; font-size:12px; font-weight:600; color:var(--text-sub);' },
      warnIcon,
      document.createTextNode('低于警戒线变红')
    ));

    function thresholdField(labelText, value, onCommit) {
      const grp = el('div', { class: 'form-group' });
      grp.appendChild(el('label', { class: 'form-label' }, labelText));
      const inp = el('input', { type: 'number', value: String(value), style: 'width:80px;' });
      inp.min = '0';
      const commit = () => {
        let v = parseInt(inp.value, 10);
        if (isNaN(v) || v < 0) v = 0;
        inp.value = String(v);
        onCommit(v);
      };
      inp.addEventListener('change', commit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      grp.appendChild(inp);
      return grp;
    }

    setRow.appendChild(thresholdField('On Duty 最低', TH_ONDUTY, v => {
      saveCoverageSettings(v, TH_FRONT).then(render);
    }));
    setRow.appendChild(thresholdField('前厅 FOH 最低', TH_FRONT, v => {
      saveCoverageSettings(TH_ONDUTY, v).then(render);
    }));
    frag.appendChild(setRow);
  }

  // ── Section 1: employees WITH leave ──
  if (withLeave.length === 0) {
    frag.appendChild(el('p', { style: { fontSize:'13px', color:'var(--text-sub)', marginBottom:'8px' } }, '✅ No absences scheduled this week.'));
  } else {
    const wrap  = el('div', { style: { overflowX:'auto', marginBottom:'12px' } });
    const table = el('table', { style: { width:'100%', borderCollapse:'collapse', fontSize:'12px' } });
    table.appendChild(buildHeader());
    const tbody = el('tbody', {});

    for (const emp of withLeave) {
      const tr = el('tr', {});
      tr.appendChild(el('td', { style: tdBase + 'text-align:left; font-weight:600;' }, emp.shortName));

      for (let i = 0; i < 7; i++) {
        const leaveType = weekAbs[i][emp.id];
        const isSel     = weekDates[i] === state.selectedDate;
        const td = el('td', { style: tdBase + (isSel ? 'background:var(--blue-50);' : '') });

        if (leaveType) {
          const lt = LEAVE_TYPES[leaveType] || { label: leaveType, badgeClass: 'badge-gray' };
          const planRecord = (state.plannedLeave[emp.id] || []).find(
            lv => weekDates[i] >= lv.from && weekDates[i] <= lv.to
          );
          const b = el('span', {
            class: `badge ${lt.badgeClass}`,
            style: `font-size:10px;${planRecord ? 'cursor:pointer;' : ''}`,
            title: planRecord ? 'Click to jump to record' : lt.label
          }, lt.label);
          if (planRecord) {
            b.addEventListener('click', () => {
              const target = document.getElementById('upcoming-item-' + planRecord.id);
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.style.transition = 'background 0.3s';
                target.style.background = 'var(--blue-50)';
                setTimeout(() => { target.style.background = ''; }, 1600);
              }
            });
          }
          td.appendChild(b);
        } else {
          td.appendChild(el('span', { style: 'color:var(--text-muted);' }, '—'));
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    wrap.appendChild(table);
    frag.appendChild(wrap);
  }

  // ── Section 2: employees WITHOUT leave (collapsible) ──
  const colHeader = el('div', {
    style: `display:flex; align-items:center; gap:6px; cursor:pointer; padding:6px 10px;
            background:var(--gray-50); border:1px solid var(--border);
            border-radius:var(--radius-sm); margin-bottom:${weekPreviewExpanded ? '0' : '20px'};
            user-select:none;`,
    onClick: () => { weekPreviewExpanded = !weekPreviewExpanded; render(); }
  });
  colHeader.appendChild(icon(weekPreviewExpanded ? 'chevron-down' : 'chevron-right'));
  colHeader.appendChild(el('span', { style: 'font-size:12px; font-weight:600; color:var(--text-sub);' },
    `No Leave This Week (${withoutLeave.length} staff)`));
  frag.appendChild(colHeader);

  if (weekPreviewExpanded && withoutLeave.length > 0) {
    const wrap2  = el('div', { style: 'overflow-x:auto; margin-bottom:20px; border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);' });
    const table2 = el('table', { style: 'width:100%; border-collapse:collapse; font-size:12px;' });
    table2.appendChild(buildHeader());
    const tbody2 = el('tbody', {});

    for (const emp of withoutLeave) {
      const tr = el('tr', {});
      tr.appendChild(el('td', { style: tdBase + 'text-align:left; font-weight:600;' }, emp.shortName));
      for (let i = 0; i < 7; i++) {
        const isSel = weekDates[i] === state.selectedDate;
        const td = el('td', { style: tdBase + (isSel ? 'background:var(--blue-50);' : '') });
        td.appendChild(el('span', { style: 'color:var(--text-muted);' }, '—'));
        tr.appendChild(td);
      }
      tbody2.appendChild(tr);
    }
    table2.appendChild(tbody2);
    wrap2.appendChild(table2);
    frag.appendChild(wrap2);
  }

  return frag;
}

function computeRestData() {
  const weekDates = getWeekDates(state.selectedDate);
  const weekStart = weekDates[0];

  // ── Step 1: rest days THIS week per employee (use getAbsencesForDate so
  //   dailyLeave overrides on top of plannedLeave are handled correctly) ──
  const restThisWeek = {};   // empId → [dateStr …]
  for (const d of weekDates) {
    const abs = getAbsencesForDate(d);
    for (const [empId, type] of Object.entries(abs)) {
      if (type === 'rest') {
        if (!restThisWeek[empId]) restThisWeek[empId] = [];
        restThisWeek[empId].push(d);
      }
    }
  }

  // ── Step 2: last rest day BEFORE this week per employee ──
  const lastRest = {};   // empId → dateStr

  // 2a. from dailyLeave direct entries
  for (const [date, dayMap] of Object.entries(state.dailyLeave)) {
    if (date >= weekStart) continue;
    for (const [empId, type] of Object.entries(dayMap)) {
      if (type === 'rest' && (!lastRest[empId] || date > lastRest[empId])) {
        lastRest[empId] = date;
      }
    }
  }

  // 2b. from plannedLeave ranges with type=rest that end before this week
  for (const [empId, leaves] of Object.entries(state.plannedLeave)) {
    if (!Array.isArray(leaves)) continue;
    for (const lv of leaves) {
      if (lv.type !== 'rest') continue;
      if (lv.from >= weekStart) continue;            // starts this week or later → skip
      // The latest relevant date in this range before weekStart
      let effectiveTo = lv.to < weekStart ? lv.to : (() => {
        const d = new Date(weekStart + 'T00:00:00');
        d.setDate(d.getDate() - 1);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      })();
      if (!lastRest[empId] || effectiveTo > lastRest[empId]) lastRest[empId] = effectiveTo;
    }
  }

  return { restThisWeek, lastRest, weekDates, weekStart };
}

function renderRestTracker() {
  const DAY_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const { restThisWeek, lastRest, weekDates, weekStart } = computeRestData();

  const rested    = employees.filter(e => restThisWeek[e.id]);
  const notRested = employees.filter(e => !restThisWeek[e.id]);
  const multiRest = rested.filter(e => restThisWeek[e.id].length >= 2);
  const pct       = employees.length > 0 ? Math.round(rested.length / employees.length * 100) : 0;

  const frag = document.createDocumentFragment();
  const card = el('div', { class: 'rt-card' });

  // ── Header ──
  const hdr = el('div', { class: 'rt-header' });
  const titleEl = el('div', { class: 'rt-title' });
  titleEl.appendChild(icon('beach'));
  titleEl.appendChild(document.createTextNode(' 本周休息安排'));
  titleEl.appendChild(el('span', { style: 'font-size:11px; color:var(--text-sub); font-weight:400; margin-left:4px;' },
    `${weekDates[0].slice(5).replace('-','/')} – ${weekDates[6].slice(5).replace('-','/')}`));
  hdr.appendChild(titleEl);
  hdr.appendChild(el('span', { style: 'font-size:12px; color:var(--text-sub);' },
    `${rested.length} / ${employees.length} 人已安排`));
  card.appendChild(hdr);

  // ── Progress bar ──
  const prog = el('div', { class: 'rt-progress' });
  prog.appendChild(el('div', { class: 'rt-progress-fill', style: { width: pct + '%' } }));
  card.appendChild(prog);

  // ── Stat boxes ──
  const statsRow = el('div', { class: 'rt-stats' });
  const statData = [
    { num: rested.length,    lbl: '✓ 已排休',   color: 'var(--green-600)' },
    { num: notRested.length, lbl: '✗ 未排休',   color: 'var(--red-600)'   },
    { num: multiRest.length, lbl: '≥2天 注意',  color: 'var(--amber-600)' },
  ];
  for (const s of statData) {
    const box = el('div', { class: 'rt-stat' });
    box.appendChild(el('div', { class: 'rt-stat-num', style: { color: s.color } }, String(s.num)));
    box.appendChild(el('div', { class: 'rt-stat-lbl' }, s.lbl));
    statsRow.appendChild(box);
  }
  card.appendChild(statsRow);
  card.appendChild(el('div', { class: 'rt-divider' }));

  // ── 已排休 chips ──
  if (rested.length > 0) {
    card.appendChild(el('p', { class: 'section-title', style: 'margin-top:0;' }, '✓ 已安排休息'));
    const row = el('div', { class: 'rt-chips' });
    for (const emp of rested) {
      const days  = restThisWeek[emp.id];
      const isMulti = days.length >= 2;
      const label = days.map(d => DAY_SHORT[weekDates.indexOf(d)]).join(' + ');
      const chip  = el('div', { class: `rt-chip ${isMulti ? 'rested-multi' : 'rested'}` });
      chip.appendChild(el('span', { class: 'rt-chip-name' }, emp.shortName));
      chip.appendChild(el('span', { class: 'rt-chip-hint' }, `${label}${isMulti ? ' ⚠' : ''}`));
      row.appendChild(chip);
    }
    card.appendChild(row);
  }

  // ── 未排休 chips (clickable → quick-fill) ──
  const notRestedTitle = el('p', { class: 'section-title', style: 'margin-top:0;' });
  notRestedTitle.textContent = notRested.length === 0
    ? '✓ 全员本周已安排休息 🎉'
    : `✗ 尚未安排 (${notRested.length}人) — 点击员工名快速填入表单`;
  card.appendChild(notRestedTitle);

  if (notRested.length > 0) {
    const row2 = el('div', { class: 'rt-chips' });
    for (const emp of notRested) {
      const lastD = lastRest[emp.id];
      let hintText  = '无记录';
      let hintClass = 'rt-chip-hint rt-hint-none';
      let chipBorderColor = '';
      let chipBg = '';

      if (lastD) {
        const daysSince = Math.floor(
          (new Date(weekStart + 'T00:00:00') - new Date(lastD + 'T00:00:00')) / 86400000
        );
        const mmdd = lastD.slice(5).replace('-', '/');
        hintText = `上次 ${mmdd} · ${daysSince}天前`;
        if (daysSince >= 10) {
          hintClass = 'rt-chip-hint rt-hint-alert';
          chipBorderColor = 'var(--red-100)';
          chipBg = 'var(--red-50)';
        } else if (daysSince >= 6) {
          hintClass = 'rt-chip-hint rt-hint-warn';
          chipBorderColor = 'var(--amber-100)';
          chipBg = 'var(--amber-50)';
        }
      }

      const chipStyle = [
        chipBg          ? `background:${chipBg};`          : '',
        chipBorderColor ? `border-color:${chipBorderColor};` : '',
      ].join('');

      const chip = el('div', {
        class:  'rt-chip clickable',
        style:  chipStyle,
        title:  `点击快速填入 ${emp.shortName}，并自动选择 Rest Day`,
        onClick: () => {
          leaveForm.employeeId = emp.id;
          leaveForm.type       = 'rest';
          render();
          // Scroll to the schedule form after re-render
          setTimeout(() => {
            const target = document.getElementById('leave-schedule-form');
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 60);
        },
      });
      chip.appendChild(el('span', { class: 'rt-chip-name', style: 'color:var(--text);' }, emp.shortName));
      chip.appendChild(el('span', { class: hintClass }, hintText));
      row2.appendChild(chip);
    }
    card.appendChild(row2);
  }

  frag.appendChild(card);
  return frag;
}


function renderLeaveTab(computed) {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();
  const absList  = Object.entries(absences);

  // ── This Week Preview ──
  frag.appendChild(renderWeekPreview());

  // ── Today's absences ──
  frag.appendChild(el('p', { class: 'section-title' }, "Today's Absences"));

  if (absList.length === 0) {
    frag.appendChild(el('p', { style: { fontSize:'13px', color:'var(--text-sub)', marginBottom:'12px' } }, 'No absences today.'));
  } else {
    for (const [empId, leaveType] of absList) {
      const emp = employees.find(e => e.id === empId);
      if (!emp) continue;
      const lt = LEAVE_TYPES[leaveType] || { label: leaveType, badgeClass: 'badge-gray' };

      const card = el('div', { class: 'leave-card' });
      const topRow = el('div', { class: 'leave-row' });
      const leftPart = el('div', { class: 'flex items-center gap-2' });
      leftPart.appendChild(el('span', { style: { fontWeight: '700' } }, emp.shortName));
      leftPart.appendChild(el('span', { class: 'text-sm', style: { color: 'var(--text-sub)' } }, emp.fullName));
      leftPart.appendChild(badge(lt.label, lt.badgeClass));
      topRow.appendChild(leftPart);
      topRow.appendChild(el('button', { class: 'btn-sm', onClick: () => cancelLeave(empId) }, 'Cancel'));
      card.appendChild(topRow);

      // Cover needed?
      const needsCover = allSlots().filter(s => state.assignments[s.id]?.empId === empId);
      if (needsCover.length > 0) {
        const coverNote = el('div', { style: { display:'flex', alignItems:'center', gap:'5px', fontSize:'12px', color:'var(--red-600)', marginTop:'6px' } });
        coverNote.appendChild(icon('alert-triangle'));
        coverNote.appendChild(document.createTextNode(' Cover needed: ' + needsCover.map(s => `${s.pos} ${s.shift}`).join(', ')));
        card.appendChild(coverNote);

        // Suggest candidates for first slot needing cover
        const firstSlot  = needsCover[0];
        const fakeComputed = { ...computed, assignedSet: new Set([...computed.assignedSet].filter(id => id !== empId)) };
        const candidates  = computed.availableStaff.filter(e => isEligible(e, firstSlot, fakeComputed));

        if (candidates.length > 0) {
          const candRow = el('div', { class: 'flex-wrap', style: { marginTop: '6px' } });
          for (const cand of candidates.slice(0, 5)) {
            const btn = el('button', { class: 'btn-sm btn-success', onClick: () => assignSlot(firstSlot.id, cand.id) }, cand.shortName);
            candRow.appendChild(btn);
          }
          card.appendChild(candRow);
        }
      }

      frag.appendChild(card);
    }
  }

  // ── Rest tracker ──
  frag.appendChild(renderRestTracker());

  // ── Schedule leave ahead ──
  frag.appendChild(el('p', { class: 'section-title' }, 'Schedule Leave Ahead'));

  const formCard = el('div', { class: 'card', id: 'leave-schedule-form' });

  const empOpts  = employees.map(e => ({ id: e.id, short: e.shortName, full: e.fullName }));
  const typeOpts = Object.entries(LEAVE_TYPES).map(([k, v]) => [k, v.label]);

  const typeSel  = createSelect(typeOpts, leaveForm.type, v => { leaveForm.type = v; });

  // ── Searchable employee picker ──
  const currentEmp = leaveForm.employeeId ? employees.find(e => e.id === leaveForm.employeeId) : null;
  const empSearchWrap = el('div', { class: 'emp-search-wrap' });
  const empSearchInput = el('input', {
    type: 'text',
    class: 'emp-search-input',
    placeholder: '搜索员工名字...',
    value: currentEmp ? `${currentEmp.shortName} (${currentEmp.fullName})` : '',
    autocomplete: 'off',
  });

  let empDropdown = null;
  let empHlIdx = -1;

  function closeEmpDropdown() {
    if (empDropdown) { empDropdown.remove(); empDropdown = null; empHlIdx = -1; }
  }

  function buildEmpDropdown(query) {
    closeEmpDropdown();
    const q = query.trim().toLowerCase();
    const filtered = q
      ? empOpts.filter(e => e.short.toLowerCase().includes(q) || e.full.toLowerCase().includes(q))
      : empOpts;
    if (filtered.length === 0) {
      empDropdown = el('div', { class: 'emp-search-dropdown' },
        el('div', { class: 'emp-search-empty' }, '没有找到员工'));
    } else {
      empDropdown = el('div', { class: 'emp-search-dropdown' });
      filtered.forEach((e, idx) => {
        const item = el('div', { class: 'emp-search-item' },
          el('span', { class: 'emp-si-short' }, e.short),
          el('span', { class: 'emp-si-full' },  e.full)
        );
        item.dataset.empId = e.id;
        item.dataset.idx = idx;
        item.addEventListener('mousedown', ev => {
          ev.preventDefault();
          leaveForm.employeeId = e.id;
          empSearchInput.value = `${e.short} (${e.full})`;
          closeEmpDropdown();
        });
        empDropdown.appendChild(item);
      });
    }
    empSearchWrap.appendChild(empDropdown);
  }

  empSearchInput.addEventListener('focus', () => buildEmpDropdown(empSearchInput.value));
  empSearchInput.addEventListener('input', e => {
    leaveForm.employeeId = '';  // clear selection on type
    buildEmpDropdown(e.target.value);
  });
  empSearchInput.addEventListener('keydown', e => {
    if (!empDropdown) return;
    const items = empDropdown.querySelectorAll('.emp-search-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      empHlIdx = Math.min(empHlIdx + 1, items.length - 1);
      items.forEach((it, i) => it.classList.toggle('highlighted', i === empHlIdx));
      if (items[empHlIdx]) items[empHlIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      empHlIdx = Math.max(empHlIdx - 1, 0);
      items.forEach((it, i) => it.classList.toggle('highlighted', i === empHlIdx));
      if (items[empHlIdx]) items[empHlIdx].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (empHlIdx >= 0 && items[empHlIdx]) items[empHlIdx].dispatchEvent(new MouseEvent('mousedown'));
    } else if (e.key === 'Escape') {
      closeEmpDropdown();
    }
  });
  empSearchInput.addEventListener('blur', () => { setTimeout(closeEmpDropdown, 150); });

  empSearchWrap.appendChild(empSearchInput);

  // Lazily init picker display month (== null safe: January = 0 is falsy)
  if (leaveForm.pickerYear  == null) leaveForm.pickerYear  = new Date().getFullYear();
  if (leaveForm.pickerMonth == null) leaveForm.pickerMonth = new Date().getMonth();

  // ── Date range picker (hotel-style inline calendar) ──
  function buildDateRangePicker() {
    const py = leaveForm.pickerYear;
    const pm = leaveForm.pickerMonth;
    const MONTH_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

    const wrap = el('div', { class: 'drp-wrap' });

    // Header: prev / month+year / next
    const drpHeader = el('div', { class: 'drp-header' });
    const prevBtn = el('button', { class: 'drp-nav' });
    prevBtn.appendChild(icon('chevron-left'));
    prevBtn.addEventListener('click', e => {
      e.preventDefault();
      let m = leaveForm.pickerMonth - 1, y = leaveForm.pickerYear;
      if (m < 0) { m = 11; y--; }
      leaveForm.pickerMonth = m; leaveForm.pickerYear = y; render();
    });
    const nextBtn = el('button', { class: 'drp-nav' });
    nextBtn.appendChild(icon('chevron-right'));
    nextBtn.addEventListener('click', e => {
      e.preventDefault();
      let m = leaveForm.pickerMonth + 1, y = leaveForm.pickerYear;
      if (m > 11) { m = 0; y++; }
      leaveForm.pickerMonth = m; leaveForm.pickerYear = y; render();
    });
    drpHeader.appendChild(prevBtn);
    drpHeader.appendChild(el('span', { class: 'drp-month-label' }, `${MONTH_ZH[pm]} ${py}`));
    drpHeader.appendChild(nextBtn);
    wrap.appendChild(drpHeader);

    // Day-of-week headers (Mon-first)
    const grid = el('div', { class: 'drp-grid' });
    for (const dh of ['Mo','Tu','We','Th','Fr','Sa','Su']) {
      grid.appendChild(el('div', { class: 'drp-dh' }, dh));
    }

    // Blank leading cells + day cells
    const firstDow  = new Date(py, pm, 1).getDay();          // 0=Sun
    const blanks    = firstDow === 0 ? 6 : firstDow - 1;     // offset to Mon-first
    const daysInMo  = new Date(py, pm + 1, 0).getDate();
    const todayStr2 = todayLocalStr();
    const cellData  = [];

    for (let b = 0; b < blanks; b++) {
      grid.appendChild(el('div', { class: 'drp-cell drp-blank' }));
      cellData.push({ cellEl: null, date: null });
    }
    for (let d = 1; d <= daysInMo; d++) {
      const dateStr2 = `${py}-${String(pm + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellEl = el('div', { class: 'drp-cell' }, String(d));
      if (dateStr2 === todayStr2) cellEl.classList.add('today');
      grid.appendChild(cellEl);
      cellData.push({ cellEl, date: dateStr2 });
    }
    wrap.appendChild(grid);

    // Range highlight — direct DOM mutation, no full re-render
    function applyRange(hovDate) {
      const from  = leaveForm.fromDate;
      const rawTo = leaveForm.pickStep === 'to' ? (hovDate || leaveForm.toDate) : leaveForm.toDate;
      const lo    = from && rawTo ? (from <= rawTo ? from : rawTo) : from;
      const hi    = from && rawTo ? (from <= rawTo ? rawTo : from) : rawTo;
      for (const { cellEl, date } of cellData) {
        if (!cellEl || !date) continue;
        cellEl.classList.remove('range-start','range-end','in-range');
        if (!lo) continue;
        if (date === lo)                       cellEl.classList.add('range-start');
        if (hi && date === hi)                 cellEl.classList.add('range-end');
        if (lo < date && hi && date < hi)      cellEl.classList.add('in-range');
      }
    }
    applyRange(null);

    // Summary strip + hint
    const summaryEl = el('div', { class: 'drp-summary' });
    const hintEl    = el('div', { class: 'drp-hint' });

    function refreshSummary() {
      summaryEl.innerHTML = '';
      const from = leaveForm.fromDate, to = leaveForm.toDate;
      if (!from) {
        summaryEl.appendChild(el('span', { style: 'color:var(--text-muted);' }, '选择开始休息日'));
      } else if (!to) {
        summaryEl.appendChild(icon('calendar-event'));
        const b = el('b', {}); b.textContent = from; summaryEl.appendChild(b);
        summaryEl.appendChild(el('span', { style: 'color:var(--text-muted);' }, ' → 选择结束日期'));
      } else {
        summaryEl.appendChild(icon('calendar-event'));
        const days = Math.round((new Date(to+'T00:00:00') - new Date(from+'T00:00:00')) / 86400000) + 1;
        const b = el('b', {}); b.textContent = `${from} → ${to}`; summaryEl.appendChild(b);
        summaryEl.appendChild(el('span', { style: 'color:var(--text-muted); margin-left:4px;' }, `(共 ${days} 天)`));
        const clrBtn = el('button', { class: 'btn-sm', style: 'margin-left:auto;' });
        clrBtn.appendChild(icon('x')); clrBtn.appendChild(document.createTextNode(' 清除'));
        clrBtn.addEventListener('click', e => {
          e.preventDefault();
          leaveForm.fromDate = ''; leaveForm.toDate = ''; leaveForm.pickStep = 'from'; render();
        });
        summaryEl.appendChild(clrBtn);
      }
      hintEl.textContent = leaveForm.pickStep === 'from'
        ? '① 点击选择开始日期'
        : '② 再点击选择结束日期（可翻页选其他月份）';
    }
    refreshSummary();
    wrap.appendChild(summaryEl);
    wrap.appendChild(hintEl);

    // Click + hover interactions on day cells
    for (const { cellEl, date } of cellData) {
      if (!cellEl || !date) continue;
      cellEl.addEventListener('click', () => {
        if (leaveForm.pickStep === 'from') {
          leaveForm.fromDate = date; leaveForm.toDate = ''; leaveForm.pickStep = 'to';
        } else {
          if (date >= leaveForm.fromDate) {
            leaveForm.toDate = date; leaveForm.pickStep = 'from';
          } else {
            // Clicked before start → reset with new start date
            leaveForm.fromDate = date; leaveForm.toDate = ''; leaveForm.pickStep = 'to';
          }
        }
        applyRange(null); refreshSummary();
      });
      cellEl.addEventListener('mouseover', () => {
        if (leaveForm.pickStep === 'to' && leaveForm.fromDate) applyRange(date);
      });
      cellEl.addEventListener('mouseout', () => {
        if (leaveForm.pickStep === 'to') applyRange(null);
      });
    }

    return wrap;
  }

  const row1 = el('div', { class: 'flex gap-2', style: { flexWrap: 'wrap', marginBottom: '8px' } });
  const empFormGroup = el('div', { class: 'form-group', style: { flex: '2', minWidth: '160px' } });
  empFormGroup.appendChild(el('label', { class: 'form-label' }, 'Employee'));
  empFormGroup.appendChild(empSearchWrap);
  row1.appendChild(empFormGroup);
  row1.appendChild(el('div', { class: 'form-group' }, el('label', { class: 'form-label' }, 'Leave Type'), typeSel));

  const row2 = el('div', { style: { display:'flex', flexWrap:'wrap', gap:'10px', alignItems:'flex-start', marginTop:'4px' } });
  row2.appendChild(buildDateRangePicker());

  const scheduleBtn = el('button', { style: { alignSelf: 'flex-start', marginTop: '6px' }, onClick: () => {
    if (!leaveForm.employeeId) {
      empSearchInput.style.borderColor = 'var(--red-600)';
      empSearchInput.focus();
      setTimeout(() => { empSearchInput.style.borderColor = ''; }, 1800);
      return;
    }
    if (!leaveForm.fromDate || !leaveForm.toDate) {
      // Flash picker border to hint user to select a date range
      const drpEl = row2.querySelector('.drp-wrap');
      if (drpEl) { drpEl.style.borderColor = 'var(--red-600)'; setTimeout(() => { drpEl.style.borderColor = ''; }, 1800); }
      return;
    }
    const toastEmp = employees.find(e => e.id === leaveForm.employeeId);
    const { employeeId, fromDate, toDate, type } = leaveForm;
    leaveFormToast = { empName: toastEmp?.shortName || '', from: fromDate, to: toDate };
    leaveForm.employeeId = ''; leaveForm.fromDate = ''; leaveForm.toDate = ''; leaveForm.pickStep = 'from'; // reset for next entry
    addPlannedLeave(employeeId, fromDate, toDate, type); // async, re-renders when done
    setTimeout(() => { leaveFormToast = null; render(); }, 2500);
  }});
  scheduleBtn.appendChild(icon('calendar-plus'));
  scheduleBtn.appendChild(document.createTextNode(' Schedule'));
  row2.appendChild(scheduleBtn);

  formCard.appendChild(row1);
  formCard.appendChild(row2);

  // ── Toast confirmation ──
  if (leaveFormToast) {
    const toast = el('div', { style: { display:'flex', alignItems:'center', gap:'6px', marginTop:'10px', padding:'8px 12px', background:'var(--green-50)', border:'1px solid var(--green-100)', borderRadius:'var(--radius-sm)', fontSize:'13px', color:'var(--green-700)' } });
    toast.appendChild(icon('check'));
    toast.appendChild(document.createTextNode(` ${leaveFormToast.empName} — ${leaveFormToast.from} → ${leaveFormToast.to} added`));
    formCard.appendChild(toast);
  }

  frag.appendChild(formCard);

  // ── Upcoming leave list ──
  const upcoming = [];
  for (const [empId, leaves] of Object.entries(state.plannedLeave)) {
    if (!Array.isArray(leaves)) continue;
    for (const [index, lv] of leaves.entries()) {
      if (lv.to >= state.selectedDate) {
        const emp = employees.find(e => e.id === empId);
        if (emp) upcoming.push({ emp, lv, empId, index });
      }
    }
  }
  upcoming.sort((a, b) => a.lv.from.localeCompare(b.lv.from));

  if (upcoming.length > 0) {
    frag.appendChild(el('p', { class: 'section-title' }, 'Upcoming Scheduled Leave'));

    for (const { emp, lv, empId, index } of upcoming) {
      const lt = LEAVE_TYPES[lv.type] || { label: lv.type, badgeClass: 'badge-gray' };
      const item = el('div', { class: 'upcoming-item', id: `upcoming-item-${lv.id}`, style: { transition: 'background 0.4s' } });
      const left = el('div', { class: 'flex items-center gap-2' });
      left.appendChild(el('span', { style: { fontWeight: '700', fontSize: '13px' } }, emp.shortName));
      left.appendChild(badge(lt.label, lt.badgeClass));
      left.appendChild(el('span', { class: 'text-xs', style: { color: 'var(--text-sub)' } }, `${lv.from} → ${lv.to}`));
      item.appendChild(left);
      const delBtn = el('button', { class: 'btn-sm btn-danger', onClick: () => removePlannedLeave(lv.id) });
      delBtn.appendChild(icon('trash'));
      delBtn.appendChild(document.createTextNode(' Delete range'));
      item.appendChild(delBtn);
      frag.appendChild(item);
    }
  }

  return frag;
}

function renderRosterTab() {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();

  // ── Build assignment maps ──
  const mainMap    = {};   // empId → slot
  const studentMap = {};   // empId → { slot, trainerId }
  for (const slot of allSlots()) {
    const a = state.assignments[slot.id];
    const eff = getEffectiveSlot(slot);
    if (a?.empId)     mainMap[a.empId]         = eff;
    if (a?.studentId) studentMap[a.studentId]  = { slot: eff, trainerId: a.empId };
  }

  // ── Determine employee's display area ──
  function getEmpArea(emp) {
    // Only show in 管理 if assigned to a PIC slot today
    const slot = mainMap[emp.id] || studentMap[emp.id]?.slot;
    if (slot) return slot.area;
    // Fallback: majority area from positions list
    const counts = {};
    for (const posName of emp.positions) {
      const posObj = allPositions.find(p => p.name === posName);
      if (posObj) counts[posObj.area] = (counts[posObj.area] || 0) + 1;
    }
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    return sorted[0]?.[0] || '后备';
  }

  const AREA_ORDER  = ['后厨', '前厅', '管理', '后备'];
  const AREA_CONFIG = {
    '后厨': { label: '后厨 Kitchen',        dot: '#2563eb', posColor: '#1e40af', offDot: '#93c5fd', cn: '后厨' },
    '前厅': { label: '前厅 Front of House', dot: '#16a34a', posColor: '#166534', offDot: '#86efac', cn: '前厅' },
    '管理': { label: '管理 Management',      dot: '#d97706', posColor: '#92400e', offDot: '#fcd34d', cn: '管理' },
    '后备': { label: '后备 Reserve',         dot: '#78716c', posColor: '#57534e', offDot: '#d1d5d8', cn: '后备' },
  };

  // Partition employees
  const onDuty = employees.filter(e => !absences[e.id]);
  const offToday = employees.filter(e => !!absences[e.id]);

  const grouped = {};  // area → emp[]  (on duty)
  for (const a of AREA_ORDER) { grouped[a] = []; }
  for (const emp of onDuty) { const a = getEmpArea(emp); (grouped[a] || grouped['后备']).push(emp); }

  // Off today: flat list sorted A→Z by shortName
  const offSorted = [...offToday].sort((a, b) => a.shortName.localeCompare(b.shortName));

  // ── Build export card DOM (inline styles for html2canvas compatibility) ──
  const card = document.createElement('div');
  card.id = 'roster-export-card';

  // Header
  const d       = new Date(state.selectedDate + 'T00:00:00');
  const months  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const engDays = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dateTxt = `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  const dayTxt  = `${engDays[d.getDay()]} · ${getChinaDay(state.selectedDate)}`;

  const hdr = document.createElement('div');
  hdr.style.cssText = 'background:#1c1917;color:white;padding:18px 22px 14px;display:flex;justify-content:space-between;align-items:flex-end;';
  hdr.innerHTML = `
    <div>
      <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:.3px;margin-bottom:4px;">老乡鸡 IOI City Mall</div>
      <div style="font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1;">${dateTxt}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;">${dayTxt}</div>
    </div>
    <div style="text-align:right;">
      <div style="font-size:28px;font-weight:800;line-height:1;">${onDuty.length}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px;">staff on duty</div>
    </div>`;
  card.appendChild(hdr);

  // Area blocks
  for (const area of AREA_ORDER) {
    const emps = grouped[area];
    if (!emps.length) continue;
    const cfg = AREA_CONFIG[area];

    const block = document.createElement('div');
    block.style.cssText = 'border-bottom:1px solid #f0ede9;';

    // Area header row
    const aHdr = document.createElement('div');
    aHdr.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 22px 8px;background:#fafaf9;border-bottom:1px solid #f0ede9;';
    aHdr.innerHTML = `
      <div style="width:8px;height:8px;border-radius:50%;background:${cfg.dot};flex-shrink:0;"></div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#57534e;">${cfg.label}</div>
      <div style="margin-left:auto;font-size:11px;color:#a8a29e;font-weight:500;">${emps.length} 人</div>`;
    block.appendChild(aHdr);

    // Two-column grid
    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;';

    emps.forEach((emp, idx) => {
      const slot    = mainMap[emp.id];
      const stuInfo = studentMap[emp.id];
      const shiftSlot = slot || stuInfo?.slot;
      const isTrainer = slot && KITCHEN_POSITIONS.includes(slot.pos) && isTrainerFor(emp, slot.pos);
      const isStudent = !!stuInfo && !slot;

      // Shift text + break detection
      let shiftTxt = '—', isLong = false;
      if (shiftSlot) {
        shiftTxt = formatHourNum(shiftSlot.startHour) + '–' + formatHourNum(shiftSlot.endHour);
        isLong   = (shiftSlot.endHour - shiftSlot.startHour) >= 9;
      }

      const isOdd = idx % 2 === 0;
      const row = document.createElement('div');
      row.style.cssText = `display:flex;align-items:center;padding:6px 14px 6px 22px;gap:7px;border-bottom:1px solid #f5f4f2;min-height:36px;${isOdd ? 'border-right:1px solid #f5f4f2;' : ''}`;

      // Name
      const nameEl = document.createElement('span');
      nameEl.style.cssText = 'font-size:13px;font-weight:700;color:#1c1917;min-width:44px;flex-shrink:0;';
      nameEl.textContent = emp.shortName;
      row.appendChild(nameEl);

      // Position
      const posEl = document.createElement('span');
      posEl.style.cssText = `font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${cfg.posColor};`;
      posEl.textContent = shiftSlot ? shiftSlot.pos : '—';
      row.appendChild(posEl);

      // Shift + break tag
      const shiftWrap = document.createElement('div');
      shiftWrap.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px;';
      const shiftEl = document.createElement('span');
      shiftEl.style.cssText = 'font-size:11px;font-weight:600;color:#78716c;white-space:nowrap;';
      shiftEl.textContent = shiftTxt;
      shiftWrap.appendChild(shiftEl);
      if (isLong) {
        const brk = document.createElement('span');
        brk.style.cssText = 'font-size:9px;font-weight:600;color:#d97706;background:#fef3c7;border-radius:3px;padding:1px 4px;white-space:nowrap;';
        brk.textContent = 'break 1hr';
        shiftWrap.appendChild(brk);
      }
      row.appendChild(shiftWrap);

      // Trainer / Student badge
      if (isTrainer) {
        const tb = document.createElement('span');
        tb.style.cssText = 'font-size:10px;font-weight:700;background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:1px 5px;flex-shrink:0;';
        tb.textContent = 'T';
        row.appendChild(tb);
      } else if (isStudent) {
        const sb = document.createElement('span');
        sb.style.cssText = 'font-size:10px;font-weight:700;background:#f0fdf4;color:#166534;border-radius:4px;padding:1px 5px;flex-shrink:0;';
        sb.textContent = 'S';
        row.appendChild(sb);
      }

      grid.appendChild(row);
    });

    // Spacer for odd-count areas (keep grid even)
    if (emps.length % 2 !== 0) {
      const spacer = document.createElement('div');
      spacer.style.cssText = 'border-bottom:1px solid #f5f4f2;min-height:36px;';
      grid.appendChild(spacer);
    }

    block.appendChild(grid);
    card.appendChild(block);
  }

  // Off Today section — flat list, A→Z
  if (offSorted.length > 0) {
    const offBlock = document.createElement('div');
    offBlock.style.cssText = 'background:#fafaf9;border-top:2px dashed #e7e5e4;';

    const offTop = document.createElement('div');
    offTop.style.cssText = 'display:flex;align-items:center;gap:8px;padding:9px 22px 8px;border-bottom:1px solid #ece9e6;';
    offTop.innerHTML = `
      <div style="width:8px;height:8px;border-radius:50%;background:#a8a29e;flex-shrink:0;"></div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#78716c;">休息 Off Today</div>
      <div style="margin-left:auto;font-size:11px;color:#a8a29e;font-weight:500;">${offSorted.length} 人</div>`;
    offBlock.appendChild(offTop);

    const chips = document.createElement('div');
    chips.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;padding:12px 22px 14px;';
    for (const emp of offSorted) {
      const chip = document.createElement('span');
      chip.style.cssText = 'font-size:12px;font-weight:600;background:#f5f4f2;color:#57534e;border-radius:100px;padding:4px 12px;border:1px solid #e7e5e4;';
      chip.textContent = emp.shortName;
      chips.appendChild(chip);
    }
    offBlock.appendChild(chips);
    card.appendChild(offBlock);
  }

  // Footer with timestamp
  const nowT  = new Date();
  const tStr  = String(nowT.getHours()).padStart(2,'0') + ':' + String(nowT.getMinutes()).padStart(2,'0');
  const footer = document.createElement('div');
  footer.style.cssText = 'background:#1c1917;padding:9px 22px;display:flex;align-items:center;justify-content:space-between;';
  footer.innerHTML = `
    <div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:.3px;">老乡鸡 IOI City Mall · 排班系统</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.22);">Generated ${tStr}</div>`;
  card.appendChild(footer);

  frag.appendChild(el('p', { class: 'roster-hint' }, '按区域分组 · T = Trainer · S = Student · 9h班自动标注 break'));
  frag.appendChild(card);

  // ── Action buttons ──
  const btnRow = el('div', { class: 'roster-btn-row' });

  // Export as Image
  const exportBtn = el('button', { onClick: async () => {
    const cardEl = document.getElementById('roster-export-card');
    if (!cardEl) return;
    const origText = exportBtn.innerHTML;
    exportBtn.textContent = '⏳ Generating...';
    exportBtn.disabled = true;
    try {
      const canvas = await html2canvas(cardEl, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false,
      });
      const link = document.createElement('a');
      link.download = `roster-${state.selectedDate}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      console.error('Export failed:', e);
      alert('Export failed. Please try again.');
    } finally {
      exportBtn.disabled = false;
      exportBtn.innerHTML = '';
      exportBtn.appendChild(icon('photo-down'));
      exportBtn.appendChild(document.createTextNode(' Export as Image'));
    }
  }});
  exportBtn.appendChild(icon('photo-down'));
  exportBtn.appendChild(document.createTextNode(' Export as Image'));
  btnRow.appendChild(exportBtn);

  // Copy as text (kept from before)
  const copyBtn = el('button', { onClick: async () => {
    const abs2 = getTodayAbsences();
    const mm = {}; const sm = {};
    for (const s of allSlots()) {
      const a = state.assignments[s.id];
      if (a?.empId)     mm[a.empId]    = s;
      if (a?.studentId) sm[a.studentId] = { s, tid: a.empId };
    }
    const lines = ['Lao Xiang Ji IOI City Mall', formatDate(state.selectedDate), ''];
    for (const emp of employees) {
      if (abs2[emp.id]) {
        lines.push(`${emp.shortName}\tOff Day`);
      } else if (mm[emp.id]) {
        const s = mm[emp.id];
        const isT = KITCHEN_POSITIONS.includes(s.pos) && isTrainerFor(emp, s.pos);
        lines.push(`${emp.shortName}\t${s.pos}\t${formatHourNum(s.startHour)}–${formatHourNum(s.endHour)}${isT ? ' (T)' : ''}`);
      } else if (sm[emp.id]) {
        const { s, tid } = sm[emp.id];
        const t = employees.find(e => e.id === tid);
        lines.push(`${emp.shortName}\t${s.pos}\t${formatHourNum(s.startHour)}–${formatHourNum(s.endHour)} (Student w/ ${t?.shortName || '?'})`);
      } else {
        lines.push(`${emp.shortName}\t—`);
      }
    }
    try {
      await navigator.clipboard.writeText(lines.join('\n'));
      copyBtn.textContent = '✓ Copied!';
      setTimeout(() => {
        copyBtn.innerHTML = '';
        copyBtn.appendChild(icon('copy'));
        copyBtn.appendChild(document.createTextNode(' Copy as Text'));
      }, 2000);
    } catch(e) { console.error(e); }
  }});
  copyBtn.appendChild(icon('copy'));
  copyBtn.appendChild(document.createTextNode(' Copy as Text'));
  btnRow.appendChild(copyBtn);

  frag.appendChild(btnRow);
  return frag;
}

// =============================================================================
// GANTT TAB
// =============================================================================

function renderGanttTab() {
  const frag = document.createDocumentFragment();
  const view = GANTT_VIEWS[state.ganttView];
  const span = view.endHour - view.startHour;

  // View toggle
  const toggleRow = el('div', { class: 'view-toggle' });
  for (const [key, v] of Object.entries(GANTT_VIEWS)) {
    const btn = el('button', { class: `view-btn${state.ganttView === key ? ' active' : ''}`, onClick: () => { state.ganttView = key; render(); } }, v.label);
    toggleRow.appendChild(btn);
  }
  frag.appendChild(toggleRow);

  // Filter slots for this view
  const visibleSlots = allSlots().filter(slot => {
    if (!state.assignments[slot.id]?.empId) return false;
    if (state.ganttView === 'early') return slot.startHour < 16;
    if (state.ganttView === 'late')  return slot.endHour   > 14;
    return true;
  });

  if (visibleSlots.length === 0) {
    const empty = el('div', { class: 'empty-state' });
    empty.appendChild(icon('chart-gantt'));
    empty.appendChild(el('p', {}, 'No shifts assigned for this view'));
    frag.appendChild(empty);
    return frag;
  }

  frag.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-sub)', marginBottom:'8px' } }, 'T = Trainer  ·  S = Student  ·  Grey bar = student  ·  (1h break) shown for front-of-house'));

  const wrapper = el('div', { class: 'gantt-scroll' });

  // Timeline header
  const timeline = el('div', { class: 'gantt-tl' });
  for (let h = view.startHour; h <= view.endHour; h++) {
    timeline.appendChild(el('div', { class: 'gantt-hr' }, h + ':00'));
  }
  wrapper.appendChild(timeline);

  const absences = getTodayAbsences();

  for (const area of AREAS) {
    const areaSlots = visibleSlots.filter(s => s.area === area);
    if (areaSlots.length === 0) continue;

    const areaStyle = AREA_LABEL_CLASS[area] || 'area-reserve';
    wrapper.appendChild(el('div', { class: `gantt-al ${areaStyle}` }, area));

    for (const slot of areaSlots) {
      const assignment  = state.assignments[slot.id];
      const mainEmp     = employees.find(e => e.id === assignment.empId);
      const studentEmp  = assignment.studentId ? employees.find(e => e.id === assignment.studentId) : null;
      const isTrainer   = KITCHEN_POSITIONS.includes(slot.pos) && mainEmp && isTrainerFor(mainEmp, slot.pos);

      // Clamp bar to view window
      const eff = getEffectiveSlot(slot);
      const barStart  = Math.max(eff.startHour, view.startHour);
      const barEnd    = Math.min(eff.endHour,   view.endHour);
      const leftPct   = ((barStart - view.startHour) / span) * 100;
      const widthPct  = ((barEnd - barStart)          / span) * 100;

      const barLabel  = `${eff.pos} ${cleanShift(eff.shift)}`;
      const isFront   = FRONT_POSITIONS.includes(eff.pos);

      // Main row
      const mainRow = el('div', { class: 'gantt-row' });
      mainRow.appendChild(el('div', { class: 'gantt-nm' }, `${mainEmp?.shortName || '?'}${isTrainer ? ' T' : ''}`));

      const barArea = el('div', { class: 'gantt-ba' });
      for (let h = view.startHour; h <= view.endHour; h++) {
        barArea.appendChild(el('div', { class: 'gantt-gl', style: { left: `${((h - view.startHour) / span) * 100}%` } }));
      }

      // Colour based on area
      const barColors = {
        '后厨': { bg: '#dbeafe', color: '#1e40af' },
        '前厅': { bg: '#dcfce7', color: '#065f46' },
        '管理': { bg: '#fef3c7', color: '#92400e' },
        '后备': { bg: '#f5f5f4', color: '#57534e' },
      };
      const bc = barColors[area] || barColors['后备'];
      barArea.appendChild(el('div', { class: 'gantt-bar', style: { left: `${leftPct}%`, width: `${widthPct}%`, background: bc.bg, color: bc.color } }, barLabel + (isFront ? ' (1h break)' : '')));
      mainRow.appendChild(barArea);
      wrapper.appendChild(mainRow);

      // Student row (if any)
      if (studentEmp) {
        const stuRow = el('div', { class: 'gantt-row' });
        stuRow.appendChild(el('div', { class: 'gantt-nm gantt-stu' }, `${studentEmp.shortName} S`));

        const stuBarArea = el('div', { class: 'gantt-ba' });
        for (let h = view.startHour; h <= view.endHour; h++) {
          stuBarArea.appendChild(el('div', { class: 'gantt-gl', style: { left: `${((h - view.startHour) / span) * 100}%` } }));
        }
        stuBarArea.appendChild(el('div', { class: 'gantt-bar', style: { left: `${leftPct}%`, width: `${widthPct}%`, background: '#f5f5f4', color: '#57534e', borderLeft: `3px solid ${bc.bg}` } }, `Student · ${slot.pos}`));
        stuRow.appendChild(stuBarArea);
        wrapper.appendChild(stuRow);
      }
    }
  }

  // ── Coverage curve ──
  const coverage = {};
  for (let h = view.startHour; h < view.endHour; h++) coverage[h] = 0;

  for (const slot of allSlots()) {
    if (!FRONT_POSITIONS.includes(slot.pos)) continue;
    const a = state.assignments[slot.id];
    if (!a?.empId || absences[a.empId]) continue;
    const eff = getEffectiveSlot(slot);
    for (let h = view.startHour; h < view.endHour; h++) {
      if (h >= eff.startHour && h < eff.endHour) coverage[h]++;
    }
  }

  const maxCoverage = Math.max(1, ...Object.values(coverage));
  const covWrap = el('div', { class: 'cov-wrap' });
  covWrap.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-sub)', marginBottom:'4px', marginLeft:'90px' } }, 'Front-of-house coverage per hour'));

  const covRow = el('div', { class: 'cov-row' });
  for (let h = view.startHour; h < view.endHour; h++) {
    const count   = coverage[h] || 0;
    const heightPct = Math.max(4, (count / maxCoverage) * 100);
    const bar     = el('div', { class: 'cov-bar' });
    bar.appendChild(el('div', { class: 'cov-fill', style: { height: `${heightPct}%`, opacity: count ? '1' : '0.2' } }));
    bar.appendChild(el('div', { class: 'cov-num' }, count || ''));
    covRow.appendChild(bar);
  }
  covWrap.appendChild(covRow);
  wrapper.appendChild(covWrap);

  frag.appendChild(wrapper);
  return frag;
}

// =============================================================================
// ATTENDANCE TAB
// =============================================================================

function renderAttendanceTab() {
  const frag    = document.createDocumentFragment();
  const absences = getTodayAbsences();
  const rows    = [];

  for (const slot of allSlots()) {
    const assignment = state.assignments[slot.id];
    if (!assignment?.empId) continue;

    const mainEmp    = employees.find(e => e.id === assignment.empId);
    const studentEmp = assignment.studentId ? employees.find(e => e.id === assignment.studentId) : null;

    const eff            = getEffectiveSlot(slot);
    const hours          = eff.endHour - eff.startHour;
    const isFrontOfHouse = FRONT_POSITIONS.includes(eff.pos);
    const isShortShift   = eff.startHour >= 18;   // part-time evening shifts — no deduction
    const paidHours      = (isFrontOfHouse && !isShortShift && hours >= 8.5) ? hours - 1 : hours;

    const schedIn  = formatHourNum(eff.startHour);
    const schedOut = formatHourNum(eff.endHour);

    rows.push({ name: mainEmp?.shortName || '?', fullName: mainEmp?.fullName || '', position: slot.pos, schedIn, schedOut, paidHours: paidHours.toFixed(1).replace('.0', '') });
    if (studentEmp) {
      rows.push({ name: studentEmp.shortName, fullName: studentEmp.fullName, position: slot.pos + ' (Student)', schedIn, schedOut, paidHours: paidHours.toFixed(1).replace('.0', '') });
    }
  }

  if (rows.length === 0) {
    const empty = el('div', { class: 'empty-state' });
    empty.appendChild(icon('clock'));
    empty.appendChild(el('p', {}, 'No assignments yet'));
    frag.appendChild(empty);
    return frag;
  }

  frag.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'10px' } },
    `Attendance · ${formatDate(state.selectedDate)} · Front-of-house & Dacai 9h+ shifts auto-deduct 1h break`));

  const wrap = el('div', { class: 'att-wrap' });
  const table = el('table', {});

  const headers = ['Name', 'Full Name', 'Position', 'Sched. In', 'Sched. Out', 'Actual In', 'Actual Out', 'Paid Hours'];
  table.appendChild(el('thead', {}, el('tr', {}, ...headers.map(h => el('th', {}, h)))));

  const tbody = el('tbody', {});

  for (const row of rows) {
    const tr = el('tr', {});
    const actualInInput  = el('input', { class: 'clock', placeholder: '--:--' });
    const actualOutInput = el('input', { class: 'clock', placeholder: '--:--' });
    tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, row.name)));
    tr.appendChild(el('td', {}, row.fullName));
    tr.appendChild(el('td', {}, row.position));
    tr.appendChild(el('td', {}, row.schedIn));
    tr.appendChild(el('td', {}, row.schedOut));
    tr.appendChild(el('td', {}, actualInInput));
    tr.appendChild(el('td', {}, actualOutInput));
    tr.appendChild(el('td', {}, row.paidHours + 'h'));
    tbody.appendChild(tr);
  }

  // Leave records section
  const absList = Object.entries(absences);
  if (absList.length > 0) {
    tbody.appendChild(el('tr', {}, el('td', { colspan: '8', style: { padding:'8px 12px', fontWeight:'700', fontSize:'11px', color:'var(--text-sub)', background:'var(--gray-50)', textTransform:'uppercase', letterSpacing:'0.4px' } }, 'Leave Record')));
    for (const [empId, leaveType] of absList) {
      const emp = employees.find(e => e.id === empId);
      if (!emp) continue;
      const lt  = LEAVE_TYPES[leaveType];
      const tr  = el('tr', {});
      tr.appendChild(el('td', {}, el('span', { style: { fontWeight: '600' } }, emp.shortName)));
      tr.appendChild(el('td', {}, emp.fullName));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, '—'));
      tr.appendChild(el('td', {}, lt ? badge(lt.label, lt.badgeClass) : leaveType));
      tbody.appendChild(tr);
    }
  }

  table.appendChild(tbody);
  wrap.appendChild(table);
  frag.appendChild(wrap);

  // Export button
  const exportBtn = el('button', { onClick: async () => {
    const header = ['Name','Full Name','Position','Sched In','Sched Out','Actual In','Actual Out','Paid Hours'].join('\t');
    const body   = rows.map(r => [r.name, r.fullName, r.position, r.schedIn, r.schedOut, '', '', r.paidHours+'h'].join('\t')).join('\n');
    const lvRecs = Object.entries(absences).map(([id, t]) => {
      const e = employees.find(x => x.id === id);

    const text = `Attendance - ${formatDate(state.selectedDate)}\n${header}\n${body}${lvRecs ? '\nLeave Record\n' + lvRecs : ''}`;

  }});

  exportBtn.appendChild(document.createTextNode(' Export for Excel'));
  frag.appendChild(exportBtn);

  return frag;
}

// Mirrors the Attendance tab's paid-hours logic, applied to an arbitrary stored row.
function computeRowLabor(row) {
  const baseSlots = BASE_SLOTS.map(s => {
    const ov = state.slotOverrides[s.id];
    return ov ? { ...s, startHour: ov.startHour, endHour: ov.endHour } : s;
  });
  const slots   = [...baseSlots, ...(row.extra_slots || [])];
  const assigns = row.assignments || {};
  let hours = 0; const people = new Set();
  for (const slot of slots) {
    const a = assigns[slot.id];
    if (!a?.empId) continue;
    const sh = a.timeOverride?.startHour ?? slot.startHour;
    const eh = a.timeOverride?.endHour   ?? slot.endHour;
    const h  = eh - sh;
    const foh   = FRONT_POSITIONS.includes(slot.pos);
    const short = sh >= 18;
    const paid  = (foh && !short && h >= 8.5) ? h - 1 : h;
    hours += paid; people.add(a.empId);
    if (a.studentId) { hours += paid; people.add(a.studentId); }
  }
  return { staff: people.size, hours: Math.round(hours * 10) / 10 };
}

function csvEscape(v) {
  const s = (v == null ? '' : String(v));
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function downloadCSV(filename, csv) {
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });  // BOM → Excel reads 中文 correctly
  const url  = URL.createObjectURL(blob);
  const a    = el('a', { href: url, download: filename });
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

const WD_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

async function fetchAllScheduleRows() {
  const { data, error } = await db.from('daily_schedule').select('*')
    .eq('store_id', STORE_ID).order('schedule_date');
  if (error) throw error;
  return data || [];
}

// Returns the effective slot list + per-slot effective times for a stored row
function rowSlots(row) {
  const base = BASE_SLOTS.map(s => {
    const ov = state.slotOverrides[s.id];
    return ov ? { ...s, startHour: ov.startHour, endHour: ov.endHour } : s;
  });
  return [...base, ...(row.extra_slots || [])];
}

// One row per day: manual fields + auto-derived features
async function exportSummaryCSV() {
  let rows = [];
  try { rows = await fetchAllScheduleRows(); }
  catch (e) { alert('导出失败：' + (e?.message || e)); return; }
  if (rows.length === 0) { alert('还没有可导出的排班数据'); return; }

  const headers = ['date','weekday','day_tags','est_revenue','actual_revenue','revenue_gap_pct',
    'planned_available','no_show_count','actual_attendance','no_show_names','on_leave_names',
    'scheduled_staff','scheduled_hours','payday_window',
    'wl_lunch_front','wl_lunch_back','wl_dinner_front','wl_dinner_back','note'];
  const lines = [headers.join(',')];

  for (const row of rows) {
    const date = row.schedule_date;
    const d    = new Date(date + 'T00:00:00');
    const wd   = WD_SHORT[d.getDay()];
    const onLeaveIds   = Object.keys(getAbsencesForDate(date));
    const planned      = employees.length - onLeaveIds.length;
    const onLeaveNames = onLeaveIds.map(id => (employees.find(e => e.id === id) || {}).shortName || id);
    const noShow       = (row.unplanned_absent || []);
    const noShowNames  = noShow.map(id => (employees.find(e => e.id === id) || {}).shortName || id);
    const actualAtt    = planned - noShow.length;
    const labor = computeRowLabor(row);
    const est = row.est_revenue, act = row.actual_revenue;
    const gap = (est != null && act != null && est > 0) ? Math.round((act - est) / est * 100) : '';
    const dim    = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
    const payday = (d.getDate() <= 3 || d.getDate() >= dim - 2) ? 1 : 0;
    const wl     = row.workload || {};
    const rec = [date, wd, (row.day_tags || []).join('|'), est ?? '', act ?? '', gap,
      planned, noShow.length, actualAtt, noShowNames.join('|'), onLeaveNames.join('|'),
      labor.staff, labor.hours, payday,
      wl.lunchFront ?? '', wl.lunchBack ?? '', wl.dinnerFront ?? '', wl.dinnerBack ?? '', row.day_note || ''];
    lines.push(rec.map(csvEscape).join(','));
  }
  downloadCSV(`roster_summary_${todayLocalStr()}.csv`, lines.join('\n'));
}

// One row per assigned shift per day — the actual scheduling decisions (training labels)
async function exportDetailCSV() {
  let rows = [];
  try { rows = await fetchAllScheduleRows(); }
  catch (e) { alert('导出失败：' + (e?.message || e)); return; }
  if (rows.length === 0) { alert('还没有可导出的排班数据'); return; }

  const headers = ['date','weekday','area','position','slot_id','start','end','paid_hours','seat','staff_short','staff_full'];
  const lines = [headers.join(',')];

  for (const row of rows) {
    const date = row.schedule_date;
    const wd   = WD_SHORT[new Date(date + 'T00:00:00').getDay()];
    const assigns = row.assignments || {};
    for (const slot of rowSlots(row)) {
      const a = assigns[slot.id];
      if (!a?.empId) continue;
      const sh = a.timeOverride?.startHour ?? slot.startHour;
      const eh = a.timeOverride?.endHour   ?? slot.endHour;
      const h  = eh - sh;
      const foh   = FRONT_POSITIONS.includes(slot.pos);
      const paid  = (foh && !(sh >= 18) && h >= 8.5) ? h - 1 : h;
      const paidStr = (Math.round(paid * 10) / 10);
      const emit = (seat, empId) => {
        const emp = employees.find(e => e.id === empId);
        lines.push([date, wd, slot.area, slot.pos, slot.id,
          formatHourNum(sh), formatHourNum(eh), paidStr, seat,
          emp?.shortName || empId, emp?.fullName || ''].map(csvEscape).join(','));
      };
      emit('main', a.empId);
      if (a.studentId) emit('student', a.studentId);
    }
  }
  downloadCSV(`roster_detail_${todayLocalStr()}.csv`, lines.join('\n'));
}

function getCopySourceDates() {
  const WD_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const fmtLocal = dd => {
    const y = dd.getFullYear(), mo = String(dd.getMonth()+1).padStart(2,'0'), dy = String(dd.getDate()).padStart(2,'0');
    return `${y}-${mo}-${dy}`;
  };
  const base = new Date(state.selectedDate + 'T00:00:00');
  const yesterday = new Date(base); yesterday.setDate(base.getDate() - 1);
  const lastWeek  = new Date(base); lastWeek.setDate(base.getDate() - 7);
  return [
    { dateStr: fmtLocal(yesterday), label: '复制昨天',       sub: `${WD_LABELS[yesterday.getDay()]} · ${fmtLocal(yesterday)}`, icon: 'calendar-minus' },
    { dateStr: fmtLocal(lastWeek),  label: '复制上周同一天', sub: `${WD_LABELS[lastWeek.getDay()]} · ${fmtLocal(lastWeek)}`,  icon: 'calendar-week'  },
  ];
}

function openCopyDropdown(e) {
  e.stopPropagation();
  if (copyScheduleState.dropdownOpen) { copyScheduleState.dropdownOpen = false; render(); return; }
  copyScheduleState.dropdownOpen = true;
  render();
  if (_copyDropdownCloseHandler) document.removeEventListener('click', _copyDropdownCloseHandler);
  _copyDropdownCloseHandler = () => {
    copyScheduleState.dropdownOpen = false;
    _copyDropdownCloseHandler = null;
    render();
  };
  setTimeout(() => document.addEventListener('click', _copyDropdownCloseHandler, { once: true }), 0);
}

async function initiateCopySchedule(sourceDate) {
  // Remove outside-click listener and close dropdown
  if (_copyDropdownCloseHandler) { document.removeEventListener('click', _copyDropdownCloseHandler); _copyDropdownCloseHandler = null; }
  copyScheduleState.dropdownOpen = false;
  render();

  const { data, error } = await db.from('daily_schedule').select('*')
    .eq('store_id', STORE_ID).eq('schedule_date', sourceDate).maybeSingle();

  if (error) { alert('加载失败：' + (error.message || error)); return; }

  const sourceAssignments = data?.assignments || {};
  const filledCount = Object.values(sourceAssignments).filter(a => a?.empId).length;
  if (filledCount === 0) { alert(`${sourceDate} 暂无排班数据，无法复制`); return; }

  // Which employees from the source are on leave TODAY
  const todayAbsences = getTodayAbsences();
  const absentIds = new Set(Object.keys(todayAbsences));
  const absentNamesSet = new Set();
  for (const a of Object.values(sourceAssignments)) {
    if (a?.empId && absentIds.has(a.empId)) {
      const emp = employees.find(e => e.id === a.empId);
      if (emp) absentNamesSet.add(emp.shortName);
    }
  }
  const absentNames = [...absentNamesSet];
  const hasExisting = Object.values(state.assignments).some(a => a?.empId);

  // Show confirmation modal when there's existing data or absent collisions
  if (hasExisting || absentNames.length > 0) {
    copyScheduleState.modal = { sourceDate, absentNames, assignments: sourceAssignments, hasExisting };
    render();
  } else {
    await executeCopySchedule(sourceAssignments, sourceDate);
  }
}

async function executeCopySchedule(sourceAssignments, sourceDate) {
  const todayAbsences = getTodayAbsences();
  const absentIds = new Set(Object.keys(todayAbsences));
  let blankedCount = 0;

  const newAssignments = {};
  for (const [slotId, a] of Object.entries(sourceAssignments)) {
    if (!a) continue;
    const entry = { ...a };
    if (entry.empId && absentIds.has(entry.empId))     { entry.empId = null; entry.studentId = null; blankedCount++; }
    if (entry.studentId && absentIds.has(entry.studentId)) { entry.studentId = null; }
    newAssignments[slotId] = entry;
  }

  state.assignments = newAssignments;
  // extraSlots intentionally NOT copied (per design decision)
  copyScheduleState.modal = null;

  await saveSchedule();

  const srcLabel = formatDate(sourceDate);
  copyScheduleState.toast = { msg: `已从「${srcLabel}」复制班表${blankedCount > 0 ? `，${blankedCount} 个班次因请假已留空` : ''}` };
  render();
  setTimeout(() => { copyScheduleState.toast = null; render(); }, 4500);
}

function renderCopyDropdown() {
  if (!copyScheduleState.dropdownOpen) return null;
  const wrap = el('div', { class: 'copy-dropdown', onClick: e => e.stopPropagation() });
  wrap.appendChild(el('div', { class: 'copy-dropdown-title' }, '选择复制来源'));
  for (const src of getCopySourceDates()) {
    const opt = el('div', { class: 'copy-opt', onClick: () => initiateCopySchedule(src.dateStr) });

    const textWrap = el('div', {});

function renderCopyModal() {
  if (!copyScheduleState.modal) return null;
  const { sourceDate, absentNames, assignments, hasExisting } = copyScheduleState.modal;

  const overlay = el('div', { class: 'copy-modal-overlay' });
  overlay.addEventListener('click', e => { if (e.target === overlay) { copyScheduleState.modal = null; render(); } });

  const modal = el('div', { class: 'copy-modal' });

  const head = el('div', { class: 'copy-modal-head' });
  head.appendChild(icon('copy'));
  head.appendChild(document.createTextNode(hasExisting ? '确认覆盖班表' : '确认复制班表'));
  modal.appendChild(head);

  if (hasExisting) {
    modal.appendChild(el('div', { class: 'copy-modal-body' },
      `当前日期（${formatDate(state.selectedDate)}）已有排班记录，复制将覆盖当前内容。`));
  }

  if (absentNames.length > 0) {
    const warn = el('div', { class: 'copy-modal-warn' });
    warn.appendChild(icon('user-off'));
    const warnBody = el('div', {});
    warnBody.appendChild(document.createTextNode(`以下 ${absentNames.length} 位员工今天请假，对应班次将留空：`));
    const chips = el('div', { class: 'copy-absent-chips' });
    for (const name of absentNames) chips.appendChild(el('span', { class: 'copy-absent-chip' }, name));
    warnBody.appendChild(chips);
    warn.appendChild(warnBody);
    modal.appendChild(warn);
  }

  if (!hasExisting && absentNames.length > 0) {
    modal.appendChild(el('div', { class: 'copy-modal-body' }, '其余班次将正常复制，是否继续？'));
  }

  const actions = el('div', { class: 'copy-modal-actions' });
  actions.appendChild(el('button', { onClick: () => { copyScheduleState.modal = null; render(); } }, '取消'));
  const confirmBtn = el('button', { class: 'btn-info', onClick: () => executeCopySchedule(assignments, sourceDate) });
  confirmBtn.appendChild(icon('copy')); confirmBtn.appendChild(document.createTextNode(' 确认复制'));
  actions.appendChild(confirmBtn);
  modal.appendChild(actions);

  overlay.appendChild(modal);
  return overlay;
}

function renderCopyToast() {
  if (!copyScheduleState.toast) return null;
  const toast = el('div', { class: 'copy-toast' });
  toast.appendChild(icon('check')); toast.appendChild(document.createTextNode(copyScheduleState.toast.msg));
  return toast;
}

    { id: 'employees',  label: '员工',        iconName: 'users'       },
    { id: 'shifts',     label: '班次',        iconName: 'clock-edit'  },
    { id: 'leave',      label: `Leave${leaveCount > 0 ? ` (${leaveCount})` : ''}`, iconName: 'calendar-off' },
    { id: 'roster',     label: 'Roster',      iconName: 'table'       },
    { id: 'gantt',      label: 'Gantt',       iconName: 'chart-gantt' },
    { id: 'attendance', label: 'Attendance',  iconName: 'clock'       },
  ];
  for (const tab of tabDefs) {
    const btn = el('button', { class: `tab-btn${state.currentTab === tab.id ? ' active' : ''}`, onClick: () => { state.currentTab = tab.id; render(); } });
    btn.appendChild(icon(tab.iconName));
    btn.appendChild(document.createTextNode(' ' + tab.label));
    tabsEl.appendChild(btn);
  }
  appEl.appendChild(tabsEl);

  // ── Tab content ──
  switch (state.currentTab) {
    case 'schedule':   appEl.appendChild(renderScheduleTab(computed));  break;
    case 'employees':  appEl.appendChild(renderEmployeesTab());          break;
    case 'shifts':     appEl.appendChild(renderShiftsTab());             break;
    case 'leave':      appEl.appendChild(renderLeaveTab(computed));      break;
    case 'roster':     appEl.appendChild(renderRosterTab());             break;
    case 'gantt':      appEl.appendChild(renderGanttTab());              break;
    case 'attendance': appEl.appendChild(renderAttendanceTab());         break;
  }

  // ── Copy-schedule overlays (modal + toast) ──
  const copyModal = renderCopyModal();
  if (copyModal) appEl.appendChild(copyModal);
  const copyToast = renderCopyToast();
  if (copyToast) appEl.appendChild(copyToast);
}

// =============================================================================
// INIT
// =============================================================================

async function initApp() {
  await Promise.all([
    loadScheduleForDate(state.selectedDate),
    loadPlannedLeave(),
    loadDailyLeave(),
    loadEmployees(),
    loadPositions(),
    loadSlotOverrides(),
    loadCoverageSettings(),
  ]);
  subscribeToChanges();
  render();
}

// Check for saved session
(function() {
  const saved = sessionStorage.getItem('lxj-role');
  if (saved && PASSWORDS[saved]) {
    currentRole = saved;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    initApp();
  }
})();
</script>
</body>
</html>
