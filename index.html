// ── Risk cards ──
function tbRenderRisk(positions) {
  const frag = document.createDocumentFragment();
  const ex = state.tbExcludeMgmt;
  const ranked = positions
    .map(p => ({ p, c: tbCoverage(p, ex), tier: tbRiskTier(p, tbCoverage(p, ex).independent) }))
    .sort((a, b) => a.c.independent - b.c.independent);

  for (const { p, c, tier } of ranked) {
    const card = el('div', { class: `tb-risk-card ${tier}` });
    const head = el('div', { class: 'tb-risk-head' });
    const nameWrap = el('div', { class: 'tb-risk-name' });
    const iconName = tier === 'risk' ? 'alert-triangle' : tier === 'warn' ? 'alert-circle' : 'circle-check';
    const iconColor = tier === 'risk' ? 'var(--red-600)' : tier === 'warn' ? 'var(--amber-600)' : 'var(--green-600)';
    const ic = icon(iconName); ic.style.color = iconColor;
    nameWrap.appendChild(ic);
    nameWrap.appendChild(document.createTextNode(tbPosShort(p)));
    head.appendChild(nameWrap);
    const tierLabel = tier === 'risk' ? '单点风险' : tier === 'warn' ? '脆弱' : '健康';
    const tierBadge = tier === 'risk' ? 'badge-red' : tier === 'warn' ? 'badge-amber' : 'badge-green';
    head.appendChild(badge(tierLabel, tierBadge));
    card.appendChild(head);

    const delta = (ex && c.independentAll !== c.independent)
      ? `（含管理层共 ${c.independentAll} 人）` : '';
    card.appendChild(el('div', { class: 'tb-risk-meta' },
      `一线独立顶岗 ${c.independent} 人${delta} · 师傅 ${c.trainers} 人 · 在训 ${c.learning} 人`));

    // Advice + who holds it (uses this position's own thresholds).
    // Holders list respects the exclude-mgmt filter so it matches the count.
    const thr = tbThreshold(p);
    let advice = '';
    if (tier === 'risk') {
      const holders = employees.filter(e => tbLevel(e, p) >= 2 && (!ex || tbIsFrontline(e))).map(e => e.shortName);
      const gap = Math.max(1, thr.yellow - c.independent);
      advice = c.independent === 0
        ? `当前无一线员工能独立顶岗，须立即安排培养（健康线 ${thr.yellow} 人）。`
        : `${holders.join('、')} 扛岗，低于红线 ${thr.red} 人。建议再培养 ${gap} 名一线员工达到健康线 ${thr.yellow} 人。`;
    } else if (tier === 'warn') {
      const gap = Math.max(1, thr.yellow - c.independent);
      advice = c.learning > 0
        ? `已有人在训，保持跟进即可达到健康线 ${thr.yellow} 人。`
        : `未达健康线，建议再培养 ${gap} 人（目标 ${thr.yellow} 人）。`;
    }
    if (advice) card.appendChild(el('div', { class: 'tb-risk-advice' }, advice));
    frag.appendChild(card);
  }
  return frag;
}

// ── Skill editing: cycle a cell empty→L1→L2→L3→empty ──
// Set an employee's skill level (0-3) for a position. Single source of truth
// for all skill mutations — both the matrix cell-cycle and the dev-card editor
// route through here, so the three arrays can never drift out of sync.
async function tbSetSkill(empId, posName, level) {
  const emp = getEmp(empId);
  if (!emp) return;
  const canon = toCanonicalPos(posName);
  // Remove the station under ANY writing (canonical or variant) from all three
  // arrays, then re-add under the canonical name. This also self-heals legacy
  // data: editing a station rewrites it to the canonical form everywhere.
  const drop = (arr) => (arr || []).filter(p => toCanonicalPos(p) !== canon);
  const training  = drop(emp.training);
  const positions = drop(emp.positions);
  const canTrain  = drop(emp.canTrain);
  if (level === 1) training.push(canon);
  if (level === 2) positions.push(canon);
  if (level === 3) { positions.push(canon); canTrain.push(canon); }

  const updated = { ...emp, training, positions, canTrain };
  try {
    await saveEmployee(updated);
  } catch (e) {
    console.error('tbSetSkill', e?.message || e);
  }
}

async function tbCycleSkill(empId, posName) {
  const emp = getEmp(empId);
  if (!emp) return;
  const next = (tbLevel(emp, posName) + 1) % 4;
  await tbSetSkill(empId, posName, next);
}

// =============================================================================
// DATA NORMALIZATION (一键规范化)
// =============================================================================
// Rewrites every employee's positions/canTrain/training to canonical English
// names, de-duplicates, and reports anything it doesn't recognise. Storage
// layer becomes uniformly English; display stays Chinese via tbPosShort.

// The set of valid canonical names a station can normalise to.
const TB_CANONICAL_SET = ['A1 Wok','A2 Steam','B Chicken','C Chop','Cutting','D Drink','Service','PIC','Dacai','Dishwash','Reserve'];

// Normalise one raw position string. Returns { canon, known }.
// known=false means the writing isn't in our map AND isn't already canonical —
// we keep it untouched and surface it for the manager to review.
function tbNormalizeOne(raw) {
  const mapped = toCanonicalPos(raw);  // applies POSITION_SLOT_MAP, else returns raw
  const known = TB_CANONICAL_SET.includes(mapped);
  return { canon: mapped, known };
}

// Normalise one employee's three skill arrays. Returns the cleaned arrays plus
// a per-array changelog. Does NOT touch any other field. De-dupes by canonical.
function tbNormalizeEmployee(emp) {
  const unknown = new Set();
  const cleanArr = (arr) => {
    const seen = new Set();
    const out = [];
    for (const raw of (arr || [])) {
      const { canon, known } = tbNormalizeOne(raw);
      if (!known) unknown.add(raw);
      if (seen.has(canon)) continue;  // de-dup by canonical
      seen.add(canon);
      out.push(canon);
    }
    return out;
  };
  const positions = cleanArr(emp.positions);
  const canTrain  = cleanArr(emp.canTrain);
  const training  = cleanArr(emp.training);

  // Invariant: a station can't be both "still learning" (training) and already
  // "independent/master" (positions). If both exist after cleaning, the higher
  // level wins — drop it from training.
  const trainingFiltered = training.filter(p => !positions.includes(p) && !canTrain.includes(p));

  return { positions, canTrain, training: trainingFiltered, unknown: [...unknown] };
}

// Build a preview of all changes without writing anything.
function tbBuildNormalizationPreview() {
  const changes = [];   // { emp, before:{...}, after:{...} }
  const unknownAll = new Set();
  for (const emp of employees) {
    const after = tbNormalizeEmployee(emp);
    const before = {
      positions: [...(emp.positions||[])],
      canTrain:  [...(emp.canTrain||[])],
      training:  [...(emp.training||[])],
    };
    after.unknown.forEach(u => unknownAll.add(u));
    const changed =
      JSON.stringify(before.positions) !== JSON.stringify(after.positions) ||
      JSON.stringify(before.canTrain)  !== JSON.stringify(after.canTrain)  ||
      JSON.stringify(before.training)  !== JSON.stringify(after.training);
    if (changed) changes.push({ emp, before, after });
  }
  return { changes, unknown: [...unknownAll] };
}

// Normalization modal state
let normModal = { open: false, preview: null, running: false, done: null, error: '' };

function openNormalizeModal() {
  normModal = { open: true, preview: tbBuildNormalizationPreview(), running: false, done: null, error: '' };
  render();
}
function closeNormalizeModal() { normModal = { open: false, preview: null, running: false, done: null, error: '' }; render(); }

// Execute: write all changed employees back to Supabase.
async function tbRunNormalization() {
  if (!normModal.preview) return;
  normModal.running = true; render();
  let savedCount = 0, mergedDupes = 0, failed = 0;
  for (const ch of normModal.preview.changes) {
    // count merged duplicates (length shrinkage across the three arrays)
    const beforeLen = ch.before.positions.length + ch.before.canTrain.length + ch.before.training.length;
    const afterLen  = ch.after.positions.length + ch.after.canTrain.length + ch.after.training.length;
    if (afterLen < beforeLen) mergedDupes += (beforeLen - afterLen);
    try {
      await saveEmployee({
        ...ch.emp,
        positions: ch.after.positions,
        canTrain:  ch.after.canTrain,
        training:  ch.after.training,
      });
      savedCount++;
    } catch (e) {
      failed++; console.error('normalize save failed for', ch.emp.shortName, e?.message || e);
    }
  }
  normModal.running = false;
  normModal.done = { savedCount, mergedDupes, failed, unknown: normModal.preview.unknown };
  render();
}

function renderNormalizeModal() {
  if (!normModal.open) return null;
  const overlay = el('div', { class: 'modal-overlay', onClick: (e) => { if (e.target === overlay && !normModal.running) closeNormalizeModal(); } });
  const box = el('div', { class: 'modal-box', style: { maxWidth:'560px' } });

  const header = el('div', { class: 'modal-header' });
  header.appendChild(el('div', { style: { fontWeight:'700', fontSize:'15px', display:'flex', alignItems:'center', gap:'6px' } }, icon('wand'), '规范化岗位数据'));
  if (!normModal.running) header.appendChild(el('button', { class: 'btn-sm', onClick: closeNormalizeModal }, icon('x')));
  box.appendChild(header);

  const body = el('div', { class: 'modal-body' });

  // ── Done state: show summary report ──
  if (normModal.done) {
    const d = normModal.done;
    const ok = el('div', { class: 'tb-banner', style: { background:'var(--green-50)', borderColor:'var(--green-100)', color:'var(--green-700)' } },
      `完成：已规范化 ${d.savedCount} 名员工，合并重复 ${d.mergedDupes} 条。` + (d.failed ? ` ${d.failed} 名保存失败（见控制台）。` : ''));
    body.appendChild(ok);
    if (d.unknown.length) {
      body.appendChild(el('div', { class: 'tb-banner', style: { marginTop:'8px' } },
        '以下写法不在已知映射中，已原样保留，请手动检查：' + d.unknown.join('、')));
    }
    body.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginTop:'10px' } },
      '所有技能数据现已统一为标准名称。排班、矩阵、风险预警将使用一致的岗位口径。'));
    box.appendChild(body);
    const footer = el('div', { class: 'modal-footer' });
    footer.appendChild(el('button', { class: 'btn-primary', onClick: closeNormalizeModal }, '知道了'));
    box.appendChild(footer);
    overlay.appendChild(box);
    return overlay;
  }

  // ── Preview state ──
  const pv = normModal.preview;
  if (!pv || pv.changes.length === 0) {
    body.appendChild(el('div', { class: 'tb-banner', style: { background:'var(--green-50)', borderColor:'var(--green-100)', color:'var(--green-700)' } },
      '全店数据已经是规范格式，无需清洗。'));
    if (pv && pv.unknown.length) {
      body.appendChild(el('div', { class: 'tb-banner', style: { marginTop:'8px' } },
        '但发现未知写法（已保留）：' + pv.unknown.join('、')));
    }
    box.appendChild(body);
    const footer = el('div', { class: 'modal-footer' });
    footer.appendChild(el('button', { class: 'btn-primary', onClick: closeNormalizeModal }, '关闭'));
    box.appendChild(footer);
    overlay.appendChild(box);
    return overlay;
  }

  body.appendChild(el('p', { style: { fontSize:'13px', marginBottom:'4px' } },
    `将规范化 ${pv.changes.length} 名员工的技能数据。请先确认下列改动：`));
  body.appendChild(el('p', { style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'10px' } },
    '强烈建议先在 Supabase 后台导出 employees 表备份。此操作直接写入数据库，无法自动撤销。'));

  if (pv.unknown.length) {
    body.appendChild(el('div', { class: 'tb-banner', style: { marginBottom:'10px' } },
      '注意：以下写法不在已知映射中，将原样保留不动：' + pv.unknown.join('、')));
  }

  // Change list
  const list = el('div', { style: { maxHeight:'320px', overflowY:'auto', border:'1px solid var(--border)', borderRadius:'var(--radius-md)' } });
  const fmtArr = (arr) => arr.length ? arr.map(tbPosShort).join('、') : '（空）';
  for (const ch of pv.changes) {
    const row = el('div', { style: { padding:'8px 11px', borderTop:'1px solid var(--gray-100)' } });
    row.appendChild(el('div', { style: { fontWeight:'600', fontSize:'13px', marginBottom:'3px' } }, ch.emp.shortName));
    const mkLine = (label, before, after) => {
      if (JSON.stringify(before) === JSON.stringify(after)) return;
      const line = el('div', { style: { fontSize:'12px', color:'var(--text-sub)', lineHeight:'1.5' } });
      line.appendChild(el('span', {}, `${label}：`));
      line.appendChild(el('span', { style: { textDecoration:'line-through', color:'var(--text-muted)' } }, before.join('、') || '（空）'));
      line.appendChild(el('span', {}, ' → '));
      line.appendChild(el('span', { style: { color:'var(--green-700)' } }, fmtArr(after)));
      row.appendChild(line);
    };
    mkLine('独立', ch.before.positions, ch.after.positions);
    mkLine('带训', ch.before.canTrain, ch.after.canTrain);
    mkLine('在训', ch.before.training, ch.after.training);
    list.appendChild(row);
  }
  body.appendChild(list);
  box.appendChild(body);

  const footer = el('div', { class: 'modal-footer' });
  footer.appendChild(el('button', { class: 'btn-sm', onClick: closeNormalizeModal, disabled: normModal.running }, '取消'));
  const runBtn = el('button', { class: 'btn-primary', onClick: tbRunNormalization, disabled: normModal.running },
    normModal.running ? '正在写入…' : `确认规范化 ${pv.changes.length} 名员工`);
  footer.appendChild(runBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  return overlay;
}

// Suggest the next position to learn: a risk/warn position the employee doesn't
// yet hold, preferring those they have an adjacent skill for.
function tbSuggestNext(emp, positions) {
  const held = new Set([...(emp.positions||[]), ...(emp.canTrain||[]), ...(emp.training||[])]);
  const candidates = positions
    .filter(p => !held.has(p))
    .map(p => ({ p, c: tbCoverage(p), thr: tbThreshold(p) }))
    .filter(x => x.c.independent < x.thr.yellow)  // below this position's health line
    .sort((a, b) => (a.c.independent - a.thr.yellow) - (b.c.independent - b.thr.yellow));
  return candidates.length ? candidates[0] : null;
}

function renderDevCard() {
  if (!devCard.open) return null;
  const emp = getEmp(devCard.empId);
  if (!emp) return null;
  const isManager = currentRole === 'manager';
  const positions = tbPositions();

  const overlay = el('div', { class: 'modal-overlay', onClick: (e) => { if (e.target === overlay) closeDevCard(); } });
  const box = el('div', { class: 'modal-box', style: { maxWidth:'480px' } });

  // Header
  const header = el('div', { class: 'modal-header' });
  const hLeft = el('div', { style: { display:'flex', alignItems:'center', gap:'10px' } });
  const rs = getRoleStyle(emp.role);
  const avatar = el('div', {
    style: { width:'40px', height:'40px', borderRadius:'50%', background: rs.bg, color: rs.color,
             display:'flex', alignItems:'center', justifyContent:'center', fontWeight:'700', flexShrink:'0' }
  }, emp.shortName.slice(0, 2));
  hLeft.appendChild(avatar);
  const hInfo = el('div');
  hInfo.appendChild(el('div', { style: { fontWeight:'700', fontSize:'15px' } }, emp.fullName));
  hInfo.appendChild(el('div', { style: { fontSize:'12px', color:'var(--text-sub)' } }, emp.role + (tbIsMultiSkilled(emp) ? ' · 多面手' : '')));
  hLeft.appendChild(hInfo);
  header.appendChild(hLeft);
  header.appendChild(el('button', { class: 'btn-sm', onClick: closeDevCard }, icon('x')));
  box.appendChild(header);

  const body = el('div', { class: 'modal-body' });

  // ── Skill status (with inline editor for managers) ──
  const skSec = el('div', { class: 'tb-dev-section' });
  const skLabel = el('div', { class: 'tb-dev-label', style: { justifyContent:'space-between' } });
  const skLabelLeft = el('span', { style: { display:'flex', alignItems:'center', gap:'5px' } }, icon('award'), '技能状态');
  skLabel.appendChild(skLabelLeft);
  if (isManager) {
    const editBtn = el('button', { class: 'btn-sm', style: { padding:'2px 8px' },
      onClick: () => { devCard.editSkills = !devCard.editSkills; render(); } });
    editBtn.appendChild(icon(devCard.editSkills ? 'check' : 'edit'));
    editBtn.appendChild(document.createTextNode(devCard.editSkills ? ' 完成' : ' 编辑'));
    skLabel.appendChild(editBtn);
  }
  skSec.appendChild(skLabel);

  if (isManager && devCard.editSkills) {
    // Editable: every position as a row with a 4-level segmented control.
    const editor = el('div');
    const SEG = [ {lv:0,t:'未涉及'}, {lv:1,t:'在训'}, {lv:2,t:'独立'}, {lv:3,t:'师傅'} ];
    for (const p of positions) {
      const cur = tbLevel(emp, p);
      const row = el('div', { class: 'tb-skedit-row' });
      row.appendChild(el('div', { class: 'tb-skedit-name' }, tbPosShort(p)));
      const seg = el('div', { class: 'tb-seg' });
      for (const s of SEG) {
        const b = el('button', { class: cur === s.lv ? `on${s.lv}` : '',
          onClick: () => tbSetSkill(emp.id, p, s.lv) }, s.t);
        seg.appendChild(b);
      }
      row.appendChild(seg);
      editor.appendChild(row);
    }
    skSec.appendChild(editor);
    skSec.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-muted)', marginTop:'6px' } },
      '师傅档自动包含独立顶岗能力。修改即时保存。'));
  } else {
    // Read-only: pills.
    const skRow = el('div', { class: 'tb-skillrow' });
    let anySkill = false;
    for (const p of positions) {
      const lv = tbLevel(emp, p);
      if (lv === 0) continue;
      anySkill = true;
      const bg = lv === 3 ? 'var(--amber-100)' : lv === 2 ? 'var(--green-100)' : 'var(--blue-50)';
      const col = lv === 3 ? 'var(--amber-700)' : lv === 2 ? 'var(--green-700)' : 'var(--blue-700)';
      const lvName = lv === 3 ? '师傅' : lv === 2 ? '独立' : '在训';
      skRow.appendChild(el('span', { class: 'tb-skill', style: { background: bg, color: col } }, `${tbPosShort(p)} · ${lvName}`));
    }
    if (!anySkill) skRow.appendChild(el('span', { style: { fontSize:'12px', color:'var(--text-muted)' } }, '暂无技能记录'));
    skSec.appendChild(skRow);
  }
  body.appendChild(skSec);

  // ── Training goals ──
  const goalSec = el('div', { class: 'tb-dev-section' });
  goalSec.appendChild(el('div', { class: 'tb-dev-label' }, icon('target'), '训练目标'));
  const goals = emp.devGoals || [];
  if (goals.length === 0 && !devCard.goalDraft) {
    goalSec.appendChild(el('div', { style: { fontSize:'12px', color:'var(--text-muted)', marginBottom:'6px' } }, '暂无训练目标'));
  }
  goals.forEach((g, idx) => {
    const gEl = el('div', { class: 'tb-goal' });
    const gHead = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' } });
    gHead.appendChild(el('div', { style: { fontSize:'13px', fontWeight:'600' } },
      `${tbPosShort(g.position)} ${g.fromLevel||''}${g.fromLevel?' → ':''}${g.toLevel||'独立'}`));
    if (isManager) {
      gHead.appendChild(el('button', { class: 'btn-sm', style: { padding:'2px 6px' }, onClick: () => tbRemoveGoal(emp.id, idx) }, icon('trash')));
    }
    gEl.appendChild(gHead);
    const metaBits = [];
    if (g.mentor) metaBits.push('师傅：' + g.mentor);
    if (g.dueDate) metaBits.push('目标 ' + g.dueDate);
    metaBits.push('进度 ' + (g.progress||0) + '%');
    gEl.appendChild(el('div', { style: { fontSize:'12px', color:'var(--text-sub)', marginTop:'3px' } }, metaBits.join(' · ')));
    const prog = el('div', { class: 'tb-goal-prog' });
    prog.appendChild(el('div', { class: 'tb-goal-prog-bar', style: { width: (g.progress||0) + '%' } }));
    gEl.appendChild(prog);
    if (isManager) {
      const slider = el('input', { type:'range', min:'0', max:'100', step:'10', value:String(g.progress||0), style:{ width:'100%', marginTop:'6px' } });
      slider.addEventListener('change', e => tbSetGoalProgress(emp.id, idx, parseInt(e.target.value)||0));
      gEl.appendChild(slider);
    }
    goalSec.appendChild(gEl);
  });

  if (isManager) {
    if (devCard.goalDraft) {
      goalSec.appendChild(tbRenderGoalDraft(emp, positions));
    } else {
      goalSec.appendChild(el('button', { class: 'btn-sm', onClick: () => { devCard.goalDraft = { position: positions[0]||'', toLevel:'独立', mentor:'', dueDate:'', progress:0 }; render(); } },
        icon('plus'), ' 添加训练目标'));
    }
  }
  body.appendChild(goalSec);

  // ── System suggestion ──
  const suggestion = tbSuggestNext(emp, positions);
  if (suggestion) {
    const sSec = el('div', { class: 'tb-dev-section' });
    sSec.appendChild(el('div', { class: 'tb-dev-label' }, icon('bulb'), '系统建议下一步'));
    const reason = suggestion.c.independent < suggestion.thr.red ? '全店紧缺岗位' : '全店人手偏少';
    sSec.appendChild(el('div', { class: 'tb-suggest' },
      `建议学 ${tbPosShort(suggestion.p)}（${reason}，当前 ${suggestion.c.independent} 人能独立顶岗，健康线 ${suggestion.thr.yellow} 人）`));
    body.appendChild(sSec);
  }

  // ── Coaching log ──
  const logSec = el('div', { class: 'tb-dev-section' });
  logSec.appendChild(el('div', { class: 'tb-dev-label' }, icon('message'), '带训 / 一对一记录'));
  const log = emp.coachingLog || [];
  if (log.length === 0) {
    logSec.appendChild(el('div', { style: { fontSize:'12px', color:'var(--text-muted)', marginBottom:'8px' } }, '暂无记录'));
  }
  // Newest first
  [...log].reverse().forEach((entry, ri) => {
    const realIdx = log.length - 1 - ri;
    const e2 = el('div', { class: 'tb-log-entry' });
    const dHead = el('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' } });
    dHead.appendChild(el('div', { class: 'tb-log-date' }, entry.date || '初始备注'));
    if (isManager) {
      dHead.appendChild(el('button', { class: 'btn-sm', style: { padding:'1px 5px' }, onClick: () => tbRemoveLog(emp.id, realIdx) }, icon('trash')));
    }
    e2.appendChild(dHead);
    e2.appendChild(el('div', { class: 'tb-log-note' }, entry.note));
    logSec.appendChild(e2);
  });
  if (isManager) {
    const inputRow = el('div', { style: { display:'flex', gap:'8px', marginTop:'4px' } });
    const inp = el('input', { type:'text', placeholder:'添加一条带训记录…', value: devCard.newLog, style:{ flex:'1' } });
    inp.addEventListener('input', e => devCard.newLog = e.target.value);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tbAddLog(emp.id); });
    inputRow.appendChild(inp);
    const addBtn = el('button', { onClick: () => tbAddLog(emp.id) }, '记录');
    inputRow.appendChild(addBtn);
    logSec.appendChild(inputRow);
  }
  body.appendChild(logSec);

  box.appendChild(body);
  overlay.appendChild(box);
  return overlay;
}

function tbRenderGoalDraft(emp, positions) {
  const d = devCard.goalDraft;
  const wrap = el('div', { class: 'tb-goal' });
  // Position select
  const posSel = el('select', { style: { width:'100%', marginBottom:'6px' } });
  for (const p of positions) {
    const o = el('option', { value: p }, tbPosShort(p));
    if (p === d.position) o.selected = true;
    posSel.appendChild(o);
  }
  posSel.addEventListener('change', e => { d.position = e.target.value; });
  wrap.appendChild(posSel);

  // Mentor select (people who can train this position)
  const mentorSel = el('select', { style: { width:'100%', marginBottom:'6px' } });
  mentorSel.appendChild(el('option', { value:'' }, '（选择师傅，可留空）'));
  const mentors = employees.filter(e => (e.canTrain||[]).includes(d.position));
  for (const m of mentors) {
    const o = el('option', { value: m.shortName }, m.shortName);
    if (m.shortName === d.mentor) o.selected = true;
    mentorSel.appendChild(o);
  }
  mentorSel.addEventListener('change', e => { d.mentor = e.target.value; });
  wrap.appendChild(mentorSel);

  // Due date
  const dateIn = el('input', { type:'date', value: d.dueDate, style:{ width:'100%', marginBottom:'6px' } });
  dateIn.addEventListener('input', e => { d.dueDate = e.target.value; });
  wrap.appendChild(dateIn);

  const btnRow = el('div', { style: { display:'flex', gap:'6px' } });
  btnRow.appendChild(el('button', { class:'btn-sm', onClick: () => { devCard.goalDraft = null; render(); } }, '取消'));
  btnRow.appendChild(el('button', { onClick: () => tbSaveGoal(emp.id) }, '保存目标'));
  wrap.appendChild(btnRow);
  return wrap;
}

// ── Dev card mutations ──
async function tbAddLog(empId) {
  const note = (devCard.newLog || '').trim();
  if (!note) return;
  const emp = getEmp(empId);
  if (!emp) return;
  const today = todayLocalStr();
  const coachingLog = [...(emp.coachingLog||[]), { date: today, note }];
  devCard.newLog = '';
  try { await saveEmployee({ ...emp, coachingLog }); } catch(e) { console.error(e); }
}
async function tbRemoveLog(empId, idx) {
  const emp = getEmp(empId);
  if (!emp) return;
  const coachingLog = (emp.coachingLog||[]).filter((_, i) => i !== idx);
  try { await saveEmployee({ ...emp, coachingLog }); } catch(e) { console.error(e); }
}
async function tbSaveGoal(empId) {
  const emp = getEmp(empId);
  if (!emp || !devCard.goalDraft) return;
  const d = devCard.goalDraft;
  // Infer fromLevel from current skill
  const cur = tbLevel(emp, d.position);
  d.fromLevel = cur === 0 ? '未学' : cur === 1 ? '在训' : cur === 2 ? '独立' : '师傅';
  const devGoals = [...(emp.devGoals||[]), { ...d }];
  devCard.goalDraft = null;
  try { await saveEmployee({ ...emp, devGoals }); } catch(e) { console.error(e); }
}
async function tbRemoveGoal(empId, idx) {
  const emp = getEmp(empId);
  if (!emp) return;
  const devGoals = (emp.devGoals||[]).filter((_, i) => i !== idx);
  try { await saveEmployee({ ...emp, devGoals }); } catch(e) { console.error(e); }
}
async function tbSetGoalProgress(empId, idx, val) {
  const emp = getEmp(empId);
  if (!emp) return;
  const devGoals = (emp.devGoals||[]).map((g, i) => i === idx ? { ...g, progress: val } : g);
  try { await saveEmployee({ ...emp, devGoals }); } catch(e) { console.error(e); }
}

function renderEmployeesTab() {
  const frag     = document.createDocumentFragment();
  const absences = getTodayAbsences();
  const isMgr    = currentRole === 'manager';

  // ── Management bar ──
  const mgmtBar = el('div', { class: 'emp-mgmt-bar' });

  if (isMgr) {
    const addBtn = el('button', { onClick: () => openEmpModal('add', null) });
    addBtn.appendChild(icon('user-plus'));
    addBtn.appendChild(document.createTextNode(' 新增员工'));
    mgmtBar.appendChild(addBtn);

    const posBtn = el('button', { class: 'btn-sm', onClick: () => { posModal.open = true; renderPosModal(); } });
    posBtn.appendChild(icon('settings'));
    posBtn.appendChild(document.createTextNode(' 管理岗位'));
    mgmtBar.appendChild(posBtn);
  }

  const searchInput = el('input', {
    type: 'text', placeholder: '搜索员工...', class: 'search-input',
    value: state.searchQuery,
  });
  searchInput.addEventListener('input', e => {
    state.searchQuery = e.target.value;
    const q = e.target.value.toLowerCase();
    // Filter rows directly in DOM — no re-render, instant and keeps focus
    let visible = 0;
    document.querySelectorAll('.emp-row[data-emp-id]').forEach(row => {
      const name = (row.dataset.empName || '').toLowerCase();
      const show  = !q || name.includes(q);
      row.style.display = show ? '' : 'none';
      if (show && !row.closest('.inactive-wrap')) visible++;
    });
    const countEl = document.getElementById('emp-count');
    if (countEl) countEl.textContent = `${visible} / ${employees.length} 名在职员工`;
  });
  mgmtBar.appendChild(searchInput);
  frag.appendChild(mgmtBar);

  const query = state.searchQuery.toLowerCase();
  // Render ALL active employees (search filters in DOM, not here)
  const countP = el('p', { id: 'emp-count', style: { fontSize:'12px', color:'var(--text-sub)', marginBottom:'10px' } },
    `${employees.length} / ${employees.length} 名在职员工`);
  frag.appendChild(countP);

  for (const emp of employees) {
    const row = buildEmpRow(emp, absences, isMgr, false);
    // Apply current search filter on initial render
    if (query && !emp.shortName.toLowerCase().includes(query) && !emp.fullName.toLowerCase().includes(query)) {
      row.style.display = 'none';
    }
    frag.appendChild(row);
  }

  // ── 已离职 section (manager only) ──
  if (isMgr && inactiveEmployees.length > 0) {
    const section = el('div', { style: { marginTop: '1.5rem' } });
    const hdr = el('div', {
      class: 'inactive-header',
      onClick: () => { inactiveExpanded = !inactiveExpanded; render(); },
    });
    hdr.appendChild(icon(inactiveExpanded ? 'chevron-down' : 'chevron-right'));
    hdr.appendChild(el('span', { style: 'font-size:12px;font-weight:600;color:var(--text-sub);' },
      `已离职 (${inactiveEmployees.length} 人)`));
    section.appendChild(hdr);

    if (inactiveExpanded) {
      const wrap = el('div', { class: 'inactive-wrap', style: 'border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:8px;' });
      const inFiltered = inactiveEmployees.filter(e => !query || e.shortName.toLowerCase().includes(query) || e.fullName.toLowerCase().includes(query));
      if (inFiltered.length === 0) {
        wrap.appendChild(el('p', { style: 'font-size:12px;color:var(--text-sub);padding:8px;' }, '无匹配'));
      } else {
        for (const emp of inFiltered) wrap.appendChild(buildEmpRow(emp, {}, isMgr, true));
      }
      section.appendChild(wrap);
    }
    frag.appendChild(section);
  }

  return frag;
}

function buildEmpRow(emp, absences, isMgr, isInactive) {
  const leaveType = absences[emp.id];
  const isAbsent  = !!leaveType;
  const row = el('div', {
    class: `emp-row${isAbsent ? ' absent' : ''}${isInactive ? ' emp-row-inactive' : ''}`,
    'data-emp-id':   emp.id,
    'data-emp-name': `${emp.shortName} ${emp.fullName}`.toLowerCase(),
  });

  // Avatar
  const roleStyle = getRoleStyle(emp.role);
  row.appendChild(el('div', { class: 'emp-avatar', style: { background: roleStyle.bg, color: roleStyle.color } }, emp.shortName[0]));

  // Info
  const info = el('div', { style: { flex: '1', minWidth: '0' } });

  const nameRow = el('div', { class: 'flex items-center gap-2 mb-1', style: { flexWrap: 'wrap' } });
  nameRow.appendChild(el('span', { class: 'emp-name' }, emp.shortName));
  nameRow.appendChild(el('span', { class: 'emp-fname' }, emp.fullName));
  if (leaveType) { const lt = LEAVE_TYPES[leaveType]; if (lt) nameRow.appendChild(badge(lt.label, lt.badgeClass)); }
  info.appendChild(nameRow);

  const metaRow = el('div', { class: 'emp-meta' });
  metaRow.appendChild(el('span', { class: 'badge badge-gray', style: { background: roleStyle.bg, color: roleStyle.color } }, emp.role));
  for (const tag of emp.tags) metaRow.appendChild(badge(tag, 'badge-blue'));
  info.appendChild(metaRow);

  const kitchenCount = emp.positions.filter(p => KITCHEN_POSITIONS.includes(p)).length;
  info.appendChild(el('p', { class: 'emp-pos mb-1' }, emp.positions.join(' · ')));

  if (emp.canTrain.length > 0) {
    const trainerRow = el('div', { class: 'flex-wrap', style: { marginBottom: '4px' } });
    trainerRow.appendChild(icon('award'));
    for (const pos of emp.canTrain) trainerRow.appendChild(badge('T: ' + pos, 'badge-blue'));
    info.appendChild(trainerRow);
  }
  if (emp.offDay) {
    const offRow = el('div', { class: 'flex items-center gap-1 text-xs', style: { color:'var(--text-sub)', marginBottom: (emp.coachingLog && emp.coachingLog.length) ? '4px' : '0' } });
    offRow.appendChild(icon('calendar-off'));
    offRow.appendChild(document.createTextNode(' ' + emp.offDay));
    info.appendChild(offRow);
  }
  if (currentRole === 'manager' && emp.coachingLog && emp.coachingLog.length > 0) {
    const latest = emp.coachingLog[emp.coachingLog.length - 1];
    const noteBox   = el('div', { class: 'manager-note' });
    const noteTitle = el('div', { class: 'flex items-center gap-1', style: { fontWeight:'600', marginBottom:'2px', fontSize:'11px' } });
    noteTitle.appendChild(icon('message'));
    noteTitle.appendChild(document.createTextNode(latest.date ? ` 带训记录 · ${latest.date}` : ' 备注'));
    noteBox.appendChild(noteTitle);
    noteBox.appendChild(document.createTextNode(latest.note));
    info.appendChild(noteBox);
  }
  row.appendChild(info);

  // ── Actions ──
  const actions = el('div', { class: 'emp-actions' });

  if (isInactive) {
    // 已离职：只有恢复按钮
    const restoreBtn = el('button', { class: 'btn-sm btn-success', onClick: () => restoreEmployee(emp.id) });
    restoreBtn.appendChild(icon('user-check'));
    restoreBtn.appendChild(document.createTextNode(' 恢复在职'));
    actions.appendChild(restoreBtn);
  } else {
    // 在职：Leave 按钮
    if (isAbsent) {
      actions.appendChild(el('button', { class: 'btn-sm btn-success', onClick: () => cancelLeave(emp.id) }, 'Cancel Leave'));
    } else {
      for (const [type, info2] of Object.entries(LEAVE_TYPES)) {
        const btn = el('button', { class: `btn-sm ${info2.badgeClass.replace('badge-','btn-')}`, onClick: () => markDailyLeave(emp.id, type) });
        btn.textContent = info2.label;
        actions.appendChild(btn);
      }
    }
    // Manager 专属：编辑 + 离职
    if (isMgr) {
      const editBtn = el('button', { class: 'btn-sm', style: { marginLeft:'6px' }, onClick: () => openEmpModal('edit', emp) });
      editBtn.appendChild(icon('pencil'));
      editBtn.appendChild(document.createTextNode(' 编辑'));
      actions.appendChild(editBtn);

      const retireBtn = el('button', { class: 'btn-sm btn-danger', style: { marginLeft:'4px' }, onClick: () => {
        if (confirm(`确认将 ${emp.shortName} 标记为离职？`)) markEmployeeInactive(emp.id);
      }});
      retireBtn.appendChild(icon('user-minus'));
      retireBtn.appendChild(document.createTextNode(' 离职'));
      actions.appendChild(retireBtn);
    }
  }

  row.appendChild(actions);
  return row;
}

function openEmpModal(mode, emp) {
  empModal.open = true; empModal.mode = mode; empModal.error = ''; empModal.saving = false;
  if (mode === 'edit' && emp) {
    empModal.empId       = emp.id;
    empModal.fullName    = emp.fullName;
    empModal.shortName   = emp.shortName;
    empModal.role        = emp.role;
    empModal.positions   = [...emp.positions];
    empModal.canTrain    = [...emp.canTrain];
    empModal.training    = [...(emp.training || [])];
    empModal.tags        = [...emp.tags];
    empModal.offDay      = emp.offDay;
    empModal.devGoals    = (emp.devGoals || []).map(g => ({ ...g }));
    empModal.coachingLog = (emp.coachingLog || []).map(c => ({ ...c }));
  } else {
    empModal.empId = null; empModal.fullName = ''; empModal.shortName = ''; empModal.role = '员工';
    empModal.positions = []; empModal.canTrain = []; empModal.training = []; empModal.tags = [];
    empModal.offDay = ''; empModal.devGoals = []; empModal.coachingLog = [];
  }
  renderEmpModal();
}
function closeEmpModal() { empModal.open = false; document.getElementById('modal-root').innerHTML = ''; }
function closePosModal()  { posModal.open  = false; document.getElementById('modal-root').innerHTML = ''; }

function formRow(labelText, inputEl) {
  const row = el('div', { class: 'form-row' });
  row.appendChild(el('label', {}, labelText));
  row.appendChild(inputEl);
  return row;
}

function renderEmpModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = '';
  if (!empModal.open) return;

  const ROLES = ['店长','培训主管','培训员','副理','前厅员工','后厨员工','员工','兼职'];
  const TAGS  = ['引流','收银'];

      if (cb.checked) { if (!empModal.positions.includes(pos.name)) empModal.positions.push(pos.name); }

        empModal.positions = empModal.positions.filter(p => p !== pos.name);
        empModal.canTrain  = empModal.canTrain.filter(p => p !== pos.name);

      renderEmpModal();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' ' + pos.name));
    posGrid.appendChild(lbl);
  }
  body.appendChild(posGrid);

  // Can Train checkboxes (only trainable positions they already have)
  const trainable = allPositions.filter(p => p.trainable && empModal.positions.includes(p.name));
  if (trainable.length > 0) {
    body.appendChild(el('div', { class: 'section-divider' }, '可以带新人 (Can Train)'));
    const trainGrid = el('div', { class: 'checkbox-grid' });
    for (const pos of trainable) {
      const checked = empModal.canTrain.includes(pos.name);
      const lbl = el('label', { class: checked ? 'checked' : '' });
      const cb  = el('input', { type: 'checkbox' });
      cb.checked = checked;
      cb.addEventListener('change', () => {
        if (cb.checked) { if (!empModal.canTrain.includes(pos.name)) empModal.canTrain.push(pos.name); }
        else empModal.canTrain = empModal.canTrain.filter(p => p !== pos.name);
        // update label class without full re-render
        lbl.className = cb.checked ? 'checked' : '';
      });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(' ' + pos.name));
      trainGrid.appendChild(lbl);
    }
    body.appendChild(trainGrid);
  }

  // Tags
  body.appendChild(el('div', { class: 'section-divider' }, '标签 (Tags)'));
  const tagGrid = el('div', { class: 'checkbox-grid' });
  for (const tag of TAGS) {
    const checked = empModal.tags.includes(tag);
    const lbl = el('label', { class: checked ? 'checked' : '' });
    const cb  = el('input', { type: 'checkbox' });
    cb.checked = checked;
    cb.addEventListener('change', () => {
      if (cb.checked) { if (!empModal.tags.includes(tag)) empModal.tags.push(tag); }
      else empModal.tags = empModal.tags.filter(t => t !== tag);
      lbl.className = cb.checked ? 'checked' : '';
    });
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' ' + tag));
    tagGrid.appendChild(lbl);
  }
  body.appendChild(tagGrid);

  // Other fields
  body.appendChild(el('div', { class: 'section-divider' }, '其他信息'));

  const offIn = el('input', { type:'text', placeholder:'例: 周一/周二', value: empModal.offDay });
  offIn.addEventListener('input', e => empModal.offDay = e.target.value);
  body.appendChild(formRow('惯例休息日', offIn));

  body.appendChild(el('p', { style: { fontSize:'11px', color:'var(--text-muted)', marginTop:'4px' } },
    '技能等级、训练目标与带训记录请在「人才看板」中编辑。'));

  if (empModal.error) {
    body.appendChild(el('p', { style: { color:'var(--red-600)', fontSize:'12px', marginTop:'8px' } }, empModal.error));
  }
  box.appendChild(body);

  // Footer
  const footer = el('div', { class: 'modal-footer' });
  footer.appendChild(el('button', { class: 'btn-sm', onClick: closeEmpModal }, '取消'));

  const saveBtn = el('button', { onClick: async () => {
    if (!empModal.shortName.trim() || !empModal.fullName.trim()) {
      empModal.error = '请填写昵称和全名'; renderEmpModal(); return;
    }
    empModal.saving = true; empModal.error = ''; renderEmpModal();
    try {
      const id = empModal.mode === 'add' ? getNextEmpId() : empModal.empId;
      await saveEmployee({
        id, fullName: empModal.fullName.trim(), shortName: empModal.shortName.trim(),
        role: empModal.role, positions: empModal.positions, canTrain: empModal.canTrain,
        training: empModal.training, tags: empModal.tags, offDay: empModal.offDay,
        devGoals: empModal.devGoals, coachingLog: empModal.coachingLog,
      });
      closeEmpModal();
    } catch(e) { empModal.saving = false; empModal.error = '保存失败，请重试'; renderEmpModal(); }
  }});
  saveBtn.appendChild(icon(empModal.saving ? 'loader' : 'check'));
  saveBtn.appendChild(document.createTextNode(empModal.saving ? ' 保存中...' : ' 保存'));
  if (empModal.saving) saveBtn.disabled = true;
  footer.appendChild(saveBtn);
  box.appendChild(footer);
  overlay.appendChild(box);
  root.appendChild(overlay);
}
